<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>업무일지 · 프렌즈팝콘</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }

  :root {
    --bg: #f7f7f5;
    --bg-2: #fbfbfa;
    --card: #fff;
    --text: #37352f;
    --text-muted: #787774;
    --text-subtle: #9b9a97;
    --border: #e9e9e7;
    --border-strong: #d3d3d0;
    --q1: #e03e3e;
    --q2: #2383e2;
    --q3: #d9730d;
    --q4: #9b9a97;
    --q1-bg: #fdecec;
    --q2-bg: #e7f1fb;
    --q3-bg: #fbf0e4;
    --q4-bg: #f1f1f0;
    --q1-soft: #fef7f7;
    --q2-soft: #f5faff;
    --q3-soft: #fefaf4;
    --q4-soft: #fafaf9;
    --proj-popcorn-bg: #ffe8c8;
    --proj-popcorn-fg: #a35b00;
    --proj-town-bg: #dff3e1;
    --proj-town-fg: #1f6a2a;
    --proj-etc-bg: #eeeeec;
    --proj-etc-fg: #5b5b58;
    --proj-shared-bg: #ede7f8;
    --proj-shared-fg: #5a4db5;
    --label-col: 110px;
    --card-width: 900px;
    --sidebar-width: 500px;
    --col-project-w: 62px;
    --col-name-w: 200px;
    --col-target-w: 72px;
    --col-start-w: 92px;
    --col-end-w: 92px;
    --col-progress-w: 56px;
    --col-est-w: 64px;
    --col-done-w: 40px;
    --col-note-w: 160px;
    --col-delete-w: 24px;
    --imp-name-w: 160px;
    --rt-name-w: 140px;
    --imp-del-w: 24px;
    --rt-del-w: 24px;
    --radius: 6px;
    --radius-sm: 4px;
    --shadow-sm: 0 1px 2px rgba(15, 15, 15, 0.04);
    --accent-start: #4caf50;
    --accent-end: #2383e2;
    /* 달성률 배지 색상 체계 (B·C 공통) */
    --rate-excellent-bg: #dff3e1;
    --rate-excellent-fg: #1f6a2a;
    --rate-great-bg: #e7f1fb;
    --rate-great-fg: #1b69b5;
    --rate-ok-bg: #fbf0e4;
    --rate-ok-fg: #a3500a;
    --rate-low-bg: #fdecec;
    --rate-low-fg: #c02b2b;
    --rate-none-bg: #f1f1f0;
    --rate-none-fg: #787774;
  }

  :root[data-theme="dark"] {
    --bg: #191919;
    --bg-2: #1f1f1f;
    --card: #242424;
    --text: #e6e6e6;
    --text-muted: #9a9a97;
    --text-subtle: #6a6a68;
    --border: #353533;
    --border-strong: #4a4a48;
    --q1-bg: #3a1e1e;
    --q2-bg: #1a2a3e;
    --q3-bg: #33241a;
    --q4-bg: #2a2a2a;
    --q1-soft: #261818;
    --q2-soft: #172232;
    --q3-soft: #251b12;
    --q4-soft: #222;
    --proj-popcorn-bg: #3a2a15;
    --proj-popcorn-fg: #ffb96e;
    --proj-town-bg: #1f3524;
    --proj-town-fg: #8cdb97;
    --proj-etc-bg: #323230;
    --proj-etc-fg: #a8a8a5;
    --proj-shared-bg: #332a48;
    --proj-shared-fg: #c5b4f0;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
    /* 달성률 배지 (dark) */
    --rate-excellent-bg: #1e3020;
    --rate-excellent-fg: #8cdb97;
    --rate-great-bg: #1a2a3e;
    --rate-great-fg: #7fb6e8;
    --rate-ok-bg: #33241a;
    --rate-ok-fg: #e0a060;
    --rate-low-bg: #3a1e1e;
    --rate-low-fg: #ff9a9a;
    --rate-none-bg: #2a2a28;
    --rate-none-fg: #9a9a97;
  }
  :root[data-theme="dark"] .cat-chip[data-v="에셋"] { background: #3a1e1e; color: #ff9a9a; }
  :root[data-theme="dark"] .cat-chip[data-v="빌드"] { background: #3a2814; color: #ffb96e; }
  :root[data-theme="dark"] .cat-chip[data-v="스터디"] { background: #2a2540; color: #b4a7f5; }
  :root[data-theme="dark"] .cat-chip[data-v="버전"] { background: #1e2e42; color: #7fb6e8; }
  :root[data-theme="dark"] .cat-chip[data-v="월별"] { background: #1e3020; color: #8cdb97; }
  :root[data-theme="dark"] .cat-chip[data-v="상시"] { background: #3a2e10; color: #e0c266; }
  :root[data-theme="dark"] .cat-chip[data-v="기믹"] { background: #3a2e10; color: #e0c266; }
  :root[data-theme="dark"] .cat-chip[data-v="테이블"] { background: #3a2814; color: #ffb96e; }
  :root[data-theme="dark"] .cat-chip[data-v="QA"] { background: #2a2540; color: #b4a7f5; }
  :root[data-theme="dark"] .cat-chip[data-v="아트"] { background: #3a1f28; color: #f096a8; }
  :root[data-theme="dark"] .cat-chip[data-v="운영"] { background: #3a2410; color: #e0a060; }
  :root[data-theme="dark"] .cat-chip[data-v="기타"] { background: #323230; color: #a8a8a5; }
  :root[data-theme="dark"] .status-chip[data-v="진행중"] { background: #1e2e42; color: #7fb6e8; }
  :root[data-theme="dark"] .status-chip[data-v="완료"] { background: #1e3020; color: #8cdb97; }
  :root[data-theme="dark"] .status-chip[data-v="대기"] { background: #2a2a28; color: #9a9a97; }
  :root[data-theme="dark"] .side-row[data-cat="에셋"] { background: rgba(255, 90, 90, 0.06); }
  :root[data-theme="dark"] .side-row[data-cat="빌드"] { background: rgba(255, 150, 60, 0.06); }
  :root[data-theme="dark"] .side-row[data-cat="스터디"] { background: rgba(160, 140, 255, 0.06); }
  :root[data-theme="dark"] .side-row[data-cat="버전"] { background: rgba(100, 160, 230, 0.06); }
  :root[data-theme="dark"] .side-row[data-cat="월별"] { background: rgba(110, 200, 130, 0.06); }
  :root[data-theme="dark"] .side-row[data-cat="상시"] { background: rgba(220, 180, 80, 0.06); }

  html { font-size: 14px; }
  html[data-scale="sm"] { font-size: 12px; }
  html[data-scale="lg"] { font-size: 16px; }

  html, body { height: 100%; margin: 0; padding: 0; }

  body {
    font-family: 'Pretendard', 'Apple SD Gothic Neo', -apple-system, BlinkMacSystemFont, 'Malgun Gothic', 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    font-size: 0.875rem;
    line-height: 1.5;
    transition: background 0.2s, color 0.2s;
  }

  button { font-family: inherit; }

  .app { display: flex; flex-direction: column; height: 100vh; width: 100%; }

  .app-header {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; padding: 10px 16px;
    background: var(--card); border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .app-title { font-size: 1rem; font-weight: 700; margin: 0; display: flex; align-items: baseline; gap: 6px; white-space: nowrap; }
  .app-title-sub { font-weight: 400; color: var(--text-muted); font-size: 0.8125rem; }
  .tabs { display: inline-flex; background: var(--bg); border-radius: var(--radius); padding: 2px; gap: 2px; }
  .tab-btn { border: 0; background: transparent; padding: 4px 14px; cursor: pointer; font-size: 0.8125rem; color: var(--text-muted); border-radius: var(--radius-sm); font-weight: 500; }
  .tab-btn.active { background: var(--card); color: var(--text); box-shadow: var(--shadow-sm); }
  .header-actions { display: flex; align-items: center; gap: 6px; }
  .scale-group { display: inline-flex; background: var(--bg); border-radius: var(--radius); padding: 2px; }
  .scale-btn { border: 0; background: transparent; padding: 4px 10px; cursor: pointer; font-size: 0.75rem; color: var(--text-muted); border-radius: var(--radius-sm); font-weight: 600; min-width: 30px; }
  .scale-btn.active { background: var(--card); color: var(--text); box-shadow: var(--shadow-sm); }
  .theme-toggle { border: 1px solid var(--border); background: var(--card); color: var(--text); border-radius: var(--radius); padding: 4px 8px; cursor: pointer; font-size: 0.9rem; line-height: 1; }
  .theme-toggle:hover { background: var(--bg); }

  main.tab-content { flex: 1; overflow: hidden; display: none; }
  main.tab-content.active { display: flex; }

  .weekly-layout {
    display: grid;
    grid-template-columns: var(--sidebar-width) 6px 1fr;
    width: 100%; height: 100%;
  }
  .sidebar-resizer {
    background: #111;
    cursor: col-resize;
    position: relative;
    transition: background 0.15s;
  }
  .sidebar-resizer::before {
    content: '';
    position: absolute;
    left: -4px; right: -4px; top: 0; bottom: 0;
  }
  .sidebar-resizer:hover { background: var(--q2); }
  .sidebar-resizer.dragging { background: var(--q2); }
  :root[data-theme="dark"] .sidebar-resizer { background: #e6e6e6; }
  :root[data-theme="dark"] .sidebar-resizer:hover,
  :root[data-theme="dark"] .sidebar-resizer.dragging { background: var(--q2); }

  .sidebar {
    background: var(--card);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 14px 14px 16px;
    display: flex; flex-direction: column; gap: 18px;
  }
  .side-section { display: flex; flex-direction: column; gap: 8px; }
  .side-title { margin: 0; font-size: 0.75rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; display: flex; align-items: center; justify-content: space-between; gap: 6px; }
  .side-title-main { display: inline-flex; align-items: center; gap: 6px; }
  .side-title-count { background: var(--bg); color: var(--text-muted); padding: 1px 6px; border-radius: 10px; font-size: 0.6875rem; font-weight: 600; }

  /* 메인 목표 — 주/월 2단, 읽기·편집 모드 분리 */
  .main-goal-group { display: flex; flex-direction: column; gap: 10px; }
  .goal-item { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .goal-label {
    font-size: 0.625rem; font-weight: 700; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.06em;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .goal-label::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: var(--q2);
  }
  .goal-item.goal-month .goal-label::before { background: var(--q3); }
  .goal-body {
    min-height: 40px;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-left: 4px solid var(--q2);
    border-radius: var(--radius);
    background: var(--bg-2);
    color: var(--text);
    font-size: 1.0625rem;
    font-weight: 500;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
    cursor: text;
    transition: background 0.15s, border-color 0.15s;
  }
  .goal-body:hover { background: var(--q2-soft); border-color: var(--q2); }
  .goal-body.empty {
    color: var(--text-subtle);
    font-weight: 400;
    font-style: italic;
    font-size: 0.9375rem;
  }
  .goal-item.goal-month .goal-body { border-left-color: var(--q3); }
  .goal-item.goal-month .goal-body:hover { background: var(--q3-soft); border-color: var(--q3); }
  .goal-edit {
    display: none;
    width: 100%;
    min-height: 40px;
    max-height: 300px;
    resize: vertical;
    font-family: inherit;
    font-size: 1.0625rem;
    font-weight: 500;
    line-height: 1.7;
    padding: 10px 14px;
    border: 1px solid var(--q2);
    border-left: 4px solid var(--q2);
    border-radius: var(--radius);
    background: var(--card);
    color: var(--text);
    outline: none;
  }
  .goal-item.goal-month .goal-edit { border-color: var(--q3); border-left-color: var(--q3); }
  .goal-item.editing .goal-body { display: none; }
  .goal-item.editing .goal-edit { display: block; }

  .side-table { display: flex; flex-direction: column; border: 1px solid var(--border); border-radius: var(--radius); background: var(--card); overflow: hidden; }
  .side-row {
    display: grid;
    gap: 0;
    padding: 6px 0;
    align-items: center;
    font-size: 0.6875rem;
    border-top: 1px solid var(--border);
  }
  .side-row:first-child { border-top: 0; }
  .side-row.important-row,
  .side-row.important-head { grid-template-columns: 48px 52px minmax(80px, 1fr) 54px 84px 42px 22px; }
  .side-row.routine-row,
  .side-row.routine-head { grid-template-columns: 48px 52px 56px minmax(70px, 1fr) 54px 84px 42px 22px; }
  .side-row > div {
    padding: 4px 6px;
    border-right: 1px solid var(--border);
    min-height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 0;
  }
  .side-row > div:last-child { border-right: none; }
  .side-row.side-head { background: var(--bg); color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; font-size: 0.625rem; padding: 7px 0; border-top: 0; }
  .side-row.side-head > div { text-align: center; }

  /* 동일 카테고리 병합 — 상단 경계선과 칩 표시 억제 */
  .side-row.merge-cat { border-top: 0; }
  .side-row.important-row.merge-cat > div:nth-child(2) > .cat-chip,
  .side-row.routine-row.merge-cat > div:nth-child(2) > .cat-chip { visibility: hidden; }
  .side-row.routine-row.merge-sub > div:nth-child(3) > .cat-chip { visibility: hidden; }
  .side-row.done { opacity: 0.5; }
  .side-row.done .side-name { text-decoration: line-through; }

  .side-row[data-cat="에셋"] { background: rgba(224, 62, 62, 0.06); }
  .side-row[data-cat="빌드"] { background: rgba(217, 115, 13, 0.05); }
  .side-row[data-cat="스터디"] { background: rgba(90, 77, 181, 0.05); }
  .side-row[data-cat="버전"] { background: rgba(35, 131, 226, 0.05); }
  .side-row[data-cat="월별"] { background: rgba(31, 122, 62, 0.05); }
  .side-row[data-cat="상시"] { background: rgba(138, 109, 0, 0.06); }
  .side-row[data-cat="기타"] { background: transparent; }

  .side-name, .side-date { width: 100%; font-size: 0.6875rem; padding: 3px 4px; border: 1px solid transparent; background: transparent; border-radius: 3px; color: var(--text); }
  .side-name:focus, .side-date:focus { background: var(--card); border-color: var(--q2); outline: none; }
  .side-del { border: 0; background: transparent; cursor: pointer; color: var(--text-subtle); padding: 0; font-size: 0.9375rem; line-height: 1; width: 100%; }
  .side-del:hover { color: var(--q1); }

  .list-empty { color: var(--text-muted); font-size: 0.75rem; padding: 16px 12px; text-align: center; line-height: 1.6; background: var(--bg-2); }

  /* grid cell 기반 사이드 테이블 (카테고리 rowspan 병합 지원) */
  .side-table.important-grid {
    display: grid;
    grid-template-columns: 48px 52px var(--imp-name-w) 62px 84px 60px var(--imp-del-w);
    gap: 1px;
    background: var(--border);
    padding: 0;
    border-radius: var(--radius);
    overflow: hidden;
  }
  .side-table.routine-grid {
    display: grid;
    grid-template-columns: 48px 52px 56px var(--rt-name-w) 62px 84px 60px var(--rt-del-w);
    gap: 1px;
    background: var(--border);
    padding: 0;
    border-radius: var(--radius);
    overflow: hidden;
  }
  .st-cell.st-head { position: relative; }
  .side-col-resize {
    position: absolute;
    top: 0; bottom: 0; right: -4px;
    width: 8px;
    cursor: col-resize;
    z-index: 10;
  }
  /* 삭제 열처럼 우측 끝 셀은 왼쪽 경계를 드래그 */
  .side-col-resize.side-col-resize-left {
    right: auto;
    left: -4px;
  }
  .side-col-resize::after {
    content: '';
    position: absolute;
    top: 20%; bottom: 20%; left: 50%;
    width: 2px;
    background: transparent;
    transition: background 0.15s;
  }
  .side-col-resize:hover::after,
  .side-col-resize.dragging::after { background: var(--q2); }
  .st-cell {
    background: var(--card);
    padding: 3px 5px;
    display: flex;
    align-items: stretch;
    justify-content: center;
    min-height: 32px;
    min-width: 0;
    font-size: 0.6875rem;
  }
  .st-cell > .cat-chip,
  .st-cell > .project-tag,
  .st-cell > .status-chip {
    height: 100%;
    min-height: 24px;
  }
  .st-cell.st-head {
    background: var(--bg);
    color: var(--text-muted);
    font-weight: 700;
    font-size: 0.625rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 7px 6px;
  }
  /* 카테고리 컬러 bar — 행의 첫 셀(프로젝트 열)에만 좌측 3px */
  .st-cell.st-row-first { border-left: 3px solid var(--q4); }
  .st-cell.st-row-first[data-cat="에셋"] { border-left-color: var(--q1); }
  .st-cell.st-row-first[data-cat="빌드"] { border-left-color: var(--q3); }
  .st-cell.st-row-first[data-cat="스터디"] { border-left-color: #5a4db5; }
  .st-cell.st-row-first[data-cat="버전"] { border-left-color: var(--q2); }
  .st-cell.st-row-first[data-cat="월별"] { border-left-color: #1f6a2a; }
  .st-cell.st-row-first[data-cat="상시"] { border-left-color: #8a6d00; }
  :root[data-theme="dark"] .st-cell.st-row-first[data-cat="스터디"] { border-left-color: #b4a7f5; }
  :root[data-theme="dark"] .st-cell.st-row-first[data-cat="월별"] { border-left-color: #8cdb97; }
  :root[data-theme="dark"] .st-cell.st-row-first[data-cat="상시"] { border-left-color: #e0c266; }
  .st-cell.empty-row {
    grid-column: 1 / -1;
    padding: 16px 12px;
    color: var(--text-muted);
    font-size: 0.75rem;
    justify-content: center;
    text-align: center;
    line-height: 1.6;
    background: var(--bg-2);
  }
  .st-cell.done { opacity: 0.5; }
  .st-cell.done .side-name { text-decoration: line-through; }
  .st-cell .side-name, .st-cell .side-date {
    width: 100%; font-size: 0.6875rem;
    padding: 3px 4px;
    border: 1px solid transparent;
    background: transparent;
    border-radius: 3px; color: var(--text);
    text-align: center;
  }
  /* A-1: 업무명은 메타보다 한 단계 큰 웨이트·폰트로 시선 집중 */
  .st-cell .side-name {
    text-align: left;
    font-size: 0.8125rem;
    font-weight: 600;
  }
  .st-cell .side-name:focus, .st-cell .side-date:focus {
    background: var(--card); border-color: var(--q2); outline: none;
  }
  .st-cell .side-del {
    border: 0; background: transparent; cursor: pointer;
    color: var(--text-subtle); padding: 0; font-size: 0.875rem; line-height: 1;
    width: 20px; height: 20px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 3px;
  }
  .st-cell .side-del:hover { color: var(--q1); background: var(--q1-bg); }
  /* D-DAY 칩 가로 넓이 통일 + 중앙정렬 */
  .st-cell > .dday-chip {
    width: 100%;
    display: block;
    text-align: center;
    padding: 3px 4px;
    box-sizing: border-box;
  }

  .project-tag { width: 100%; padding: 3px 4px !important; font-weight: 600; font-size: 0.625rem !important; border-radius: 10px !important; border: 0 !important; text-align: center; text-align-last: center; background: var(--proj-etc-bg); color: var(--proj-etc-fg); appearance: none; -webkit-appearance: none; cursor: pointer; }
  .project-tag[data-v="팝콘"] { background: var(--proj-popcorn-bg); color: var(--proj-popcorn-fg); }
  .project-tag[data-v="타운"] { background: var(--proj-town-bg); color: var(--proj-town-fg); }
  .project-tag[data-v="기타"] { background: var(--proj-etc-bg); color: var(--proj-etc-fg); }
  .project-tag[data-v="공용"] { background: var(--proj-shared-bg); color: var(--proj-shared-fg); }

  /* 구분/상세 칩: 중립 회색 + 테두리 (행 배경색이 카테고리 역할 담당) */
  .cat-chip {
    width: 100%;
    padding: 3px 4px !important;
    font-weight: 500;
    font-size: 0.625rem !important;
    border-radius: 6px !important;
    border: 1px solid var(--border) !important;
    background: var(--card) !important;
    color: var(--text-muted) !important;
    appearance: none; -webkit-appearance: none; cursor: pointer;
    text-align: center; text-align-last: center;
  }
  .cat-chip:hover { border-color: var(--text-muted) !important; color: var(--text) !important; }

  .status-chip { width: 100%; padding: 3px 4px !important; font-weight: 600; font-size: 0.625rem !important; border-radius: 10px !important; border: 0 !important; background: var(--bg); color: var(--text-muted); appearance: none; -webkit-appearance: none; cursor: pointer; text-align: center; text-align-last: center; }
  .status-chip[data-v="진행중"] { background: #e7f1fb; color: #1b69b5; }
  .status-chip[data-v="완료"] { background: #dff3e1; color: #1f6a2a; }
  .status-chip[data-v="대기"] { background: #f1f1f0; color: #5b5b58; }
  /* A-3: 상태 옵션 앞 ● 점 prefix — 왼쪽 정렬로 점이 앞에 오도록 */
  .st-cell .status-chip {
    text-align: left !important;
    text-align-last: left !important;
    padding-left: 7px !important;
    padding-right: 4px !important;
  }

  .dday-chip { font-size: 0.6875rem; padding: 2px 5px; border-radius: 10px; background: var(--q4-bg); color: var(--text-muted); font-weight: 600; white-space: nowrap; text-align: center; display: inline-block; }
  .dday-chip.over { background: var(--q1); color: #fff; }
  .dday-chip.near { background: var(--q1-bg); color: var(--q1); }
  .dday-chip.soon { background: var(--q3-bg); color: var(--q3); }
  /* A-4: D-1 이내(D+, D-DAY, D-1)는 미세 펄스로 긴박감 표현 */
  @keyframes dday-pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.55; }
  }
  .dday-chip.critical { animation: dday-pulse 1.8s ease-in-out infinite; }
  @media (prefers-reduced-motion: reduce) {
    .dday-chip.critical { animation: none; }
  }

  input[type="text"], input[type="date"], input[type="time"], input[type="number"], select, textarea {
    border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 4px 6px;
    background: var(--card); color: var(--text); font-family: inherit; outline: none;
    font-size: 0.8125rem;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--q2); }
  textarea { resize: vertical; }

  .btn { border: 1px solid var(--border); background: var(--card); color: var(--text); padding: 6px 12px; border-radius: var(--radius); cursor: pointer; font-size: 0.8125rem; font-weight: 500; transition: background 0.15s, border-color 0.15s; white-space: nowrap; }
  .btn:hover { background: var(--bg); }
  .btn.primary { background: var(--text); color: var(--card); border-color: var(--text); }
  .btn.primary:hover { opacity: 0.88; }
  .btn.danger { background: var(--q1); color: #fff; border-color: var(--q1); }
  .btn.danger:hover { background: #c02b2b; }
  .btn.ghost { border-color: transparent; color: var(--text-muted); padding: 3px 8px; }
  .btn.ghost:hover { background: var(--bg); color: var(--text); }
  .btn.sm { padding: 3px 8px; font-size: 0.75rem; }
  .btn.full { width: 100%; padding: 10px; font-weight: 600; font-size: 0.875rem; }
  .btn-add-icon {
    border: 1px dashed var(--border-strong);
    background: transparent; color: var(--text-muted);
    padding: 7px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer; font-size: 0.75rem;
    width: 100%; text-align: center; margin-top: 2px;
    opacity: 0;
    transition: opacity 0.15s, background 0.15s, color 0.15s, border-color 0.15s;
  }
  .grid-cell.quadrant-cell:hover .btn-add-icon { opacity: 1; }
  .btn-add-icon:hover { background: var(--card); color: var(--text); border-color: var(--text-muted); }
  .grid-cell.quadrant-cell:hover .btn-add-icon:focus { opacity: 1; }

  .week-wrapper { display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
  .weekly-grid {
    flex: 1; overflow: auto; background: var(--card);
    display: grid;
    grid-template-columns: var(--label-col) repeat(5, var(--card-width));
    grid-auto-rows: min-content;
    align-content: start;
  }
  .grid-cell { border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); background: var(--card); min-width: 0; padding: 0; }
  .grid-cell.label {
    position: sticky; left: 0; z-index: 5;
    background: var(--bg-2);
    font-size: 0.6875rem; font-weight: 700; color: var(--text-muted);
    padding: 8px 6px;
    display: flex; align-items: center; justify-content: center;
    text-align: center; white-space: pre-line; line-height: 1.5;
  }
  .grid-cell.label.q1 { color: var(--q1); background: var(--q1-bg); }
  .grid-cell.label.q2 { color: var(--q2); background: var(--q2-bg); }
  .grid-cell.label.q3 { color: var(--q3); background: var(--q3-bg); }
  .grid-cell.label.q4 { color: var(--q4); background: var(--q4-bg); }
  /* 분면 셀 배경색 제거 — 왼쪽 라벨 열에서만 색상 구분 */
  .grid-cell.day-cell.q1,
  .grid-cell.day-cell.q2,
  .grid-cell.day-cell.q3,
  .grid-cell.day-cell.q4 { background: var(--card); }

  .grid-cell.corner { position: sticky; left: 0; top: 0; z-index: 20; background: var(--bg-2); }
  .grid-cell.day-header {
    position: sticky; top: 0; z-index: 4;
    background: var(--card);
    padding: 10px 12px;
    font-size: 0.9375rem; font-weight: 700;
    display: flex; align-items: center; gap: 8px; justify-content: space-between;
  }
  .grid-cell.day-header.today { border-bottom: 2px solid var(--q2); }
  .grid-cell.day-header.today .day-date-text { color: var(--q2); }
  .day-head-main { display: flex; align-items: baseline; gap: 6px; }
  .day-name-text { color: var(--text-muted); font-weight: 500; font-size: 0.8125rem; }
  .grid-cell.day-header.today .day-name-text { color: var(--q2); font-weight: 600; }
  .btn-copy-prev {
    border: 1px solid var(--border); background: var(--card); color: var(--text-muted);
    padding: 3px 8px; border-radius: var(--radius-sm); cursor: pointer;
    font-size: 0.6875rem; white-space: nowrap;
  }
  .btn-copy-prev:hover { background: var(--q2-bg); color: var(--q2); border-color: var(--q2); }

  .grid-cell.text-cell { padding: 4px; }
  .grid-cell.text-cell textarea {
    width: 100%; min-height: 42px; font-size: 0.8125rem;
    border: 1px solid transparent; background: transparent; padding: 4px 6px;
    resize: vertical; color: var(--text);
  }
  .grid-cell.text-cell textarea:focus { background: var(--card); border-color: var(--q2); }

  .grid-cell.thead-cell { padding: 0; background: var(--bg); }

  /* task-row 10컬럼 (구글시트와 동일 순서, 중단 제거) */
  .task-row {
    display: grid;
    grid-template-columns:
      var(--col-project-w) var(--col-name-w)
      var(--col-target-w) var(--col-start-w) var(--col-end-w)
      var(--col-progress-w) var(--col-est-w) var(--col-done-w)
      var(--col-note-w) var(--col-delete-w);
    gap: 0; align-items: center;
    padding: 8px 0;
    font-size: 0.8125rem;
    border-bottom: 1px solid var(--border);
    min-height: 44px;
  }
  .task-row:last-child { border-bottom: 0; }
  .task-row.task-head {
    font-weight: 700; color: var(--text-muted); font-size: 0.6875rem;
    padding: 10px 0; background: var(--bg);
    text-transform: uppercase; letter-spacing: 0.04em;
    min-height: 36px;
    position: relative;
  }
  .task-row.task-head .col { text-align: center; }
  .task-row.done { opacity: 0.65; }
  .task-row.done .col-name input { text-decoration: line-through; color: var(--text-muted); }
  .task-row > .col {
    min-width: 0;
    padding: 0 7px;
    border-right: 1px solid var(--border);
    height: 100%;
    display: flex;
    align-items: center;
    position: relative;
  }
  .task-row > .col:last-child { border-right: none; }
  /* 리사이즈 핸들: 헤더 행 각 셀 오른쪽 끝 */
  .task-row.task-head > .col[data-colkey] .col-resize {
    position: absolute;
    top: 0; bottom: 0;
    right: -4px;
    width: 8px;
    cursor: col-resize;
    z-index: 10;
  }
  .task-row.task-head > .col[data-colkey] .col-resize::after {
    content: '';
    position: absolute;
    top: 25%; bottom: 25%;
    left: 50%;
    width: 2px;
    background: transparent;
    transition: background 0.15s;
  }
  .task-row.task-head > .col[data-colkey]:hover .col-resize::after,
  .task-row.task-head > .col[data-colkey] .col-resize:hover::after,
  .col-resize.dragging::after { background: var(--q2); }
  body.resizing-col, body.resizing-col * { cursor: col-resize !important; user-select: none; }
  .task-row.task-head > .col { justify-content: center; }
  .task-row > .col-name,
  .task-row > .col-note,
  .task-row > .col-target,
  .task-row > .col-est { justify-content: stretch; }
  .task-row > .col-progress,
  .task-row > .col-done,
  .task-row > .col-delete,
  .task-row > .col-project,
  .task-row > .col-start,
  .task-row > .col-end { justify-content: center; }
  .task-row .col input[type="text"],
  .task-row .col input[type="date"],
  .task-row .col input[type="number"] {
    width: 100%; font-size: 0.8125rem; padding: 6px 6px;
    border: 1px solid transparent; background: transparent; color: var(--text);
    min-height: 28px;
  }
  .task-row .col-target input,
  .task-row .col-est input { text-align: center; }
  .task-row .col input:focus { background: var(--card); border-color: var(--q2); }
  .col-progress { text-align: center; font-weight: 600; font-variant-numeric: tabular-nums; color: var(--text); font-size: 0.8125rem; }
  .col-progress .progress-empty { color: var(--text-subtle); font-weight: 500; }
  .col-done, .col-delete { text-align: center; }
  .col-done input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }
  .col-delete .del-btn {
    border: 1px solid transparent; background: transparent; cursor: pointer;
    color: var(--text-subtle); padding: 2px 4px;
    font-size: 0.875rem; line-height: 1; border-radius: 4px; font-weight: 600;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    width: 20px; height: 20px;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .col-delete .del-btn:hover { background: var(--q1-bg); color: var(--q1); border-color: var(--q1); }

  .time-combo { display: grid; grid-template-columns: 1fr 22px; gap: 2px; align-items: center; }
  .time-text { width: 100%; font-size: 0.8125rem !important; padding: 4px 4px !important; text-align: center; border: 1px solid transparent !important; background: transparent; border-radius: 3px !important; font-variant-numeric: tabular-nums; min-height: 28px; }
  .time-text:focus { background: var(--card); border-color: var(--q2) !important; }
  .time-now { border: 0; background: transparent; padding: 0; cursor: pointer; font-size: 0.875rem; color: var(--text-muted); line-height: 1; border-radius: 3px; }
  .time-now:hover { background: var(--bg); color: var(--q2); }

  .grid-cell.quadrant-cell { padding: 6px; min-height: 100px; }

  .grid-cell.summary-cell {
    padding: 12px 14px; background: var(--bg-2);
    display: flex; flex-direction: column; gap: 10px;
  }
  .summary-top { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .summary-top .summary-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 10px;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
  }
  .summary-label { color: var(--text-muted); font-size: 0.6875rem; }
  .summary-value { font-weight: 700; font-size: 1rem; font-variant-numeric: tabular-nums; }
  .summary-bottom { display: flex; flex-direction: column; gap: 6px; }
  .summary-progress-row {
    display: flex; justify-content: space-between; align-items: baseline;
    font-size: 0.75rem;
  }
  .summary-progress-row .summary-label { font-weight: 600; }
  .summary-progress-row .summary-value { font-size: 0.9375rem; }
  .progress-bar { width: 100%; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .progress-bar.big { height: 12px; border-radius: 6px; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent-start), var(--accent-end)); transition: width 0.3s; }

  .card-width-bar { display: flex; align-items: center; gap: 10px; padding: 6px 14px; border-top: 1px solid var(--border); background: var(--card); font-size: 0.75rem; color: var(--text-muted); flex-shrink: 0; }
  .card-width-bar input[type="range"] { flex: 1; max-width: 260px; }
  .card-width-value { font-variant-numeric: tabular-nums; font-weight: 600; color: var(--text); }
  .card-width-sep { width: 1px; height: 18px; background: var(--border); margin: 0 4px; }

  /* Phase 7b-b: 설정 메뉴 드롭다운 */
  .settings-menu { position: relative; display: inline-block; }
  .settings-btn {
    border: 1px solid transparent;
    background: transparent;
    color: var(--text-muted);
    padding: 4px 8px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 0.8125rem;
    font-family: inherit;
    display: inline-flex; align-items: center; gap: 4px;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .settings-btn:hover { background: var(--bg); color: var(--text); border-color: var(--border); }
  .settings-dropdown {
    position: absolute;
    bottom: calc(100% + 6px);
    right: 0;
    min-width: 240px;
    background: var(--card);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    box-shadow: 0 8px 24px rgba(15, 15, 15, 0.16);
    padding: 4px;
    z-index: 100;
  }
  :root[data-theme="dark"] .settings-dropdown { box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5); }
  .settings-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
    width: 100%;
    padding: 8px 10px;
    border: 0;
    background: transparent;
    text-align: left;
    cursor: pointer;
    color: var(--text);
    border-radius: var(--radius-sm);
    font-family: inherit;
    transition: background 0.12s;
  }
  .settings-item:hover { background: var(--bg); }
  .settings-item-title {
    font-size: 0.8125rem;
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .settings-item-desc {
    font-size: 0.6875rem;
    color: var(--text-muted);
    font-weight: 400;
    padding-left: 20px;
    line-height: 1.4;
  }

  .history-layout { display: flex; flex-direction: column; width: 100%; height: 100%; overflow: hidden; }
  .history-toolbar { padding: 12px 16px; border-bottom: 1px solid var(--border); background: var(--card); display: flex; gap: 8px; align-items: center; flex-wrap: wrap; flex-shrink: 0; }
  .history-list { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }

  .week-summary-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; box-shadow: var(--shadow-sm); }
  .week-summary-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .week-summary-title { font-size: 0.9375rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .week-summary-title::before { content: '📊'; font-size: 1rem; }

  /* B-1·B-2: 도넛 히어로 + 사이드 KPI */
  .week-summary-hero {
    display: grid;
    grid-template-columns: 128px 1fr;
    gap: 18px;
    align-items: center;
    margin-bottom: 16px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }
  .donut-wrap { display: flex; justify-content: center; align-items: center; }
  .donut { display: block; }
  .donut-bg { stroke: var(--border); }
  .donut-fg { stroke: var(--q4); transition: stroke-dashoffset 0.5s ease; }
  .donut.rate-excellent .donut-fg { stroke: var(--rate-excellent-fg); }
  .donut.rate-great .donut-fg { stroke: var(--rate-great-fg); }
  .donut.rate-ok .donut-fg { stroke: var(--rate-ok-fg); }
  .donut.rate-low .donut-fg { stroke: var(--rate-low-fg); }
  .donut.rate-none .donut-fg { stroke: var(--border); }
  .donut-text { font-size: 20px; font-weight: 700; fill: var(--text); font-variant-numeric: tabular-nums; }
  .donut-sub { font-size: 9px; font-weight: 600; fill: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }

  .hero-kpis { display: flex; flex-direction: column; gap: 8px; min-width: 0; }
  .hero-kpi {
    display: flex; flex-direction: column; gap: 2px;
    padding: 8px 12px;
    background: var(--bg-2);
    border-radius: var(--radius);
    border-left: 3px solid var(--q4);
  }
  .hero-kpi.kpi-total { border-left-color: var(--accent-start); }
  .hero-kpi.kpi-est { border-left-color: var(--q2); }
  .hero-kpi.kpi-done { border-left-color: var(--q3); }
  .kpi-label { font-size: 0.6875rem; color: var(--text-muted); font-weight: 600; letter-spacing: 0.02em; }
  .kpi-val { font-size: 1.5rem; font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1.1; color: var(--text); }
  .kpi-val-sub { font-size: 0.75rem; font-weight: 500; color: var(--text-muted); margin-left: 2px; }

  /* B-4: 트렌드 칩 */
  .trend-chip {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 0.75rem; font-weight: 700;
    padding: 3px 10px; border-radius: 12px;
    font-variant-numeric: tabular-nums;
  }
  .trend-chip.trend-up { background: var(--rate-excellent-bg); color: var(--rate-excellent-fg); }
  .trend-chip.trend-down { background: var(--rate-low-bg); color: var(--rate-low-fg); }
  .trend-chip.trend-flat { background: var(--bg); color: var(--text-muted); }
  .trend-chip-label { font-size: 0.6875rem; font-weight: 500; color: var(--text-muted); }

  /* B-3 + Phase 10: 일별 sparkline — 파랑 농도 단일 + 막대 폭 확장 + 80% 목표선 */
  .sparkline { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; padding: 10px 4px 4px; }
  .sparkbar-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; min-width: 0; }
  .sparkbar-label { font-size: 0.75rem; color: var(--text); font-weight: 700; font-variant-numeric: tabular-nums; min-height: 16px; }
  .sparkbar-track {
    position: relative;
    width: 100%;
    height: 56px;
    background: var(--bg);
    border-radius: 4px;
    display: flex;
    align-items: flex-end;
    overflow: hidden;
  }
  /* 80% 목표선 — 각 트랙 상단 20% 위치 */
  .sparkbar-track::before {
    content: '';
    position: absolute;
    left: 0; right: 0;
    top: 20%;
    border-top: 1px dashed var(--q2);
    opacity: 0.45;
    z-index: 2;
    pointer-events: none;
  }
  .sparkbar-fill {
    position: relative;
    width: 100%;
    min-height: 3px;
    border-radius: 4px 4px 0 0;
    transition: height 0.3s ease;
    background: var(--q4);
    z-index: 1;
  }
  /* 파랑 농도 단일 (섞임 제거) */
  .sparkbar-fill.rate-excellent { background: var(--q2); }
  .sparkbar-fill.rate-great     { background: #5da4e8; }
  .sparkbar-fill.rate-ok        { background: #a3c9f0; }
  .sparkbar-fill.rate-low       { background: #d1e3f5; }
  .sparkbar-fill.rate-none      { background: var(--border); }
  :root[data-theme="dark"] .sparkbar-fill.rate-great { background: #3a79ad; }
  :root[data-theme="dark"] .sparkbar-fill.rate-ok    { background: #2a5377; }
  :root[data-theme="dark"] .sparkbar-fill.rate-low   { background: #1e3a54; }
  .sparkbar-day { font-size: 0.6875rem; color: var(--text-muted); font-weight: 600; }
  .sparkbar-wrap.today .sparkbar-day { color: var(--q2); font-weight: 700; }
  /* 목표선 범례 (섹션 제목 옆) */
  .sparkline-legend {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 0.625rem; color: var(--text-muted); font-weight: 500;
    margin-left: 8px; text-transform: none; letter-spacing: 0;
  }
  .sparkline-legend::before {
    content: '';
    display: inline-block;
    width: 14px; height: 0;
    border-top: 1px dashed var(--q2);
    opacity: 0.7;
  }

  .week-summary-section { margin-bottom: 14px; }
  .week-summary-section:last-child { margin-bottom: 0; }
  .section-title { font-size: 0.75rem; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.04em; }
  .stat-row { display: grid; grid-template-columns: 110px 1fr 50px; gap: 10px; align-items: center; margin-bottom: 6px; font-size: 0.8125rem; }
  .stat-row:last-child { margin-bottom: 0; }
  .stat-label { color: var(--text-muted); font-weight: 500; font-size: 0.75rem; }
  .stat-bar { height: 10px; background: var(--bg); border-radius: 5px; overflow: hidden; }
  /* Phase 9 (Reduce): 분면/프로젝트별 막대는 라벨로 구분. 색 통일 (중립 회색) */
  .stat-fill {
    height: 100%;
    background: var(--border-strong);
    border-radius: 5px;
    transition: width 0.3s;
  }
  .stat-val { text-align: right; font-weight: 600; font-variant-numeric: tabular-nums; font-size: 0.75rem; }

  /* C-1: 달성률 배지 (공통) */
  .rate-badge {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 3px 10px; border-radius: 12px;
    font-size: 0.8125rem; font-weight: 700;
    font-variant-numeric: tabular-nums;
    min-width: 48px;
    line-height: 1.3;
  }
  .rate-badge.rate-excellent { background: var(--rate-excellent-bg); color: var(--rate-excellent-fg); }
  .rate-badge.rate-great { background: var(--rate-great-bg); color: var(--rate-great-fg); }
  .rate-badge.rate-ok { background: var(--rate-ok-bg); color: var(--rate-ok-fg); }
  .rate-badge.rate-low { background: var(--rate-low-bg); color: var(--rate-low-fg); }
  .rate-badge.rate-none { background: var(--rate-none-bg); color: var(--rate-none-fg); }
  .rate-badge.mini { padding: 2px 7px; font-size: 0.6875rem; min-width: 38px; }

  .history-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; box-shadow: var(--shadow-sm); }
  .history-card-head { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 6px; }
  .history-week { font-size: 0.9375rem; font-weight: 700; }
  .history-time { font-size: 0.75rem; color: var(--text-muted); }

  /* C-2: 주 평균 헤더 */
  .history-week-summary {
    display: flex; align-items: center; gap: 10px;
    margin: 4px 0 10px;
    padding: 8px 12px;
    background: var(--bg-2);
    border-radius: var(--radius-sm);
  }
  .history-week-hours {
    font-size: 0.8125rem;
    color: var(--text);
    font-weight: 500;
    font-variant-numeric: tabular-nums;
  }
  .history-week-hours-muted { color: var(--text-muted); font-weight: 500; }

  /* C-3: 5일 미니 히트맵 */
  .history-heatmap {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 4px;
    margin: 0 0 10px;
  }
  .heat-cell {
    padding: 6px 4px;
    border-radius: var(--radius-sm);
    display: flex; flex-direction: column; align-items: center; gap: 1px;
    font-weight: 600;
    min-width: 0;
  }
  .heat-cell.rate-excellent { background: var(--rate-excellent-bg); color: var(--rate-excellent-fg); }
  .heat-cell.rate-great { background: var(--rate-great-bg); color: var(--rate-great-fg); }
  .heat-cell.rate-ok { background: var(--rate-ok-bg); color: var(--rate-ok-fg); }
  .heat-cell.rate-low { background: var(--rate-low-bg); color: var(--rate-low-fg); }
  .heat-cell.rate-none { background: var(--bg-2); color: var(--text-subtle); }
  .heat-cell-day { font-size: 0.6875rem; opacity: 0.85; font-weight: 600; }
  .heat-cell-rate { font-size: 0.8125rem; font-weight: 700; font-variant-numeric: tabular-nums; }

  /* C-4: 일자 카드 내 예상 vs 실제 이중 막대 */
  .hours-compare { display: flex; flex-direction: column; gap: 3px; margin: 0 0 6px; }
  .hours-row { display: grid; grid-template-columns: 22px 1fr 40px; gap: 5px; align-items: center; font-size: 0.6875rem; }
  .hours-label { color: var(--text-muted); font-weight: 600; font-size: 0.625rem; }
  .hours-track { height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
  .hours-fill { height: 100%; border-radius: 3px; transition: width 0.3s; min-width: 2px; }
  .hours-fill.est { background: var(--q2); }
  .hours-fill.actual { background: var(--accent-start); }
  .hours-val { text-align: right; font-variant-numeric: tabular-nums; font-weight: 700; color: var(--text); font-size: 0.6875rem; }
  .history-goals { display: flex; flex-direction: column; gap: 4px; margin: 4px 0 10px; }
  .history-goal-row { display: flex; align-items: flex-start; gap: 8px; padding: 6px 10px; background: var(--bg); border-radius: var(--radius-sm); font-size: 0.8125rem; line-height: 1.5; }
  .history-goal-row.week { border-left: 3px solid var(--q2); }
  .history-goal-row.month { border-left: 3px solid var(--q3); }
  .history-goal-tag { flex-shrink: 0; font-size: 0.625rem; font-weight: 700; padding: 2px 6px; border-radius: 3px; background: var(--card); color: var(--text-muted); letter-spacing: 0.04em; min-width: 18px; text-align: center; }
  .history-goal-row.week .history-goal-tag { color: var(--q2); }
  .history-goal-row.month .history-goal-tag { color: var(--q3); }
  .history-goal-text { color: var(--text); white-space: pre-wrap; word-break: break-word; font-weight: 500; }
  .history-days { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
  .history-day {
    background: var(--bg-2);
    border-radius: var(--radius-sm);
    padding: 8px 10px;
    font-size: 0.75rem;
    min-width: 0;
    border-left: 3px solid var(--border);
    transition: border-color 0.15s;
  }
  .history-day.rate-excellent { border-left-color: var(--rate-excellent-fg); }
  .history-day.rate-great { border-left-color: var(--rate-great-fg); }
  .history-day.rate-ok { border-left-color: var(--rate-ok-fg); }
  .history-day.rate-low { border-left-color: var(--rate-low-fg); }
  .history-day.rate-none { border-left-color: var(--border); }
  .history-day-head {
    display: flex; justify-content: space-between; align-items: center;
    gap: 6px; margin-bottom: 6px;
  }
  .history-day-date { font-weight: 700; font-size: 0.8125rem; }
  .history-day-tasks { display: flex; flex-direction: column; gap: 3px; font-size: 0.6875rem; }
  .history-task { display: flex; gap: 6px; align-items: baseline; word-break: break-all; }
  /* Phase 9 (Reduce): 분면 dot 제거, 프로젝트 칩으로 교체 */
  .history-task-proj {
    flex-shrink: 0;
    font-size: 0.625rem;
    font-weight: 600;
    padding: 1px 6px;
    border-radius: 8px;
    background: var(--proj-etc-bg);
    color: var(--proj-etc-fg);
    letter-spacing: 0.02em;
    line-height: 1.4;
  }
  .history-task-proj[data-v="팝콘"] { background: var(--proj-popcorn-bg); color: var(--proj-popcorn-fg); }
  .history-task-proj[data-v="타운"] { background: var(--proj-town-bg); color: var(--proj-town-fg); }
  .history-task-proj[data-v="기타"] { background: var(--proj-etc-bg); color: var(--proj-etc-fg); }
  .history-task-proj[data-v="공용"] { background: var(--proj-shared-bg); color: var(--proj-shared-fg); }
  .history-task-name { flex: 1; min-width: 0; }
  .history-task.done { opacity: 0.5; text-decoration: line-through; }
  .history-empty { text-align: center; color: var(--text-muted); padding: 32px 16px; font-size: 0.875rem; line-height: 1.8; }
  .history-count { color: var(--text-muted); font-size: 0.8125rem; }

  /* 월별 히스토리 — 일별 업무 리스트 + 최근 1달/전체 토글 */
  .monthly-scope-toggle { display: inline-flex; background: var(--bg); border-radius: var(--radius); padding: 2px; gap: 2px; }
  .scope-btn {
    border: 0; background: transparent;
    padding: 5px 12px; cursor: pointer;
    font-size: 0.8125rem; color: var(--text-muted);
    border-radius: var(--radius-sm);
    font-weight: 500; white-space: nowrap;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .scope-btn.active { background: var(--card); color: var(--text); box-shadow: var(--shadow-sm); font-weight: 600; }
  .scope-btn:hover:not(.active) { color: var(--text); }

  .monthly-list { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 18px; }
  .monthly-list::-webkit-scrollbar { width: 8px; height: 8px; }
  .monthly-list::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
  .monthly-list::-webkit-scrollbar-track { background: transparent; }

  .monthly-group { display: flex; flex-direction: column; gap: 8px; }
  .monthly-month-head {
    position: sticky; top: 0; z-index: 2;
    background: var(--bg);
    font-size: 0.9375rem; font-weight: 700;
    color: var(--text);
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    border-left: 4px solid var(--q2);
    display: flex; align-items: baseline; gap: 10px;
  }
  .monthly-month-count {
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
  }
  .monthly-month-rate {
    margin-left: auto;
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--text-muted);
  }
  .monthly-month-head .rate-badge { margin-left: auto; }
  .monthly-day-list { display: flex; flex-direction: column; gap: 6px; }
  /* 월별 리스트의 일자 카드는 더 넓고 크게 */
  .monthly-day-list .history-day {
    padding: 10px 14px;
    font-size: 0.8125rem;
  }
  .monthly-day-list .history-day-date { font-size: 0.9375rem; }
  .monthly-day-list .history-day-head { margin-bottom: 8px; }
  .monthly-day-list .hours-compare { margin-bottom: 8px; }
  .monthly-day-list .history-day-tasks { font-size: 0.75rem; gap: 4px; }

  .modal-backdrop { position: fixed; inset: 0; background: rgba(15, 15, 15, 0.4); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .modal-backdrop.hidden { display: none; }
  .modal { background: var(--card); border-radius: 8px; padding: 20px 24px; width: min(440px, 90vw); box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
  .modal-title { font-size: 1rem; font-weight: 700; margin: 0 0 10px; }
  .modal-message { color: var(--text); font-size: 0.875rem; margin: 0 0 18px; line-height: 1.6; white-space: pre-wrap; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

  @media (max-width: 1100px) {
    :root { --sidebar-width: 440px; }
    .side-row.routine-row,
    .side-row.routine-head { grid-template-columns: 46px 50px 52px minmax(60px, 1fr) 50px 80px 40px 20px; }
  }
  @media (max-width: 768px) {
    .weekly-layout { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
    .sidebar { border-right: 0; border-bottom: 1px solid var(--border); max-height: 320px; }
    .app-title-sub { display: none; }
    .history-days { grid-template-columns: 1fr; }
    .app-header { flex-wrap: wrap; gap: 8px; }
    .week-summary-kpis { grid-template-columns: 1fr; }
  }

  .hidden { display: none !important; }

  /* Phase 7b: SVG 아이콘 공통 */
  .icon {
    width: 14px;
    height: 14px;
    stroke: currentColor;
    stroke-width: 2;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
    vertical-align: -2px;
    flex-shrink: 0;
  }
  .icon-lg { width: 16px; height: 16px; vertical-align: -3px; }
  .btn .icon, .tab-btn .icon { margin-right: 4px; }

  /* Phase 7a: 상호작용 힌트 강화 (hover) */
  .task-row:not(.task-head) { transition: background 0.15s; }
  .task-row:not(.task-head):hover { background: var(--bg-2); }
  .st-cell:not(.st-head):not(.empty-row) { transition: background 0.15s; }
  .st-cell:not(.st-head):not(.empty-row):hover { background: var(--bg); }
  .history-day { transition: background 0.15s, box-shadow 0.15s; }
  .history-day:hover { background: var(--card); box-shadow: var(--shadow-sm); }

  /* Phase 7a: 업무명 ellipsis (주간 히스토리만 — 좁은 grid에서 잘림 방지) */
  .history-days .history-task { flex-wrap: nowrap; word-break: normal; }
  .history-days .history-task-name {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* Phase 7a: 다크모드 빨강 채도 완화 (눈부심 감소) */
  :root[data-theme="dark"] {
    --q1: #f56c6c;
  }

  /* Phase 7a: 오늘 컬럼 미세 하이라이트 */
  .grid-cell.today-col { background: var(--q2-soft); }
  .grid-cell.summary-cell.today-col { background: var(--q2-soft); }
  .grid-cell.quadrant-cell.today-col:hover { background: var(--q2-bg); }

  /* 미니 달력 (Date Picker) */
  .date-picker {
    position: fixed;
    z-index: 1000;
    background: var(--card);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    box-shadow: 0 8px 24px rgba(15, 15, 15, 0.16);
    padding: 10px 10px 8px;
    width: 248px;
    user-select: none;
    font-family: inherit;
  }
  :root[data-theme="dark"] .date-picker { box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5); }

  .dp-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px;
    gap: 4px;
  }
  .dp-nav {
    border: 0; background: transparent;
    width: 28px; height: 28px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    color: var(--text);
    font-size: 0.75rem;
    display: inline-flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .dp-nav:hover { background: var(--bg); color: var(--q2); }
  .dp-title {
    font-size: 0.875rem; font-weight: 700;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    flex: 1; text-align: center;
  }

  .dp-weekdays {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    margin-bottom: 4px;
  }
  .dp-weekdays span {
    text-align: center;
    font-size: 0.6875rem;
    color: var(--text-muted);
    font-weight: 600;
    padding: 4px 0;
  }
  .dp-weekdays span:first-child { color: var(--q1); }
  .dp-weekdays span:last-child { color: var(--q2); }

  .dp-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }
  .dp-cell {
    aspect-ratio: 1;
    min-height: 28px;
    border: 1px solid transparent;
    background: transparent;
    border-radius: var(--radius-sm);
    font-size: 0.8125rem;
    color: var(--text);
    cursor: pointer;
    font-weight: 500;
    display: inline-flex; align-items: center; justify-content: center;
    transition: background 0.12s, color 0.12s, border-color 0.12s;
    font-family: inherit;
    padding: 0;
  }
  .dp-cell:hover:not(.dp-empty):not(.dp-selected) { background: var(--q2-bg); color: var(--q2); }
  .dp-cell.dp-empty { cursor: default; background: transparent; }
  .dp-cell.dp-today { border-color: var(--q2); color: var(--q2); font-weight: 700; }
  .dp-cell.dp-selected {
    background: var(--q2);
    color: #fff;
    font-weight: 700;
    border-color: var(--q2);
  }
  .dp-cell.dp-sun:not(.dp-selected):not(.dp-today) { color: var(--q1); }
  .dp-cell.dp-sat:not(.dp-selected):not(.dp-today) { color: var(--q2); }

  .dp-actions {
    display: flex; gap: 4px;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }
  .dp-action {
    flex: 1;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    padding: 6px 4px;
    border-radius: var(--radius-sm);
    font-size: 0.6875rem;
    cursor: pointer;
    font-weight: 600;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    font-family: inherit;
    white-space: nowrap;
  }
  .dp-action:hover { background: var(--bg); border-color: var(--text-muted); }
  .dp-action.dp-today-btn:hover { border-color: var(--q2); color: var(--q2); }
  .dp-action.dp-unset-btn:hover { border-color: var(--text-muted); }
  .dp-action.dp-clear-btn:hover { border-color: var(--q1); color: var(--q1); }

  /* 사이드바 스크롤바 완전 숨김 (스크롤은 가능) */
  .sidebar { scrollbar-width: none; -ms-overflow-style: none; }
  .sidebar::-webkit-scrollbar { display: none; width: 0; height: 0; }

  .weekly-grid::-webkit-scrollbar,
  .history-list::-webkit-scrollbar { width: 8px; height: 8px; }
  .weekly-grid::-webkit-scrollbar-thumb,
  .history-list::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
  .weekly-grid::-webkit-scrollbar-track,
  .history-list::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1 class="app-title">업무일지</h1>
      <div class="tabs" role="tablist">
        <button class="tab-btn active" data-tab="weekly" onclick="switchTab('weekly')">주간</button>
        <button class="tab-btn" data-tab="history-weekly" onclick="switchTab('history-weekly')">주간 히스토리</button>
        <button class="tab-btn" data-tab="history-monthly" onclick="switchTab('history-monthly')">월별 히스토리</button>
      </div>
      <div class="header-actions">
        <button id="themeToggle" class="theme-toggle" onclick="toggleTheme()" title="테마"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg></button>
        <div class="scale-group" title="전체 크기">
          <button class="scale-btn" data-scale="sm" onclick="setScale('sm')">A-</button>
          <button class="scale-btn active" data-scale="md" onclick="setScale('md')">A</button>
          <button class="scale-btn" data-scale="lg" onclick="setScale('lg')">A+</button>
        </div>
      </div>
    </header>

    <main class="tab-content active" id="tab-weekly">
      <div class="weekly-layout">
        <aside class="sidebar">
          <div class="side-section">
            <h2 class="side-title"><span class="side-title-main">메인 목표</span></h2>
            <div class="main-goal-group">
              <div class="goal-item goal-week" id="goal-week">
                <span class="goal-label">이번 주 목표</span>
                <div class="goal-body" onclick="startEditGoal('week')"></div>
                <textarea class="goal-edit" placeholder="이번 주 핵심 목표를 적어주세요" onblur="endEditGoal('week', this.value)"></textarea>
              </div>
              <div class="goal-item goal-month" id="goal-month">
                <span class="goal-label">이번 달 목표</span>
                <div class="goal-body" onclick="startEditGoal('month')"></div>
                <textarea class="goal-edit" placeholder="이번 달 핵심 목표를 적어주세요" onblur="endEditGoal('month', this.value)"></textarea>
              </div>
            </div>
          </div>

          <div class="side-section">
            <h2 class="side-title">
              <span class="side-title-main">● 중요한 업무 추적 <span class="side-title-count" id="importantCount">0</span></span>
              <button class="btn sm ghost" onclick="addImportantTask()">+ 추가</button>
            </h2>
            <div id="importantList" class="side-table"></div>
          </div>

          <div class="side-section">
            <h2 class="side-title">
              <span class="side-title-main">● 상시 업무 추적 <span class="side-title-count" id="routineCount">0</span></span>
              <button class="btn sm ghost" onclick="addRoutine()">+ 추가</button>
            </h2>
            <div id="routineList" class="side-table"></div>
          </div>

        </aside>

        <div class="sidebar-resizer" id="sidebarResizer" title="드래그로 너비 조절"></div>

        <section class="week-wrapper">
          <div id="weeklyGrid" class="weekly-grid"></div>
          <div class="card-width-bar">
            <button class="btn primary sm" onclick="askArchive()" title="현재 주를 히스토리에 보관하고 이번 주로 초기화"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 7h18v4H3zM5 11v9a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-9M10 15h4"/></svg> 주간 갱신</button>
            <span class="card-width-sep"></span>
            <span>카드 너비</span>
            <input type="range" id="cardWidthSlider" min="760" max="1400" step="20" value="900" oninput="updateCardWidth(this.value)">
            <span id="cardWidthValue" class="card-width-value">900px</span>
            <span style="flex:1"></span>
            <div class="settings-menu">

                  <span class="settings-item-desc">모든 열·사이드바·카드·목표 높이를 기본값으로 저장</span>

          <button class="btn" onclick="document.getElementById('importInput').click()"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg> JSON 복원</button>
