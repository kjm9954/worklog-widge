<script>
(function() {
  'use strict';

  const STORAGE_KEY = 'worklog-widget-state-v1';
  const SCALE_KEY = 'worklog-scale';
  const CARD_WIDTH_KEY = 'worklog-card-width';
  const THEME_KEY = 'worklog-theme';
  const COL_WIDTHS_KEY = 'worklog-col-widths';
  const SIDEBAR_WIDTH_KEY = 'worklog-sidebar-width';
  const CUSTOM_DEFAULTS_KEY = 'worklog-col-custom-defaults';
  const COL_MIN = { project: 40, name: 90, target: 58, start: 70, end: 70, progress: 40, est: 44, done: 28, note: 70, delete: 20 };
  const COL_DEFAULT = { project: 62, name: 200, target: 72, start: 92, end: 92, progress: 56, est: 64, done: 40, note: 160, delete: 24 };

  const DAY_NAMES = ['일', '월', '화', '수', '목', '금', '토'];
  const DAILY_PROJECTS = ['팝콘', '타운', '기타'];
  const SIDE_PROJECTS = ['팝콘', '타운', '공용'];
  const IMPORTANT_CATEGORIES = ['에셋', '빌드', '스터디', '기타'];
  const ROUTINE_CATEGORIES = ['버전', '월별', '상시'];
  const ROUTINE_SUB = ['기믹', '테이블', 'QA', '아트', '운영', '기타'];
  const STATUSES = ['대기', '진행중', '완료'];
  const PERIODS = ['오전', '오후'];

  const QUADRANT_DEFS = [
    { key: 'q1', label: '# 중요 O\n∩ 긴급 O' },
    { key: 'q2', label: '# 중요 O\n∩ 긴급 X' },
    { key: 'q3', label: '# 중요 X\n∩ 긴급 O' },
    { key: 'q4', label: '# 중요 X\n∩ 긴급 X' }
  ];

  let state = null;
  let modalCallback = null;

  // ---------- 유틸 ----------
  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
  }

  function escapeHtml(str) {
    if (str == null) return '';
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function formatDate(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }

  function formatDateDisplay(dateStr) {
    if (!dateStr) return '';
    if (dateStr === DASH) return DASH;
    const parts = dateStr.split('-');
    if (parts.length < 3) return dateStr;
    return `${parseInt(parts[1], 10)}/${parseInt(parts[2], 10)}`;
  }

  // 사용자 입력 "4/13", "04/13", "4-13", "413", "2026-04-13" 모두 YYYY-MM-DD로 파싱
  // "-" 단독 입력은 명시적 미설정(DASH) 상태로 구분 저장
  const DASH = '-';
  function parseDateInput(str, fallbackYear) {
    if (!str) return '';
    const s = String(str).trim();
    if (!s) return '';
    // 명시적 "미설정": - , — , − , – 등 다양한 대시
    if (/^[\-—−–]$/.test(s)) return DASH;
    const y0 = fallbackYear || new Date().getFullYear();
    // YYYY-MM-DD
    let m = s.match(/^(\d{4})[\-\/\.](\d{1,2})[\-\/\.](\d{1,2})$/);
    if (m) return `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;
    // M/D or M-D
    m = s.match(/^(\d{1,2})[\-\/\.](\d{1,2})$/);
    if (m) return `${y0}-${String(m[1]).padStart(2,'0')}-${String(m[2]).padStart(2,'0')}`;
    // MMDD (3 or 4 digits)
    m = s.match(/^(\d{3,4})$/);
    if (m) {
      const ss = m[1].padStart(4, '0');
      return `${y0}-${ss.slice(0,2)}-${ss.slice(2,4)}`;
    }
    return '';
  }

  function getThisMonday(base) {
    const d = base ? new Date(base) : new Date();
    const day = d.getDay();
    const diff = day === 0 ? -6 : 1 - day;
    d.setDate(d.getDate() + diff);
    d.setHours(0, 0, 0, 0);
    return d;
  }

  function createWeekDays(monday) {
    const days = [];
    for (let i = 0; i < 5; i++) {
      const d = new Date(monday);
      d.setDate(monday.getDate() + i);
      days.push({
        date: formatDate(d), dayName: DAY_NAMES[d.getDay()],
        schedule: '', memo: '',
        quadrants: { q1: [], q2: [], q3: [], q4: [] }
      });
    }
    return days;
  }

  // 예상시간 파싱: 숫자("3.0", "3") / "-"(명시적 미설정) / 빈값 허용
  function parseEstimated(str) {
    if (str == null) return '';
    const s = String(str).trim();
    if (!s) return '';
    if (/^[\-—−–]$/.test(s)) return DASH;
    const n = parseFloat(s);
    if (isNaN(n) || n < 0) return '';
    return String(n);
  }

  function calcDDay(targetDate) {
    if (!targetDate) return null;
    if (targetDate === DASH) return null; // 명시적 미설정
    const today = new Date(); today.setHours(0, 0, 0, 0);
    const target = new Date(targetDate);
    if (isNaN(target.getTime())) return null;
    target.setHours(0, 0, 0, 0);
    return Math.round((target - today) / (1000 * 60 * 60 * 24));
  }

  function formatDDay(diff) {
    if (diff == null) return '';
    if (diff === 0) return 'D-DAY';
    if (diff > 0) return `D-${diff}`;
    return `D+${Math.abs(diff)}`;
  }

  function ddayClass(diff) {
    if (diff == null) return '';
    if (diff < 0) return 'over critical';
    if (diff <= 1) return 'near critical';
    if (diff <= 3) return 'near';
    if (diff <= 7) return 'soon';
    return '';
  }

  function parseTime(str) {
    if (str == null) return '';
    let s = String(str).trim().toLowerCase();
    if (!s) return '';
    let period = null;
    if (/(오후|pm)/i.test(s)) { period = 'pm'; s = s.replace(/(오후|pm)/gi, '').trim(); }
    else if (/(오전|am)/i.test(s)) { period = 'am'; s = s.replace(/(오전|am)/gi, '').trim(); }
    s = s.replace(/[^\d:]/g, '');
    if (!s) return '';
    let hh, mm;
    if (s.includes(':')) {
      const parts = s.split(':');
      hh = parseInt(parts[0], 10);
      mm = parseInt(parts[1] || '0', 10);
    } else if (s.length <= 2) { hh = parseInt(s, 10); mm = 0; }
    else if (s.length === 3) { hh = parseInt(s.slice(0, 1), 10); mm = parseInt(s.slice(1), 10); }
    else { hh = parseInt(s.slice(0, 2), 10); mm = parseInt(s.slice(2, 4), 10); }
    if (isNaN(hh) || isNaN(mm)) return '';
    if (period === 'pm' && hh < 12) hh += 12;
    else if (period === 'am' && hh === 12) hh = 0;
    if (hh < 0 || hh > 23) return '';
    if (mm < 0) mm = 0;
    if (mm > 59) mm = 59;
    return `${String(hh).padStart(2, '0')}:${String(mm).padStart(2, '0')}`;
  }

  function formatTime12(hhmm) {
    if (!hhmm) return { period: '오전', text: '' };
    const parts = String(hhmm).split(':');
    if (parts.length < 2) return { period: '오전', text: '' };
    const h = parseInt(parts[0], 10);
    const m = parseInt(parts[1], 10);
    if (isNaN(h) || isNaN(m)) return { period: '오전', text: '' };
    const period = h >= 12 ? '오후' : '오전';
    let h12 = h % 12;
    if (h12 === 0) h12 = 12;
    return { period, text: `${h12}:${String(m).padStart(2, '0')}` };
  }

  function formatNowTime() {
    const d = new Date();
    return `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
  }

  function calcHours(start, end) {
    if (!start || !end) return 0;
    const sParts = start.split(':').map(Number);
    const eParts = end.split(':').map(Number);
    if (sParts.length < 2 || eParts.length < 2) return 0;
    const diff = (eParts[0] * 60 + eParts[1]) - (sParts[0] * 60 + sParts[1]);
    return diff > 0 ? diff / 60 : 0;
  }

  function calcTaskHours(t) {
    const base = calcHours(t.startTime, t.endTime);
    const breakMin = parseInt(t.breakMinutes, 10) || 0;
    if (breakMin <= 0) return base;
    if (t.breakMode === 'include') return base;
    return Math.max(0, base - breakMin / 60);
  }

  function calcDayStats(day) {
    let total = 0, done = 0, actualHours = 0, estimatedHours = 0;
    ['q1','q2','q3','q4'].forEach(key => {
      const tasks = (day.quadrants && day.quadrants[key]) || [];
      tasks.forEach(t => {
        total++;
        if (t.done) done++;
        actualHours += calcTaskHours(t);
        const est = parseFloat(t.estimatedHours);
        if (!isNaN(est)) estimatedHours += est;
      });
    });
    const rate = total === 0 ? 0 : Math.round((done / total) * 100);
    return { total, done, rate, actualHours, estimatedHours };
  }

  function calcWeekStats(days) {
    let totalHours = 0, estHours = 0, total = 0, done = 0;
    const byQuadrant = { q1: 0, q2: 0, q3: 0, q4: 0 };
    const byProject = { '팝콘': 0, '타운': 0, '기타': 0 };
    days.forEach(d => {
      ['q1','q2','q3','q4'].forEach(qk => {
        (d.quadrants[qk] || []).forEach(t => {
          const h = calcTaskHours(t);
          totalHours += h;
          byQuadrant[qk] += h;
          if (byProject.hasOwnProperty(t.project)) byProject[t.project] += h;
          const est = parseFloat(t.estimatedHours);
          if (!isNaN(est)) estHours += est;
          total++;
          if (t.done) done++;
        });
      });
    });
    const rate = total === 0 ? 0 : Math.round(done/total*100);
    return { totalHours, estHours, rate, byQuadrant, byProject, total, done };
  }

  // ---------- SVG 아이콘 라이브러리 (Phase 7b) ----------
  const ICONS = {
    archive:  '<svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 7h18v4H3zM5 11v9a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-9M10 15h4"/></svg>',
    pin:      '<svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 17v5M8 3h8v3l-1 1v5l2 2v2H7v-2l2-2V7L8 6z"/></svg>',
    reset:    '<svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 12a9 9 0 1 0 3-6.7L3 8M3 3v5h5"/></svg>',
    save:     '<svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2zM17 21v-8H7v8M7 3v5h8"/></svg>',
    upload:   '<svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>',
    download: '<svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>',
    moon:     '<svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>',
    sun:      '<svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>'
  };
  function icon(name) { return ICONS[name] || ''; }

  // ---------- 미니 달력 (Date Picker) ----------
  const datePicker = {
    el: null,
    currentInput: null,
    currentMonth: null
  };

  function ensureDatePickerEl() {
    if (datePicker.el) return datePicker.el;
    const el = document.createElement('div');
    el.className = 'date-picker hidden';
    el.innerHTML = [
      '<div class="dp-header">',
      '  <button class="dp-nav" data-dir="-1" title="이전 달">◀</button>',
      '  <span class="dp-title"></span>',
      '  <button class="dp-nav" data-dir="1" title="다음 달">▶</button>',
      '</div>',
      '<div class="dp-weekdays"><span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span></div>',
      '<div class="dp-grid"></div>',
      '<div class="dp-actions">',
      '  <button class="dp-action dp-today-btn" data-act="today">오늘</button>',
      '  <button class="dp-action dp-unset-btn" data-act="unset">미설정 -</button>',
      '  <button class="dp-action dp-clear-btn" data-act="clear">지우기</button>',
      '</div>'
    ].join('');
    document.body.appendChild(el);

    el.addEventListener('mousedown', e => e.preventDefault()); // input blur 방지

    el.querySelectorAll('.dp-nav').forEach(btn => {
      btn.addEventListener('click', () => {
        if (!datePicker.currentMonth) return;
        const dir = parseInt(btn.dataset.dir, 10);
        datePicker.currentMonth.setMonth(datePicker.currentMonth.getMonth() + dir);
        renderDatePickerGrid();
      });
    });

    el.querySelector('.dp-grid').addEventListener('click', e => {
      const cell = e.target.closest('.dp-cell');
      if (!cell || cell.classList.contains('dp-empty')) return;
      const date = cell.dataset.date;
      if (date) commitDatePick(date);
    });

    el.querySelectorAll('.dp-action').forEach(btn => {
      btn.addEventListener('click', () => {
        const act = btn.dataset.act;
        if (act === 'today') commitDatePick(formatDate(new Date()));
        else if (act === 'unset') commitDatePick(DASH);
        else if (act === 'clear') commitDatePick('');
      });
    });

    datePicker.el = el;
    return el;
  }

  function openDatePickerFor(input) {
    ensureDatePickerEl();
    datePicker.currentInput = input;
    // 현재 input 값 파싱 → 기준 달 결정
    const y0 = new Date().getFullYear();
    const parsed = parseDateInput(input.value || '', y0);
    let base;
    if (parsed && parsed !== DASH) {
      base = new Date(parsed);
      if (isNaN(base.getTime())) base = new Date();
    } else {
      base = new Date();
    }
    datePicker.currentMonth = new Date(base.getFullYear(), base.getMonth(), 1);
    positionDatePicker(input);
    renderDatePickerGrid();
    datePicker.el.classList.remove('hidden');
  }

  function closeDatePicker() {
    if (datePicker.el) datePicker.el.classList.add('hidden');
    datePicker.currentInput = null;
    datePicker.currentMonth = null;
  }

  function commitDatePick(dateStr) {
    const input = datePicker.currentInput;
    if (input) {
      let displayValue;
      if (dateStr === DASH) displayValue = DASH;
      else if (!dateStr) displayValue = '';
      else displayValue = formatDateDisplay(dateStr);
      input.value = displayValue;
      input.dispatchEvent(new Event('change', { bubbles: true }));
    }
    closeDatePicker();
  }

  function positionDatePicker(input) {
    const rect = input.getBoundingClientRect();
    const el = datePicker.el;
    const width = 248 + 20; // padding 감안
    const height = 290;
    let left = rect.left;
    if (left + width > window.innerWidth - 8) left = window.innerWidth - width - 8;
    if (left < 8) left = 8;
    let top = rect.bottom + 4;
    if (top + height > window.innerHeight - 8) top = rect.top - height - 4;
    if (top < 8) top = 8;
    el.style.left = left + 'px';
    el.style.top = top + 'px';
  }

  function renderDatePickerGrid() {
    const el = datePicker.el;
    if (!el || !datePicker.currentMonth) return;
    const m = datePicker.currentMonth;
    const y = m.getFullYear();
    const mo = m.getMonth();

    el.querySelector('.dp-title').textContent = `${y}년 ${mo + 1}월`;

    const firstDow = new Date(y, mo, 1).getDay();
    const lastDate = new Date(y, mo + 1, 0).getDate();

    const today = formatDate(new Date());
    const input = datePicker.currentInput;
    const selectedYmd = input ? parseDateInput(input.value || '', y) : '';

    const cells = [];
    for (let i = 0; i < firstDow; i++) {
      cells.push('<span class="dp-cell dp-empty"></span>');
    }
    for (let d = 1; d <= lastDate; d++) {
      const dateStr = `${y}-${String(mo + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
      const dow = new Date(y, mo, d).getDay();
      const classes = ['dp-cell'];
      if (dateStr === today) classes.push('dp-today');
      if (dateStr === selectedYmd) classes.push('dp-selected');
      if (dow === 0) classes.push('dp-sun');
      if (dow === 6) classes.push('dp-sat');
      cells.push(`<button type="button" class="${classes.join(' ')}" data-date="${dateStr}">${d}</button>`);
    }
    el.querySelector('.dp-grid').innerHTML = cells.join('');
  }

  function initDatePicker() {
    // 날짜 input 포커스 시 팝업
    document.addEventListener('focusin', e => {
      const input = e.target.closest && e.target.closest('.date-picker-input');
      if (input) {
        openDatePickerFor(input);
        return;
      }
      // 달력 내부 focus는 무시
      if (datePicker.el && datePicker.el.contains(e.target)) return;
      // 그 외 다른 곳으로 포커스 이동 → 닫기
      if (datePicker.el && !datePicker.el.classList.contains('hidden')) closeDatePicker();
    });
    // 바깥 mousedown 닫기
    document.addEventListener('mousedown', e => {
      if (!datePicker.el || datePicker.el.classList.contains('hidden')) return;
      if (datePicker.el.contains(e.target)) return;
      if (e.target.closest && e.target.closest('.date-picker-input')) return;
      closeDatePicker();
    });
    // Escape
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && datePicker.el && !datePicker.el.classList.contains('hidden')) {
        closeDatePicker();
      }
    });
    // 스크롤 시 닫기 (위치 틀어짐 방지)
    window.addEventListener('scroll', () => {
      if (datePicker.el && !datePicker.el.classList.contains('hidden')) closeDatePicker();
    }, true);
  }

  // ---------- Phase 3 헬퍼: 달성률 / 트렌드 / 시각화 ----------
  function rateClass(rate) {
    if (rate == null || isNaN(rate)) return 'rate-none';
    if (rate >= 100) return 'rate-excellent';
    if (rate >= 80) return 'rate-great';
    if (rate >= 50) return 'rate-ok';
    if (rate > 0) return 'rate-low';
    return 'rate-none';
  }

  function prevWeekAvgRate() {
    if (!state.history || state.history.length === 0) return null;
    const sorted = state.history.slice().sort((a, b) => (b.archivedAt || '').localeCompare(a.archivedAt || ''));
    const lastWeek = sorted[0];
    if (!lastWeek || !Array.isArray(lastWeek.days) || lastWeek.days.length === 0) return null;
    const stats = calcWeekStats(lastWeek.days);
    return stats.rate;
  }

  function donutSvg(rate, size) {
    const s = size || 112;
    const stroke = 10;
    const r = (s / 2) - (stroke / 2) - 2;
    const c = 2 * Math.PI * r;
    const pct = Math.max(0, Math.min(100, rate || 0));
    const dashOffset = c * (1 - pct / 100);
    const cx = s / 2;
    const cy = s / 2;
    return `
      <svg class="donut ${rateClass(rate)}" width="${s}" height="${s}" viewBox="0 0 ${s} ${s}" role="img" aria-label="달성률 ${rate}%">
        <circle class="donut-bg" cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke-width="${stroke}"/>
        <circle class="donut-fg" cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke-width="${stroke}"
                stroke-dasharray="${c.toFixed(2)}" stroke-dashoffset="${dashOffset.toFixed(2)}"
                transform="rotate(-90 ${cx} ${cy})" stroke-linecap="round"/>
        <text class="donut-text" x="${cx}" y="${cy - 3}" text-anchor="middle" dominant-baseline="central">${rate}%</text>
        <text class="donut-sub" x="${cx}" y="${cy + 16}" text-anchor="middle" dominant-baseline="central">달성률</text>
      </svg>`;
  }

  function sparklineHtml(days) {
    const today = formatDate(new Date());
    const items = days.map(d => {
      const st = calcDayStats(d);
      const isToday = d.date === today;
      const h = Math.max(0, Math.min(100, st.rate));
      return `
        <div class="sparkbar-wrap ${isToday ? 'today' : ''}" title="${escapeHtml(d.dayName)} ${escapeHtml(formatDateDisplay(d.date))} · 달성률 ${st.rate}%">
          <span class="sparkbar-label">${st.total > 0 ? st.rate + '%' : '—'}</span>
          <div class="sparkbar-track">
            <div class="sparkbar-fill ${rateClass(st.total > 0 ? st.rate : null)}" style="height:${h}%"></div>
          </div>
          <span class="sparkbar-day">${escapeHtml(d.dayName)}</span>
        </div>`;
    }).join('');
    return `<div class="sparkline">${items}</div>`;
  }

  function trendChipHtml(currentRate) {
    const prev = prevWeekAvgRate();
    if (prev == null) {
      return `<span class="trend-chip-label">지난 주 기록 없음</span>`;
    }
    const diff = currentRate - prev;
    if (diff === 0) {
      return `<span class="trend-chip trend-flat" title="지난 주 평균 ${prev}%">± 0%p <span class="trend-chip-label">vs 지난주 ${prev}%</span></span>`;
    }
    if (diff > 0) {
      return `<span class="trend-chip trend-up" title="지난 주 평균 ${prev}%">▲ +${diff}%p <span class="trend-chip-label">vs 지난주 ${prev}%</span></span>`;
    }
    return `<span class="trend-chip trend-down" title="지난 주 평균 ${prev}%">▼ ${diff}%p <span class="trend-chip-label">vs 지난주 ${prev}%</span></span>`;
  }

  function heatmapHtml(days) {
    const cells = (days || []).map(d => {
      const st = calcDayStats(d);
      const rate = st.total > 0 ? st.rate : null;
      return `
        <div class="heat-cell ${rateClass(rate)}" title="${escapeHtml(d.dayName)} ${escapeHtml(formatDateDisplay(d.date))}">
          <span class="heat-cell-day">${escapeHtml(d.dayName)}</span>
          <span class="heat-cell-rate">${rate == null ? '—' : rate + '%'}</span>
        </div>`;
    }).join('');
    return `<div class="history-heatmap">${cells}</div>`;
  }

  function hoursCompareHtml(actualH, estH) {
    if (actualH <= 0 && estH <= 0) return '';
    const maxH = Math.max(actualH, estH, 0.1);
    const estPct = Math.round((estH / maxH) * 100);
    const actPct = Math.round((actualH / maxH) * 100);
    return `
      <div class="hours-compare">
        <div class="hours-row">
          <span class="hours-label">예상</span>
          <div class="hours-track"><div class="hours-fill est" style="width:${estPct}%"></div></div>
          <span class="hours-val">${estH.toFixed(1)}h</span>
        </div>
        <div class="hours-row">
          <span class="hours-label">실제</span>
          <div class="hours-track"><div class="hours-fill actual" style="width:${actPct}%"></div></div>
          <span class="hours-val">${actualH.toFixed(1)}h</span>
        </div>
      </div>`;
  }

  function buildSelect(cls, value, options, onchange, formatter) {
    const fmt = typeof formatter === 'function' ? formatter : (o => o);
    const opts = options.map(o => `<option value="${escapeHtml(o)}"${o === value ? ' selected' : ''}>${escapeHtml(fmt(o))}</option>`).join('');
    return `<select class="${cls}" data-v="${escapeHtml(value)}" onchange="${onchange}; this.dataset.v=this.value;">${opts}</select>`;
  }

  // 상태 셀렉트 — 옵션 텍스트 앞에 ● 점 prefix (색은 status-chip text-color로 자동 적용)
  const STATUS_PREFIX = s => '● ' + s;

  // ---------- 상태 ----------
  function createInitialState() {
    const monday = getThisMonday();
    return {
      version: 3.5,
      goals: { week: '', month: '' },
      weekStart: formatDate(monday),
      days: createWeekDays(monday),
      importantTasks: [], routines: [], history: []
    };
  }

  function migrateState(s) {
    if (!s || typeof s !== 'object') return createInitialState();
    // mainGoal(구) → goals.week(신) 마이그레이션
    if (!s.goals || typeof s.goals !== 'object') {
      s.goals = { week: typeof s.mainGoal === 'string' ? s.mainGoal : '', month: '' };
    }
    s.goals.week = typeof s.goals.week === 'string' ? s.goals.week : '';
    s.goals.month = typeof s.goals.month === 'string' ? s.goals.month : '';
    delete s.mainGoal;
    if (!s.weekStart || !Array.isArray(s.days) || s.days.length === 0) {
      const monday = getThisMonday();
      s.weekStart = formatDate(monday);
      s.days = createWeekDays(monday);
    }
    s.days.forEach(day => {
      day.schedule = day.schedule || '';
      day.memo = day.memo || '';
      day.quadrants = day.quadrants || { q1: [], q2: [], q3: [], q4: [] };
      ['q1','q2','q3','q4'].forEach(k => {
        if (!Array.isArray(day.quadrants[k])) day.quadrants[k] = [];
        day.quadrants[k].forEach(t => {
          if (!t.id) t.id = uid();
          if (!DAILY_PROJECTS.includes(t.project)) t.project = '팝콘';
          t.name = t.name || '';
          t.targetDate = t.targetDate || day.date;
          t.startTime = t.startTime || '';
          t.endTime = t.endTime || '';
          t.breakMinutes = Number(t.breakMinutes) || 0;
          t.breakMode = t.breakMode === 'include' ? 'include' : 'exclude';
          t.estimatedHours = t.estimatedHours == null ? '' : String(t.estimatedHours);
          t.done = !!t.done;
          t.note = t.note || '';
        });
      });
    });
    s.importantTasks = Array.isArray(s.importantTasks) ? s.importantTasks : [];
    s.importantTasks.forEach(it => {
      if (!it.id) it.id = uid();
      if (!SIDE_PROJECTS.includes(it.project)) it.project = '팝콘';
      if (!IMPORTANT_CATEGORIES.includes(it.category)) it.category = '기타';
      if (!STATUSES.includes(it.status)) it.status = '대기';
      it.name = it.name || '';
      it.targetDate = it.targetDate || '';
      it.note = it.note || '';
    });
    s.routines = Array.isArray(s.routines) ? s.routines : [];
    s.routines.forEach(r => {
      if (!r.id) r.id = uid();
      if (!SIDE_PROJECTS.includes(r.project)) r.project = '팝콘';
      if (!ROUTINE_CATEGORIES.includes(r.category)) r.category = '상시';
      if (!ROUTINE_SUB.includes(r.subCategory)) r.subCategory = '기타';
      if (!STATUSES.includes(r.status)) r.status = '대기';
      r.name = r.name || '';
      r.targetDate = r.targetDate || '';
      r.note = r.note || '';
    });
    s.history = Array.isArray(s.history) ? s.history : [];
    s.history.forEach(h => {
      if (!h.goals || typeof h.goals !== 'object') {
        h.goals = { week: typeof h.mainGoal === 'string' ? h.mainGoal : '', month: '' };
      }
      h.goals.week = typeof h.goals.week === 'string' ? h.goals.week : '';
      h.goals.month = typeof h.goals.month === 'string' ? h.goals.month : '';
      delete h.mainGoal;
    });
    s.version = 3.5;
    return s;
  }

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return createInitialState();
      return migrateState(JSON.parse(raw));
    } catch (err) {
      console.error('상태 로드 실패:', err);
      return createInitialState();
    }
  }

  function saveState() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    } catch (err) {
      console.error('저장 실패:', err);
      showModal('저장 실패', '저장 중 문제가 발생했습니다.\n' + (err.message || ''), null);
    }
  }

  // ---------- 렌더 ----------
  function render() {
    renderGoals();
    renderImportantTasks();
    renderRoutines();
    renderWeekGrid();
    renderHistory();
    renderMonthlyHistory();
  }

  function renderGoals() {
    renderOneGoal('week', state.goals.week);
    renderOneGoal('month', state.goals.month);
  }

  function renderOneGoal(kind, value) {
    const item = document.getElementById('goal-' + kind);
    if (!item) return;
    const body = item.querySelector('.goal-body');
    const edit = item.querySelector('.goal-edit');
    if (!body || !edit) return;
    const placeholder = kind === 'week' ? '이번 주 핵심 목표를 적어주세요' : '이번 달 핵심 목표를 적어주세요';
    if (value && value.trim()) {
      body.textContent = value;
      body.classList.remove('empty');
    } else {
      body.textContent = placeholder;
      body.classList.add('empty');
    }
    // 편집 중이면 사용자 입력 보존 (덮어쓰지 않음)
    if (!item.classList.contains('editing') && edit.value !== value) {
      edit.value = value || '';
    }
  }

  function renderImportantTasks() {
    const list = document.getElementById('importantList');
    if (!list) return;
    list.className = 'side-table important-grid';
    const counter = document.getElementById('importantCount');
    if (counter) counter.textContent = state.importantTasks.length;

    const cells = [];
    cells.push('<div class="st-cell st-head">프로</div>');
    cells.push('<div class="st-cell st-head">구분</div>');
    cells.push('<div class="st-cell st-head">업무명<div class="side-col-resize" data-sidecol="imp"></div></div>');
    cells.push('<div class="st-cell st-head">상태</div>');
    cells.push('<div class="st-cell st-head">마감일</div>');
    cells.push('<div class="st-cell st-head">디데이</div>');
    cells.push('<div class="st-cell st-head"><div class="side-col-resize side-col-resize-left" data-sidecol="impdel"></div></div>');

    const items = state.importantTasks;
    if (items.length === 0) {
      cells.push('<div class="st-cell empty-row">마감 있는 중요한 업무를 등록해주세요.<br>(에셋 배포, QA 대응 등)</div>');
    } else {
      for (let i = 0; i < items.length; i++) {
        const it = items[i];
        const cat = it.category || '';
        const catAttr = `data-cat="${escapeHtml(cat)}"`;
        const doneCls = it.status === '완료' ? 'done' : '';
        const dday = calcDDay(it.targetDate);
        const ddayCls = ddayClass(dday);
        const ddayText = formatDDay(dday);

        const projectSel = buildSelect('project-tag', it.project, SIDE_PROJECTS, `updateImportant(${i}, 'project', this.value)`);
        cells.push(`<div class="st-cell st-row-first ${doneCls}" ${catAttr}>${projectSel}</div>`);

        const catKey = it.project + '|' + it.category;
        const isCatStart = (i === 0) || (catKey !== items[i-1].project + '|' + items[i-1].category);
        if (isCatStart) {
          let size = 1;
          for (let j = i+1; j < items.length; j++) {
            if (items[j].project + '|' + items[j].category === catKey) size++;
            else break;
          }
          const catSel = buildSelect('cat-chip', it.category, IMPORTANT_CATEGORIES, `updateImportant(${i}, 'category', this.value)`);
          const spanStyle = size > 1 ? ` style="grid-row: span ${size}"` : '';
          cells.push(`<div class="st-cell" ${catAttr}${spanStyle}>${catSel}</div>`);
        }

        cells.push(`<div class="st-cell ${doneCls}" ${catAttr}><input type="text" class="side-name" placeholder="업무명" title="${escapeHtml(it.name || '')}" value="${escapeHtml(it.name)}" onchange="updateImportant(${i}, 'name', this.value)"></div>`);
        const statusSel = buildSelect('status-chip', it.status, STATUSES, `updateImportant(${i}, 'status', this.value)`, STATUS_PREFIX);
        cells.push(`<div class="st-cell" ${catAttr}>${statusSel}</div>`);
        cells.push(`<div class="st-cell" ${catAttr}><input type="text" class="side-date date-picker-input" placeholder="4/13" value="${escapeHtml(formatDateDisplay(it.targetDate))}" onchange="onSideDateChange('important', ${i}, this.value)"></div>`);
        cells.push(`<div class="st-cell" ${catAttr}>${ddayText ? `<span class="dday-chip ${ddayCls}">${ddayText}</span>` : '<span style="color:var(--text-subtle)">-</span>'}</div>`);
        cells.push(`<div class="st-cell" ${catAttr}><button class="side-del" title="삭제" onclick="askDeleteImportant(${i})">×</button></div>`);
      }
    }
    list.innerHTML = cells.join('');
  }

  function renderRoutines() {
    const list = document.getElementById('routineList');
    if (!list) return;
    list.className = 'side-table routine-grid';
    const counter = document.getElementById('routineCount');
    if (counter) counter.textContent = state.routines.length;

    const cells = [];
    cells.push('<div class="st-cell st-head">프로</div>');
    cells.push('<div class="st-cell st-head">구분</div>');
    cells.push('<div class="st-cell st-head">상세</div>');
    cells.push('<div class="st-cell st-head">업무명<div class="side-col-resize" data-sidecol="rt"></div></div>');
    cells.push('<div class="st-cell st-head">상태</div>');
    cells.push('<div class="st-cell st-head">마감일</div>');
    cells.push('<div class="st-cell st-head">디데이</div>');
    cells.push('<div class="st-cell st-head"><div class="side-col-resize side-col-resize-left" data-sidecol="rtdel"></div></div>');

    const items = state.routines;
    if (items.length === 0) {
      cells.push('<div class="st-cell empty-row">반복적으로 하는 업무를 등록해주세요.<br>(기믹 기획서, 문의사항 체크 등)</div>');
    } else {
      for (let i = 0; i < items.length; i++) {
        const r = items[i];
        const cat = r.category || '';
        const catAttr = `data-cat="${escapeHtml(cat)}"`;
        const doneCls = r.status === '완료' ? 'done' : '';
        const dday = calcDDay(r.targetDate);
        const ddayCls = ddayClass(dday);
        const ddayText = formatDDay(dday);

        const projectSel = buildSelect('project-tag', r.project, SIDE_PROJECTS, `updateRoutine(${i}, 'project', this.value)`);
        cells.push(`<div class="st-cell st-row-first ${doneCls}" ${catAttr}>${projectSel}</div>`);

        const catKey = r.project + '|' + r.category;
        const isCatStart = (i === 0) || (catKey !== items[i-1].project + '|' + items[i-1].category);
        if (isCatStart) {
          let size = 1;
          for (let j = i+1; j < items.length; j++) {
            if (items[j].project + '|' + items[j].category === catKey) size++;
            else break;
          }
          const catSel = buildSelect('cat-chip', r.category, ROUTINE_CATEGORIES, `updateRoutine(${i}, 'category', this.value)`);
          const spanStyle = size > 1 ? ` style="grid-row: span ${size}"` : '';
          cells.push(`<div class="st-cell" ${catAttr}${spanStyle}>${catSel}</div>`);
        }

        const subKey = catKey + '|' + r.subCategory;
        const prevSubKey = i > 0 ? (items[i-1].project + '|' + items[i-1].category + '|' + items[i-1].subCategory) : null;
        const isSubStart = (i === 0) || (subKey !== prevSubKey);
        if (isSubStart) {
          let size = 1;
          for (let j = i+1; j < items.length; j++) {
            const nsk = items[j].project + '|' + items[j].category + '|' + items[j].subCategory;
            if (nsk === subKey) size++;
            else break;
          }
          const subSel = buildSelect('cat-chip', r.subCategory, ROUTINE_SUB, `updateRoutine(${i}, 'subCategory', this.value)`);
          const spanStyle = size > 1 ? ` style="grid-row: span ${size}"` : '';
          cells.push(`<div class="st-cell" ${catAttr}${spanStyle}>${subSel}</div>`);
        }

        cells.push(`<div class="st-cell ${doneCls}" ${catAttr}><input type="text" class="side-name" placeholder="업무명" title="${escapeHtml(r.name || '')}" value="${escapeHtml(r.name)}" onchange="updateRoutine(${i}, 'name', this.value)"></div>`);
        const statusSel = buildSelect('status-chip', r.status, STATUSES, `updateRoutine(${i}, 'status', this.value)`, STATUS_PREFIX);
        cells.push(`<div class="st-cell" ${catAttr}>${statusSel}</div>`);
        cells.push(`<div class="st-cell" ${catAttr}><input type="text" class="side-date date-picker-input" placeholder="4/13" value="${escapeHtml(formatDateDisplay(r.targetDate))}" onchange="onSideDateChange('routine', ${i}, this.value)"></div>`);
        cells.push(`<div class="st-cell" ${catAttr}>${ddayText ? `<span class="dday-chip ${ddayCls}">${ddayText}</span>` : '<span style="color:var(--text-subtle)">-</span>'}</div>`);
        cells.push(`<div class="st-cell" ${catAttr}><button class="side-del" title="삭제" onclick="askDeleteRoutine(${i})">×</button></div>`);
      }
    }
    list.innerHTML = cells.join('');
  }

  function renderWeekGrid() {
    const grid = document.getElementById('weeklyGrid');
    if (!grid) return;
    const today = formatDate(new Date());
    const html = [];

    // Row 1: 날짜 헤더
    html.push('<div class="grid-cell label corner"></div>');
    state.days.forEach((d, idx) => {
      const isToday = d.date === today;
      html.push(`
        <div class="grid-cell day-header ${isToday ? 'today' : ''}">
          <div class="day-head-main">
            <span class="day-date-text">${formatDateDisplay(d.date)}</span>
            <span class="day-name-text">${escapeHtml(d.dayName)}${isToday ? ' · 오늘' : ''}</span>
          </div>
          <button class="btn-copy-prev" title="${idx === 0 ? '지난주 금요일' : '어제'} 업무 복사" onclick="copyFromPrevDay(${idx})">📋 ${idx === 0 ? '지난 금' : '어제'} 복사</button>
        </div>`);
    });

    // Row 2: 주요 일정
    html.push('<div class="grid-cell label">주요 일정</div>');
    state.days.forEach((d, idx) => {
      const tc = d.date === today ? ' today-col' : '';
      html.push(`<div class="grid-cell text-cell${tc}"><textarea placeholder="오늘의 주요 일정" onchange="updateDay(${idx}, 'schedule', this.value)">${escapeHtml(d.schedule)}</textarea></div>`);
    });

    // Row 3: 테이블 헤더
    html.push('<div class="grid-cell label">항목</div>');
    state.days.forEach(d => {
      const tc = d.date === today ? ' today-col' : '';
      html.push(`<div class="grid-cell thead-cell${tc}">${tableHeadHtml()}</div>`);
    });

    // Row 4~7: 분면
    QUADRANT_DEFS.forEach(q => {
      html.push(`<div class="grid-cell label ${q.key}">${escapeHtml(q.label)}</div>`);
      state.days.forEach((d, idx) => {
        const tasks = d.quadrants[q.key] || [];
        const rows = tasks.map((t, ti) => taskRowHtml(idx, q.key, ti, t, d.date)).join('');
        const tc = d.date === today ? ' today-col' : '';
        html.push(`
          <div class="grid-cell quadrant-cell day-cell ${q.key}${tc}">
            ${rows}
            <button class="btn-add-icon" onclick="addTask(${idx}, '${q.key}')">+ 업무 추가</button>
          </div>`);
      });
    });

    // Row 8: 메모
    html.push('<div class="grid-cell label">메모</div>');
    state.days.forEach((d, idx) => {
      const tc = d.date === today ? ' today-col' : '';
      html.push(`<div class="grid-cell text-cell${tc}"><textarea placeholder="오늘의 메모" onchange="updateDay(${idx}, 'memo', this.value)">${escapeHtml(d.memo)}</textarea></div>`);
    });

    // Row 9: 요약
    html.push('<div class="grid-cell label">요약</div>');
    state.days.forEach((d) => {
      const stats = calcDayStats(d);
      const tc = d.date === today ? ' today-col' : '';
      html.push(`
        <div class="grid-cell summary-cell${tc}">
          <div class="summary-top">
            <div class="summary-item">
              <span class="summary-label">예상</span>
              <span class="summary-value">${stats.estimatedHours.toFixed(1)}h</span>
            </div>
            <div class="summary-item">
              <span class="summary-label">실작업</span>
              <span class="summary-value">${stats.actualHours.toFixed(1)}h</span>
            </div>
          </div>
          <div class="summary-bottom">
            <div class="summary-progress-row">
              <span class="summary-label">달성률</span>
              <span class="summary-value">${stats.rate}%</span>
            </div>
            <div class="progress-bar big"><div class="progress-fill" style="width:${stats.rate}%"></div></div>
          </div>
        </div>`);
    });

    grid.innerHTML = html.join('');
  }

  function tableHeadHtml() {
    const R = (k) => `<div class="col-resize" data-colkey="${k}"></div>`;
    return `
      <div class="task-row task-head">
        <div class="col" data-colkey="project">구분${R('project')}</div>
        <div class="col" data-colkey="name">업무명${R('name')}</div>
        <div class="col" data-colkey="target">목표 날짜${R('target')}</div>
        <div class="col" data-colkey="start">시작 시간${R('start')}</div>
        <div class="col" data-colkey="end">종료 시간${R('end')}</div>
        <div class="col" data-colkey="progress">진행 시간${R('progress')}</div>
        <div class="col" data-colkey="est">예상 시간${R('est')}</div>
        <div class="col" data-colkey="done">완료${R('done')}</div>
        <div class="col" data-colkey="note">비고${R('note')}</div>
        <div class="col" data-colkey="delete">🗑${R('delete')}</div>
      </div>`;
  }

  function timeInputHtml(dayIdx, qKey, ti, field, value) {
    return `
      <div class="time-combo">
        <input type="text" class="time-text" placeholder="17:50" value="${escapeHtml(value || '')}" onchange="onTimeTextChange(${dayIdx}, '${qKey}', ${ti}, '${field}', this.value)">
        <button class="time-now" title="지금" onclick="setTimeNow(${dayIdx}, '${qKey}', ${ti}, '${field}')">🕐</button>
      </div>`;
  }

  function taskRowHtml(dayIdx, qKey, ti, t, dayDate) {
    const projectSel = buildSelect('project-tag', t.project, DAILY_PROJECTS, `updateTask(${dayIdx}, '${qKey}', ${ti}, 'project', this.value)`);
    const progress = calcTaskHours(t);
    return `
      <div class="task-row ${t.done ? 'done' : ''}">
        <div class="col col-project">${projectSel}</div>
        <div class="col col-name"><input type="text" placeholder="업무명" title="${escapeHtml(t.name || '')}" value="${escapeHtml(t.name)}" onchange="updateTask(${dayIdx}, '${qKey}', ${ti}, 'name', this.value)"></div>
        <div class="col col-target"><input type="text" class="date-md date-picker-input" placeholder="4/13" value="${escapeHtml(formatDateDisplay(t.targetDate || dayDate))}" onchange="onTargetDateChange(${dayIdx}, '${qKey}', ${ti}, this.value)"></div>
        <div class="col col-start">${timeInputHtml(dayIdx, qKey, ti, 'startTime', t.startTime)}</div>
        <div class="col col-end">${timeInputHtml(dayIdx, qKey, ti, 'endTime', t.endTime)}</div>
        <div class="col col-progress">${progress > 0 ? progress.toFixed(1) : '<span class="progress-empty">-</span>'}</div>
        <div class="col col-est"><input type="text" inputmode="decimal" placeholder="0" value="${escapeHtml(t.estimatedHours)}" onchange="onEstimatedChange(${dayIdx}, '${qKey}', ${ti}, this.value)"></div>
        <div class="col col-done"><input type="checkbox" ${t.done ? 'checked' : ''} onchange="updateTask(${dayIdx}, '${qKey}', ${ti}, 'done', this.checked)"></div>
        <div class="col col-note"><input type="text" value="${escapeHtml(t.note)}" onchange="updateTask(${dayIdx}, '${qKey}', ${ti}, 'note', this.value)"></div>
        <div class="col col-delete"><button class="del-btn" title="업무 삭제" onclick="askDeleteTask(${dayIdx}, '${qKey}', ${ti})">×</button></div>
      </div>`;
  }

  function renderHistory() {
    const list = document.getElementById('historyList');
    const counter = document.getElementById('historyCount');
    if (!list || !counter) return;
    counter.textContent = `보관된 주간: ${state.history.length}개`;
    const summary = weekSummaryHtml();
    let historyBody;
    if (state.history.length === 0) {
      historyBody = '<div class="history-empty">아직 보관된 주간이 없어요.<br>주간 탭 좌측의 <b>📦 주간 갱신</b> 버튼으로 이번 주를 히스토리에 보관할 수 있어요.</div>';
    } else {
      const indexed = state.history.map((h, idx) => ({ h, idx }));
      indexed.sort((a, b) => (b.h.archivedAt || '').localeCompare(a.h.archivedAt || ''));
      historyBody = indexed.map(({ h, idx }) => historyCardHtml(h, idx)).join('');
    }
    list.innerHTML = summary + historyBody;
  }

  function weekSummaryHtml() {
    const s = calcWeekStats(state.days);
    const maxH = Math.max(0.1,
      s.byQuadrant.q1, s.byQuadrant.q2, s.byQuadrant.q3, s.byQuadrant.q4,
      s.byProject['팝콘'], s.byProject['타운'], s.byProject['기타']
    );
    const quadLabels = { q1: '중요 × 긴급', q2: '중요 × 비긴급', q3: '비중요 × 긴급', q4: '비중요 × 비긴급' };
    const quadBars = ['q1','q2','q3','q4'].map(qk => {
      const h = s.byQuadrant[qk];
      const pct = Math.round(h / maxH * 100);
      return `
        <div class="stat-row">
          <span class="stat-label">${quadLabels[qk]}</span>
          <div class="stat-bar"><div class="stat-fill ${qk}" style="width:${pct}%"></div></div>
          <span class="stat-val">${h.toFixed(1)}h</span>
        </div>`;
    }).join('');
    const projBars = ['팝콘','타운','기타'].map(p => {
      const h = s.byProject[p];
      const pct = Math.round(h / maxH * 100);
      return `
        <div class="stat-row">
          <span class="stat-label">${escapeHtml(p)}</span>
          <div class="stat-bar"><div class="stat-fill proj-${escapeHtml(p)}" style="width:${pct}%"></div></div>
          <span class="stat-val">${h.toFixed(1)}h</span>
        </div>`;
    }).join('');
    return `
      <div class="week-summary-card">
        <div class="week-summary-head">
          <span class="week-summary-title">이번 주 요약 (${escapeHtml(state.weekStart)} 시작)</span>
          ${trendChipHtml(s.rate)}
        </div>
        <div class="week-summary-hero">
          <div class="donut-wrap">${donutSvg(s.rate, 112)}</div>
          <div class="hero-kpis">
            <div class="hero-kpi kpi-total">
              <span class="kpi-label">총 작업</span>
              <span class="kpi-val">${s.totalHours.toFixed(1)}<span class="kpi-val-sub">h</span></span>
            </div>
            <div class="hero-kpi kpi-est">
              <span class="kpi-label">예상 작업</span>
              <span class="kpi-val">${s.estHours.toFixed(1)}<span class="kpi-val-sub">h</span></span>
            </div>
            <div class="hero-kpi kpi-done">
              <span class="kpi-label">완료 업무</span>
              <span class="kpi-val">${s.done}<span class="kpi-val-sub">/${s.total}</span></span>
            </div>
          </div>
        </div>
        <div class="week-summary-section">
          <div class="section-title">일별 달성률 <span class="sparkline-legend">목표 80%</span></div>
          ${sparklineHtml(state.days)}
        </div>
        <div class="week-summary-section">
          <div class="section-title">분면별 시간 분포</div>
          ${quadBars}
        </div>
        <div class="week-summary-section">
          <div class="section-title">프로젝트별 시간 분포</div>
          ${projBars}
        </div>
      </div>`;
  }

  function weekRangeLabel(h) {
    if (!h.days || h.days.length === 0) return h.weekStart || '';
    const first = h.days[0].date;
    const last = h.days[h.days.length - 1].date;
    const y = first.split('-')[0];
    return `${y}년 ${formatDateDisplay(first)} ~ ${formatDateDisplay(last)}`;
  }

  function historyCardHtml(h, idx) {
    const days = h.days || [];
    const ws = calcWeekStats(days);
    const daysHtml = days.map(d => historyDayHtml(d)).join('');
    const g = h.goals || { week: '', month: '' };
    const goalWeek = g.week ? `<div class="history-goal-row week"><span class="history-goal-tag">주</span><span class="history-goal-text">${escapeHtml(g.week)}</span></div>` : '';
    const goalMonth = g.month ? `<div class="history-goal-row month"><span class="history-goal-tag">월</span><span class="history-goal-text">${escapeHtml(g.month)}</span></div>` : '';
    const goalBlock = (goalWeek || goalMonth) ? `<div class="history-goals">${goalWeek}${goalMonth}</div>` : '';
    // Phase 9 (Reduce): 히트맵 제거 — 일자 카드 좌측 bar가 동일 정보 표현
    const weekSummary = days.length > 0 ? `
      <div class="history-week-summary">
        <span class="rate-badge ${rateClass(ws.total > 0 ? ws.rate : null)}">${ws.total > 0 ? ws.rate + '%' : '—'}</span>
        <span class="history-week-hours">${ws.totalHours.toFixed(1)}h <span class="history-week-hours-muted">작업 · ${ws.estHours.toFixed(1)}h 예상 · ${ws.done}/${ws.total} 완료</span></span>
      </div>` : '';
    return `
      <div class="history-card">
        <div class="history-card-head">
          <div>
            <div class="history-week">${escapeHtml(weekRangeLabel(h))}</div>
            <div class="history-time">보관: ${escapeHtml(h.archivedAt || '')}</div>
          </div>
          <button class="btn danger sm" onclick="askDeleteHistory(${idx})">삭제</button>
        </div>
        ${weekSummary}
        ${goalBlock}
        <div class="history-days">${daysHtml}</div>
      </div>`;
  }

  // ---------- 월별 히스토리: 일별 업무 리스트 (flatten + scope toggle) ----------
  const MONTHLY_SCOPE_KEY = 'worklog-monthly-scope';

  function getMonthlyScope() {
    try { return localStorage.getItem(MONTHLY_SCOPE_KEY) || 'month'; }
    catch (e) { return 'month'; }
  }

  window.setMonthlyScope = function(scope) {
    if (scope !== 'month' && scope !== 'all') scope = 'month';
    try { localStorage.setItem(MONTHLY_SCOPE_KEY, scope); } catch (e) {}
    document.querySelectorAll('.scope-btn').forEach(b => b.classList.toggle('active', b.dataset.scope === scope));
    renderMonthlyHistory();
  };

  function collectAllDays() {
    const out = [];
    (state.days || []).forEach(d => out.push(d));
    (state.history || []).forEach(h => {
      (h.days || []).forEach(d => out.push(d));
    });
    return out;
  }

  function formatMonthLabel(ym) {
    const parts = (ym || '').split('-');
    if (parts.length < 2) return ym || '';
    return `${parts[0]}년 ${parseInt(parts[1], 10)}월`;
  }

  function dayHasTasks(d) {
    let count = 0;
    ['q1','q2','q3','q4'].forEach(k => {
      count += ((d.quadrants && d.quadrants[k]) || []).filter(t => t.name).length;
    });
    return count > 0;
  }

  function renderMonthlyHistory() {
    const list = document.getElementById('monthlyList');
    const counter = document.getElementById('monthlyCount');
    if (!list) return;

    const scope = getMonthlyScope();
    document.querySelectorAll('.scope-btn').forEach(b => b.classList.toggle('active', b.dataset.scope === scope));

    const all = collectAllDays();

    // scope 필터 (최근 30일 = 오늘 포함 30일)
    let filtered = all;
    if (scope === 'month') {
      const cutoff = new Date();
      cutoff.setDate(cutoff.getDate() - 29);
      cutoff.setHours(0, 0, 0, 0);
      const cutoffStr = formatDate(cutoff);
      filtered = all.filter(d => d.date && d.date >= cutoffStr);
    }

    // 업무 있는 날짜만
    const withTasks = filtered.filter(dayHasTasks);
    // 날짜 역순
    withTasks.sort((a, b) => (b.date || '').localeCompare(a.date || ''));

    if (counter) {
      counter.textContent = withTasks.length === 0
        ? '기록 없음'
        : `${withTasks.length}일 · ${scope === 'month' ? '최근 30일' : '전체'}`;
    }

    if (withTasks.length === 0) {
      list.innerHTML = scope === 'month'
        ? '<div class="history-empty">최근 30일 내 기록이 없어요.<br><b>📂 전체 기간</b>을 눌러 이전 기록을 확인할 수 있어요.</div>'
        : '<div class="history-empty">기록된 업무가 없어요.<br>주간 탭에서 업무를 입력한 뒤 <b>📦 주간 갱신</b>으로 보관해주세요.</div>';
      return;
    }

    // 월 단위 그룹핑 (역순)
    const groups = [];
    let curYm = null, curGroup = null;
    withTasks.forEach(d => {
      const ym = (d.date || '').slice(0, 7);
      if (ym !== curYm) {
        curYm = ym;
        curGroup = { month: ym, days: [] };
        groups.push(curGroup);
      }
      curGroup.days.push(d);
    });

    const html = groups.map(g => {
      // 월 평균 달성률
      let totalRate = 0, rateCount = 0;
      g.days.forEach(d => {
        const st = calcDayStats(d);
        if (st.total > 0) { totalRate += st.rate; rateCount++; }
      });
      const avgRate = rateCount > 0 ? Math.round(totalRate / rateCount) : null;
      // Phase 9: 월 헤더에 달성률 배지로 강조
      const rateBadge = avgRate == null
        ? `<span class="monthly-month-rate">기록 없음</span>`
        : `<span class="rate-badge ${rateClass(avgRate)}" title="월 평균 달성률">${avgRate}%</span>`;

      const daysHtml = g.days.map(d => historyDayHtml(d)).join('');
      return `
        <div class="monthly-group">
          <div class="monthly-month-head">
            <span>${escapeHtml(formatMonthLabel(g.month))}</span>
            <span class="monthly-month-count">${g.days.length}일</span>
            ${rateBadge}
          </div>
          <div class="monthly-day-list">${daysHtml}</div>
        </div>`;
    }).join('');

    list.innerHTML = html;
  }

  function historyDayHtml(d) {
    const stats = calcDayStats(d);
    const hasRecord = stats.total > 0;
    const rateCls = rateClass(hasRecord ? stats.rate : null);
    const allTasks = [];
    ['q1','q2','q3','q4'].forEach(k => {
      ((d.quadrants && d.quadrants[k]) || []).forEach(t => {
        if (t.name) allTasks.push({ name: t.name, project: t.project, done: t.done, q: k });
      });
    });
    // Phase 9 (Reduce): 분면 dot 제거, 프로젝트 칩으로 교체
    const tasksHtml = allTasks.map(t => {
      const proj = t.project || '';
      const chip = proj
        ? `<span class="history-task-proj" data-v="${escapeHtml(proj)}">${escapeHtml(proj)}</span>`
        : '';
      const fullLabel = (proj ? `[${proj}] ` : '') + (t.name || '');
      return `
        <div class="history-task ${t.done ? 'done' : ''}" title="${escapeHtml(fullLabel)}">
          ${chip}
          <span class="history-task-name">${escapeHtml(t.name)}</span>
        </div>`;
    }).join('');
    const compare = hoursCompareHtml(stats.actualHours, stats.estimatedHours);
    return `
      <div class="history-day ${rateCls}">
        <div class="history-day-head">
          <span class="history-day-date">${formatDateDisplay(d.date)} ${escapeHtml(d.dayName)}</span>
          <span class="rate-badge mini ${rateCls}">${hasRecord ? stats.rate + '%' : '—'}</span>
        </div>
        ${compare}
        <div class="history-day-tasks">${tasksHtml || '<span style="color: var(--text-subtle);">기록 없음</span>'}</div>
      </div>`;
  }

  // ---------- 핸들러 ----------
  window.switchTab = function(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === `tab-${tab}`));
    if (tab === 'history-weekly') renderHistory();
    else if (tab === 'history-monthly') renderMonthlyHistory();
  };

  window.setScale = function(size) {
    document.documentElement.dataset.scale = size;
    document.querySelectorAll('.scale-btn').forEach(b => b.classList.toggle('active', b.dataset.scale === size));
    try { localStorage.setItem(SCALE_KEY, size); } catch (e) {}
  };

  window.updateCardWidth = function(value) {
    const v = String(value);
    document.documentElement.style.setProperty('--card-width', v + 'px');
    const label = document.getElementById('cardWidthValue');
    if (label) label.textContent = v + 'px';
    try { localStorage.setItem(CARD_WIDTH_KEY, v); } catch (e) {}
  };

  function applyTheme(theme) {
    if (!['light', 'dark'].includes(theme)) theme = 'light';
    document.documentElement.dataset.theme = theme;
    try { localStorage.setItem(THEME_KEY, theme); } catch (e) {}
    const btn = document.getElementById('themeToggle');
    if (btn) btn.innerHTML = theme === 'dark' ? icon('sun') : icon('moon');
  }
  window.toggleTheme = function() {
    const current = document.documentElement.dataset.theme || 'light';
    applyTheme(current === 'dark' ? 'light' : 'dark');
  };

  window.startEditGoal = function(kind) {
    if (kind !== 'week' && kind !== 'month') return;
    const item = document.getElementById('goal-' + kind);
    if (!item) return;
    item.classList.add('editing');
    const edit = item.querySelector('.goal-edit');
    if (!edit) return;
    edit.value = state.goals[kind] || '';
    edit.focus();
    // 커서를 텍스트 끝으로 이동
    const v = edit.value;
    edit.setSelectionRange(v.length, v.length);
  };

  window.endEditGoal = function(kind, value) {
    if (kind !== 'week' && kind !== 'month') return;
    const v = typeof value === 'string' ? value : '';
    state.goals[kind] = v;
    saveState();
    const item = document.getElementById('goal-' + kind);
    if (item) item.classList.remove('editing');
    renderOneGoal(kind, v);
  };
  window.updateDay = function(idx, field, value) {
    if (!state.days[idx]) return;
    state.days[idx][field] = value; saveState();
  };

  window.addTask = function(dayIdx, qKey) {
    const day = state.days[dayIdx];
    if (!day || !day.quadrants[qKey]) return;
    day.quadrants[qKey].push({
      id: uid(), project: '팝콘', name: '', targetDate: day.date,
      startTime: '', endTime: '', breakMinutes: 0, breakMode: 'exclude',
      estimatedHours: '', done: false, note: ''
    });
    saveState();
    renderWeekGrid();
  };

  window.updateTask = function(dayIdx, qKey, ti, field, value) {
    const task = state.days[dayIdx] && state.days[dayIdx].quadrants[qKey] && state.days[dayIdx].quadrants[qKey][ti];
    if (!task) return;
    task[field] = value;
    saveState();
    if (['done','startTime','endTime','estimatedHours','project'].includes(field)) {
      renderWeekGrid();
    }
  };

  window.deleteTask = function(dayIdx, qKey, ti) {
    if (!state.days[dayIdx] || !state.days[dayIdx].quadrants[qKey]) return;
    state.days[dayIdx].quadrants[qKey].splice(ti, 1);
    saveState();
    renderWeekGrid();
  };

  window.askDeleteTask = function(dayIdx, qKey, ti) {
    const task = _getTask(dayIdx, qKey, ti);
    if (!task) return;
    const name = (task.name || '').trim();
    if (!name) { deleteTask(dayIdx, qKey, ti); return; }
    showModal('업무 삭제', `"${name}" 업무를 삭제할까요?`, () => deleteTask(dayIdx, qKey, ti));
  };

  function _getTask(dayIdx, qKey, ti) {
    return state.days[dayIdx] && state.days[dayIdx].quadrants[qKey] && state.days[dayIdx].quadrants[qKey][ti];
  }

  window.onTimeTextChange = function(dayIdx, qKey, ti, field, text) {
    const task = _getTask(dayIdx, qKey, ti);
    if (!task) return;
    const raw = String(text).trim();
    if (!raw) { task[field] = ''; saveState(); renderWeekGrid(); return; }
    // 24시간제 입력 기본. parseTime이 "17:50", "1750", "9:05" 등 해석
    task[field] = parseTime(raw);
    saveState();
    renderWeekGrid();
  };

  window.onEstimatedChange = function(dayIdx, qKey, ti, text) {
    const task = _getTask(dayIdx, qKey, ti);
    if (!task) return;
    task.estimatedHours = parseEstimated(text);
    saveState();
    renderWeekGrid();
  };

  window.onTargetDateChange = function(dayIdx, qKey, ti, text) {
    const task = _getTask(dayIdx, qKey, ti);
    if (!task) return;
    const day = state.days[dayIdx];
    const y = day && day.date ? parseInt(day.date.split('-')[0], 10) : new Date().getFullYear();
    task.targetDate = parseDateInput(text, y);
    saveState();
    renderWeekGrid();
  };

  window.onSideDateChange = function(kind, idx, text) {
    const list = kind === 'important' ? state.importantTasks : state.routines;
    if (!list[idx]) return;
    list[idx].targetDate = parseDateInput(text, new Date().getFullYear());
    saveState();
    if (kind === 'important') renderImportantTasks(); else renderRoutines();
  };

  window.setTimeNow = function(dayIdx, qKey, ti, field) {
    const task = _getTask(dayIdx, qKey, ti);
    if (!task) return;
    task[field] = formatNowTime();
    saveState();
    renderWeekGrid();
  };

  function getPrevDayRef(dayIdx) {
    if (dayIdx > 0) return { day: state.days[dayIdx - 1], from: '어제' };
    if (!state.history || state.history.length === 0) return null;
    const sorted = state.history.slice().sort((a, b) => (b.archivedAt || '').localeCompare(a.archivedAt || ''));
    const lastWeek = sorted[0];
    if (!lastWeek.days || lastWeek.days.length < 5) return null;
    return { day: lastWeek.days[4], from: '지난주 금요일' };
  }

  window.copyFromPrevDay = function(dayIdx) {
    const ref = getPrevDayRef(dayIdx);
    if (!ref) {
      showModal('복사 불가', '이전 업무 기록이 없습니다.\n(월요일은 히스토리에 이전 주간이 보관되어 있어야 합니다.)', null);
      return;
    }
    const target = state.days[dayIdx];
    if (!target) return;
    const srcTasks = [];
    ['q1','q2','q3','q4'].forEach(qk => {
      (ref.day.quadrants[qk] || []).forEach(t => { if (t.name) srcTasks.push({ src: t, q: qk }); });
    });
    if (srcTasks.length === 0) {
      showModal('복사할 업무 없음', `${ref.from}에 복사할 업무가 없습니다.`, null);
      return;
    }
    showModal('어제 업무 복사',
      `${ref.from}의 업무 ${srcTasks.length}개를 이 날짜로 복사합니다.\n· 업무명 / 구분 / 예상시간만 복사\n· 시작·종료·완료는 초기화\n· 동일 업무명은 스킵\n\n계속하시겠어요?`,
      () => {
        let added = 0, skipped = 0;
        srcTasks.forEach(({ src, q }) => {
          const exists = target.quadrants[q].some(e => e.name === src.name);
          if (exists) { skipped++; return; }
          target.quadrants[q].push({
            id: uid(), project: src.project || '팝콘', name: src.name,
            targetDate: target.date, startTime: '', endTime: '',
            breakMinutes: 0, breakMode: 'exclude',
            estimatedHours: src.estimatedHours || '', done: false, note: ''
          });
          added++;
        });
        saveState();
        renderWeekGrid();
        showModal('복사 완료', `추가 ${added}개 / 중복 스킵 ${skipped}개`, null);
      }
    );
  };

  window.addImportantTask = function() {
    state.importantTasks.push({ id: uid(), project: '팝콘', category: '기타', name: '', status: '대기', targetDate: '', note: '' });
    saveState();
    renderImportantTasks();
  };

  window.updateImportant = function(idx, field, value) {
    if (!state.importantTasks[idx]) return;
    state.importantTasks[idx][field] = value;
    saveState();
    if (['status','targetDate','project','category'].includes(field)) renderImportantTasks();
  };

  window.askDeleteImportant = function(idx) {
    const it = state.importantTasks[idx];
    if (!it) return;
    const name = it.name || '(이름 없음)';
    showModal('중요 업무 삭제', `"${name}" 항목을 삭제할까요?`, () => {
      state.importantTasks.splice(idx, 1);
      saveState();
      renderImportantTasks();
    });
  };

  window.addRoutine = function() {
    state.routines.push({ id: uid(), project: '팝콘', category: '상시', subCategory: '기타', name: '', status: '대기', targetDate: '', note: '' });
    saveState();
    renderRoutines();
  };

  window.updateRoutine = function(idx, field, value) {
    if (!state.routines[idx]) return;
    state.routines[idx][field] = value;
    saveState();
    if (['status','targetDate','project','category','subCategory'].includes(field)) renderRoutines();
  };

  window.askDeleteRoutine = function(idx) {
    const r = state.routines[idx];
    if (!r) return;
    const name = r.name || '(이름 없음)';
    showModal('상시 업무 삭제', `"${name}" 항목을 삭제할까요?`, () => {
      state.routines.splice(idx, 1);
      saveState();
      renderRoutines();
    });
  };

  window.askArchive = function() {
    const monday = getThisMonday();
    const todayWeekStart = formatDate(monday);
    let message;
    if (state.weekStart === todayWeekStart) {
      message = '현재 주간 데이터를 히스토리에 보관하고\n이번 주(월~금)로 초기화합니다.\n\n· 이번 주 목표는 초기화됩니다\n· 이번 달 목표는 유지됩니다\n· 중요 업무 / 상시 업무는 그대로 유지됩니다\n\n계속하시겠어요?';
    } else {
      message = `현재 작업중인 주간(${state.weekStart})을 히스토리에 보관하고\n이번 주(${todayWeekStart} 시작)로 전환합니다.\n\n· 이번 주 목표는 초기화됩니다\n· 이번 달 목표는 유지됩니다\n· 중요 업무 / 상시 업무는 그대로 유지됩니다\n\n계속하시겠어요?`;
    }
    showModal('주간 갱신', message, archiveWeek);
  };

  function archiveWeek() {
    const archivedAt = new Date().toLocaleString('ko-KR');
    state.history.push({
      archivedAt,
      weekStart: state.weekStart,
      goals: { week: state.goals.week, month: state.goals.month },
      days: JSON.parse(JSON.stringify(state.days))
    });
    const monday = getThisMonday();
    state.weekStart = formatDate(monday);
    state.days = createWeekDays(monday);
    state.goals.week = '';
    // 월 목표는 유지
    saveState();
    render();
    switchTab('weekly');
  }

  window.askDeleteHistory = function(idx) {
    const h = state.history[idx];
    if (!h) return;
    showModal('히스토리 삭제', `${weekRangeLabel(h)} 주간 기록을 삭제할까요?\n\n보관 시각: ${h.archivedAt || ''}`, () => {
      state.history.splice(idx, 1);
      saveState();
      renderHistory();
    });
  };

  window.exportJson = function() {
    try {
      const dataStr = JSON.stringify(state, null, 2);
      const blob = new Blob([dataStr], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const stamp = formatDate(new Date());
      a.href = url;
      a.download = `worklog-backup-${stamp}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    } catch (err) {
      showModal('백업 실패', '백업 중 오류가 발생했습니다.\n' + (err.message || ''), null);
    }
  };

  window.importJson = function(event) {
    const file = event.target.files && event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const imported = JSON.parse(e.target.result);
        showModal('JSON 복원', `"${file.name}" 파일로 덮어씁니다.\n현재 데이터는 사라집니다.\n\n계속하시겠어요?`, () => {
          state = migrateState(imported);
          saveState();
          render();
        });
      } catch (err) {
        showModal('복원 실패', '유효한 JSON 파일이 아닙니다.\n' + (err.message || ''), null);
      }
      event.target.value = '';
    };
    reader.readAsText(file, 'utf-8');
  };

  window.showModal = function(title, message, onConfirm) {
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalMessage').textContent = message;
    modalCallback = onConfirm || null;
    const confirmBtn = document.getElementById('modalConfirmBtn');
    const cancelBtn = document.getElementById('modalCancelBtn');
    if (onConfirm) { confirmBtn.textContent = '확인'; cancelBtn.style.display = ''; }
    else { confirmBtn.textContent = '닫기'; cancelBtn.style.display = 'none'; }
    document.getElementById('modalBackdrop').classList.remove('hidden');
  };

  window.hideModal = function() {
    document.getElementById('modalBackdrop').classList.add('hidden');
    modalCallback = null;
  };

  window.confirmModal = function() {
    const cb = modalCallback;
    hideModal();
    if (cb) cb();
  };

  // ===== 컬럼 리사이즈 =====
  function applyColWidth(key, w) {
    document.documentElement.style.setProperty(`--col-${key}-w`, w + 'px');
  }
  function loadColWidths() {
    try {
      const raw = localStorage.getItem(COL_WIDTHS_KEY);
      if (!raw) return;
      const saved = JSON.parse(raw);
      Object.keys(COL_DEFAULT).forEach(k => {
        const w = Number(saved[k]);
        if (w && w >= (COL_MIN[k] || 24)) applyColWidth(k, w);
      });
      ['imp', 'rt', 'impdel', 'rtdel'].forEach(k => {
        if (!SIDE_VAR[k]) return;
        const w = Number(saved['side_' + k]);
        if (w && w >= (SIDE_MIN[k] || 20)) {
          document.documentElement.style.setProperty(SIDE_VAR[k], w + 'px');
        }
      });
    } catch (e) {}
  }
  function saveColWidths() {
    try {
      const cs = getComputedStyle(document.documentElement);
      const out = {};
      Object.keys(COL_DEFAULT).forEach(k => {
        const raw = cs.getPropertyValue(`--col-${k}-w`).trim();
        out[k] = parseInt(raw, 10) || COL_DEFAULT[k];
      });
      ['imp', 'rt', 'impdel', 'rtdel'].forEach(k => {
        if (!SIDE_VAR[k]) return;
        const raw = cs.getPropertyValue(SIDE_VAR[k]).trim();
        out['side_' + k] = parseInt(raw, 10) || SIDE_DEFAULT[k];
      });
      localStorage.setItem(COL_WIDTHS_KEY, JSON.stringify(out));
    } catch (e) {}
  }
  function initSidebarResize() {
    const resizer = document.getElementById('sidebarResizer');
    if (!resizer) return;
    let dragging = false, startX = 0, startW = 500;
    resizer.addEventListener('mousedown', function(e) {
      dragging = true;
      startX = e.clientX;
      const cs = getComputedStyle(document.documentElement);
      startW = parseInt(cs.getPropertyValue('--sidebar-width'), 10) || 500;
      resizer.classList.add('dragging');
      document.body.classList.add('resizing-col');
      e.preventDefault();
    });
    document.addEventListener('mousemove', function(e) {
      if (!dragging) return;
      const delta = e.clientX - startX;
      const newW = Math.max(320, Math.min(900, startW + delta));
      document.documentElement.style.setProperty('--sidebar-width', newW + 'px');
    });
    document.addEventListener('mouseup', function() {
      if (!dragging) return;
      dragging = false;
      resizer.classList.remove('dragging');
      document.body.classList.remove('resizing-col');
      try {
        const cs = getComputedStyle(document.documentElement);
        const w = parseInt(cs.getPropertyValue('--sidebar-width'), 10) || 500;
        localStorage.setItem(SIDEBAR_WIDTH_KEY, String(w));
      } catch (e) {}
    });
  }

  function loadSidebarWidth() {
    try {
      const saved = localStorage.getItem(SIDEBAR_WIDTH_KEY);
      if (saved) {
        const w = parseInt(saved, 10);
        if (w >= 320 && w <= 900) {
          document.documentElement.style.setProperty('--sidebar-width', w + 'px');
        }
      }
    } catch (e) {}
  }

  const SIDE_DEFAULT = { imp: 160, rt: 140, impdel: 24, rtdel: 24 };
  const SIDE_MIN = { imp: 100, rt: 90, impdel: 20, rtdel: 20 };
  const SIDE_VAR = {
    imp: '--imp-name-w',
    rt: '--rt-name-w',
    impdel: '--imp-del-w',
    rtdel: '--rt-del-w'
  };

  function getDefaultFor(key) {
    try {
      const raw = localStorage.getItem(CUSTOM_DEFAULTS_KEY);
      if (raw) {
        const custom = JSON.parse(raw);
        if (custom && custom[key] != null) return Number(custom[key]);
      }
    } catch (e) {}
    if (COL_DEFAULT.hasOwnProperty(key)) return COL_DEFAULT[key];
    if (SIDE_DEFAULT.hasOwnProperty(key)) return SIDE_DEFAULT[key];
    return 100;
  }

  window.pinCurrentWidths = function() {
    try {
      const cs = getComputedStyle(document.documentElement);
      const out = {};
      Object.keys(COL_DEFAULT).forEach(k => {
        out[k] = parseInt(cs.getPropertyValue(`--col-${k}-w`), 10) || COL_DEFAULT[k];
      });
      Object.keys(SIDE_DEFAULT).forEach(k => {
        if (!SIDE_VAR[k]) return;
        out[k] = parseInt(cs.getPropertyValue(SIDE_VAR[k]), 10) || SIDE_DEFAULT[k];
      });
      // 메인 목표 (주/월) 편집창 높이도 함께 저장
      const weekTa = document.querySelector('#goal-week .goal-edit');
      if (weekTa && weekTa.clientHeight > 0) out.goalWeekHeight = weekTa.clientHeight;
      const monthTa = document.querySelector('#goal-month .goal-edit');
      if (monthTa && monthTa.clientHeight > 0) out.goalMonthHeight = monthTa.clientHeight;
      // 사이드바 너비, 카드 너비 포함
      const sidebarW = parseInt(cs.getPropertyValue('--sidebar-width'), 10);
      if (sidebarW) out.sidebarWidth = sidebarW;
      const cardW = parseInt(cs.getPropertyValue('--card-width'), 10);
      if (cardW) out.cardWidth = cardW;
      localStorage.setItem(CUSTOM_DEFAULTS_KEY, JSON.stringify(out));
      showModal('너비 고정 완료', '현재 상태를 기본값으로 저장했습니다.\n\n· 모든 열 너비\n· 사이드바 / 카드 너비\n· 주/월 목표 편집창 높이\n\n더블클릭으로 복원 시 이 값으로 돌아갑니다.', null);
    } catch (err) {
      showModal('저장 실패', '기본값 저장 중 오류가 발생했습니다.\n' + (err.message || ''), null);
    }
  };

  // Phase 7b-b: 설정 메뉴 드롭다운
  window.toggleSettingsMenu = function() {
    const dd = document.getElementById('settingsDropdown');
    if (!dd) return;
    dd.classList.toggle('hidden');
  };
  window.closeSettingsMenu = function() {
    const dd = document.getElementById('settingsDropdown');
    if (dd) dd.classList.add('hidden');
  };
  function initSettingsMenu() {
    document.addEventListener('mousedown', e => {
      const dd = document.getElementById('settingsDropdown');
      if (!dd || dd.classList.contains('hidden')) return;
      if (e.target.closest && e.target.closest('.settings-menu')) return;
      dd.classList.add('hidden');
    });
    document.addEventListener('keydown', e => {
      if (e.key !== 'Escape') return;
      const dd = document.getElementById('settingsDropdown');
      if (dd && !dd.classList.contains('hidden')) dd.classList.add('hidden');
    });
  }

  window.resetPinnedWidths = function() {
    showModal('기본값 초기화', '고정한 커스텀 기본값을 삭제하고\n원래 기본값으로 되돌립니다.\n\n계속하시겠어요?', () => {
      try { localStorage.removeItem(CUSTOM_DEFAULTS_KEY); } catch (e) {}
      // 전체 복원
      Object.keys(COL_DEFAULT).forEach(k => applyColWidth(k, COL_DEFAULT[k]));
      Object.keys(SIDE_DEFAULT).forEach(k => {
        if (!SIDE_VAR[k]) return;
        document.documentElement.style.setProperty(SIDE_VAR[k], SIDE_DEFAULT[k] + 'px');
      });
      saveColWidths();
    });
  };

  function initColResize() {
    let resizing = null;
    document.addEventListener('mousedown', function(e) {
      const h = e.target.closest && e.target.closest('.col-resize, .side-col-resize');
      if (!h) return;
      let varName, minSize, startW;
      const cs = getComputedStyle(document.documentElement);
      const isLeft = h.classList.contains('side-col-resize-left');
      if (h.classList.contains('col-resize')) {
        const key = h.dataset.colkey;
        if (!key || !COL_DEFAULT.hasOwnProperty(key)) return;
        varName = `--col-${key}-w`;
        minSize = COL_MIN[key] || 24;
        startW = parseInt(cs.getPropertyValue(varName), 10) || COL_DEFAULT[key];
      } else {
        const key = h.dataset.sidecol;
        if (!key || !SIDE_VAR[key]) return;
        varName = SIDE_VAR[key];
        minSize = SIDE_MIN[key] || 20;
        startW = parseInt(cs.getPropertyValue(varName), 10) || SIDE_DEFAULT[key];
      }
      resizing = { varName, minSize, startX: e.clientX, startW, handle: h, isLeft };
      h.classList.add('dragging');
      document.body.classList.add('resizing-col');
      e.preventDefault();
    });
    document.addEventListener('mousemove', function(e) {
      if (!resizing) return;
      const raw = e.clientX - resizing.startX;
      const delta = resizing.isLeft ? -raw : raw;
      const newW = Math.max(resizing.minSize, resizing.startW + delta);
      document.documentElement.style.setProperty(resizing.varName, newW + 'px');
    });
    document.addEventListener('mouseup', function() {
      if (!resizing) return;
      resizing.handle.classList.remove('dragging');
      document.body.classList.remove('resizing-col');
      saveColWidths();
      resizing = null;
    });
    document.addEventListener('dblclick', function(e) {
      const h = e.target.closest && e.target.closest('.col-resize, .side-col-resize');
      if (!h) return;
      if (h.classList.contains('col-resize')) {
        const key = h.dataset.colkey;
        if (!key || !COL_DEFAULT.hasOwnProperty(key)) return;
        applyColWidth(key, getDefaultFor(key));
      } else {
        const key = h.dataset.sidecol;
        if (!key || !SIDE_VAR[key]) return;
        document.documentElement.style.setProperty(SIDE_VAR[key], getDefaultFor(key) + 'px');
      }
      saveColWidths();
    });
  }

  function autoPinOnFirstLoad() {
    try {
      if (localStorage.getItem(CUSTOM_DEFAULTS_KEY)) return;
      // 첫 실행 (혹은 초기화 후): 현재 CSS var 값(= 저장된 조정값 또는 기본값)을 커스텀 기본값으로 자동 등록
      const cs = getComputedStyle(document.documentElement);
      const out = {};
      Object.keys(COL_DEFAULT).forEach(k => {
        out[k] = parseInt(cs.getPropertyValue(`--col-${k}-w`), 10) || COL_DEFAULT[k];
      });
      Object.keys(SIDE_DEFAULT).forEach(k => {
        if (!SIDE_VAR[k]) return;
        out[k] = parseInt(cs.getPropertyValue(SIDE_VAR[k]), 10) || SIDE_DEFAULT[k];
      });
      localStorage.setItem(CUSTOM_DEFAULTS_KEY, JSON.stringify(out));
    } catch (e) {}
  }

  function init() {
    state = loadState();
    loadColWidths();
    autoPinOnFirstLoad();
    loadSidebarWidth();
    try { const savedScale = localStorage.getItem(SCALE_KEY); if (savedScale) setScale(savedScale); } catch (e) {}
    try {
      const savedWidth = localStorage.getItem(CARD_WIDTH_KEY);
      if (savedWidth) {
        updateCardWidth(savedWidth);
        const slider = document.getElementById('cardWidthSlider');
        if (slider) slider.value = savedWidth;
      }
    } catch (e) {}
    try {
      const savedTheme = localStorage.getItem(THEME_KEY);
      if (savedTheme) applyTheme(savedTheme);
      else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) applyTheme('dark');
      else applyTheme('light');
    } catch (e) { applyTheme('light'); }

    render();
    saveState();
    initColResize();
    initSidebarResize();
    initDatePicker();
    initSettingsMenu();

    // 월별 히스토리 scope 버튼 초기 상태 복원
    const initScope = getMonthlyScope();
    document.querySelectorAll('.scope-btn').forEach(b => b.classList.toggle('active', b.dataset.scope === initScope));

    // 메인 목표 (주/월) 편집창 높이 복원
    try {
      const raw = localStorage.getItem(CUSTOM_DEFAULTS_KEY);
      if (raw) {
        const saved = JSON.parse(raw);
        // 구 mainGoalHeight → 주 목표 편집창으로 이관
        const weekH = saved.goalWeekHeight || saved.mainGoalHeight;
        if (weekH) {
          const ta = document.querySelector('#goal-week .goal-edit');
          if (ta) ta.style.height = weekH + 'px';
        }
        if (saved.goalMonthHeight) {
          const ta = document.querySelector('#goal-month .goal-edit');
          if (ta) ta.style.height = saved.goalMonthHeight + 'px';
        }
      }
    } catch (e) {}

    document.getElementById('modalBackdrop').addEventListener('click', function(e) {
      if (e.target === this) hideModal();
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        const bd = document.getElementById('modalBackdrop');
        if (!bd.classList.contains('hidden')) hideModal();
      }
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
