<script>
'use strict';
// daily.html 전용 스크립트. 공용(상수·유틸·상태·테마·모달·I/O·싱크)은 shared.js.

// daily 전용 상수 (컬럼 리사이즈·설정)
const SCALE_KEY = 'worklog-scale';
const CARD_WIDTH_KEY = 'worklog-card-width';
const COL_WIDTHS_KEY = 'worklog-col-widths';
const SIDEBAR_WIDTH_KEY = 'worklog-sidebar-width';
const CUSTOM_DEFAULTS_KEY = 'worklog-col-custom-defaults';
const COL_MIN = { project: 40, name: 90, target: 58, start: 70, end: 70, progress: 40, est: 44, done: 28, note: 70, delete: 20 };
const COL_DEFAULT = { project: 62, name: 200, target: 72, start: 92, end: 92, progress: 56, est: 64, done: 40, note: 160, delete: 24 };

  // ---------- 드래그 범위 선택 (마감일·시작/종료 시간 일괄 미설정) ----------
  const bulkSel = {
    dragStart: null,
    group: null,
    cells: new Set()
  };

  function initBulkSelection() {
    document.addEventListener('mousedown', handleBulkMouseDown, true);
    document.addEventListener('mousemove', handleBulkMouseMove);
    document.addEventListener('mouseup', handleBulkMouseUp);
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && bulkSel.cells.size > 0) clearBulkSelection();
    });
  }

  function handleBulkMouseDown(e) {
    // 팝업 내부 클릭은 무시
    if (e.target.closest && e.target.closest('#bulkPopup')) return;
    const cell = e.target.closest && e.target.closest('.bulk-selectable');
    if (!cell) {
      // 바깥 클릭 시 선택 해제
      if (bulkSel.cells.size > 0) clearBulkSelection();
      return;
    }
    e.preventDefault(); // input 포커스 방지 (mouseup에서 프로그래밍)
    bulkSel.dragStart = { cell, x: e.clientX, y: e.clientY, moved: false };
    bulkSel.group = cell.dataset.bulkGroup;
    // 기존 선택 초기화
    document.querySelectorAll('.bulk-selected').forEach(el => el.classList.remove('bulk-selected'));
    bulkSel.cells = new Set([cell]);
    cell.classList.add('bulk-selected');
    hideBulkPopup();
  }

  function handleBulkMouseMove(e) {
    if (!bulkSel.dragStart) return;
    if (!bulkSel.dragStart.moved) {
      const dx = Math.abs(e.clientX - bulkSel.dragStart.x);
      const dy = Math.abs(e.clientY - bulkSel.dragStart.y);
      if (dx < 4 && dy < 4) return;
      bulkSel.dragStart.moved = true;
      document.body.classList.add('bulk-dragging');
    }
    const target = document.elementFromPoint(e.clientX, e.clientY);
    if (!target) return;
    const cell = target.closest && target.closest('.bulk-selectable');
    if (!cell || cell.dataset.bulkGroup !== bulkSel.group) return;
    // DOM 순서 기반 범위 계산
    const all = Array.from(document.querySelectorAll('[data-bulk-group="' + bulkSel.group + '"]'));
    const si = all.indexOf(bulkSel.dragStart.cell);
    const ei = all.indexOf(cell);
    if (si === -1 || ei === -1) return;
    const [from, to] = si <= ei ? [si, ei] : [ei, si];
    const range = all.slice(from, to + 1);
    // 시각 업데이트
    const next = new Set(range);
    bulkSel.cells.forEach(c => { if (!next.has(c)) c.classList.remove('bulk-selected'); });
    range.forEach(c => c.classList.add('bulk-selected'));
    bulkSel.cells = next;
  }

  function handleBulkMouseUp(e) {
    if (!bulkSel.dragStart) return;
    const moved = bulkSel.dragStart.moved;
    const startCell = bulkSel.dragStart.cell;
    bulkSel.dragStart = null;
    document.body.classList.remove('bulk-dragging');

    if (!moved) {
      // 단일 클릭 — input 포커스 프로그래밍 (달력/편집 진입)
      clearBulkSelection();
      const input = startCell.querySelector('input, select');
      if (input) {
        try { input.focus(); } catch (err) {}
      }
      return;
    }
    if (bulkSel.cells.size >= 2) {
      showBulkPopup();
    } else {
      clearBulkSelection();
    }
  }

  function clearBulkSelection() {
    bulkSel.cells.forEach(el => el.classList.remove('bulk-selected'));
    bulkSel.cells = new Set();
    bulkSel.group = null;
    hideBulkPopup();
  }

  function showBulkPopup() {
    const popup = document.getElementById('bulkPopup');
    if (!popup) return;
    const cnt = document.getElementById('bulkPopupCount');
    if (cnt) cnt.textContent = bulkSel.cells.size;
    popup.classList.remove('hidden');
  }

  function hideBulkPopup() {
    const popup = document.getElementById('bulkPopup');
    if (popup) popup.classList.add('hidden');
  }

  window.applyBulkDash = function() {
    if (bulkSel.cells.size === 0) return;
    let changed = 0;
    bulkSel.cells.forEach(cell => {
      const kind = cell.dataset.bulkKind;
      if (kind === 'important') {
        const idx = parseInt(cell.dataset.bulkIdx, 10);
        if (state.importantTasks[idx]) { state.importantTasks[idx].targetDate = DASH; changed++; }
      } else if (kind === 'routine') {
        const idx = parseInt(cell.dataset.bulkIdx, 10);
        if (state.routines[idx]) { state.routines[idx].targetDate = DASH; changed++; }
      } else if (kind === 'task-start' || kind === 'task-end') {
        const parts = (cell.dataset.bulkKey || '').split('|');
        const dayIdx = parseInt(parts[0], 10);
        const qKey = parts[1];
        const ti = parseInt(parts[2], 10);
        const task = state.days[dayIdx] && state.days[dayIdx].quadrants[qKey] && state.days[dayIdx].quadrants[qKey][ti];
        if (task) {
          if (kind === 'task-start') task.startTime = DASH;
          else task.endTime = DASH;
          changed++;
        }
      }
    });
    clearBulkSelection();
    if (changed > 0) { saveState(); render(); }
  };

  window.clearBulkSelection = clearBulkSelection;

  // ---------- 미니 달력 (Date Picker) ----------
  const datePicker = {
    el: null,
    currentInput: null,
    currentMonth: null
  };

  function ensureDatePickerEl() {
    if (datePicker.el) return datePicker.el;
    const el = document.createElement('div');
    el.className = 'date-picker hidden';
    el.innerHTML = [
      '<div class="dp-header">',
      '  <button class="dp-nav" data-dir="-1" title="이전 달">◀</button>',
      '  <span class="dp-title"></span>',
      '  <button class="dp-nav" data-dir="1" title="다음 달">▶</button>',
      '</div>',
      '<div class="dp-weekdays"><span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span></div>',
      '<div class="dp-grid"></div>',
      '<div class="dp-actions">',
      '  <button class="dp-action dp-today-btn" data-act="today">오늘</button>',
      '  <button class="dp-action dp-unset-btn" data-act="unset">미설정 -</button>',
      '  <button class="dp-action dp-clear-btn" data-act="clear">지우기</button>',
      '</div>'
    ].join('');
    document.body.appendChild(el);

    el.addEventListener('mousedown', e => e.preventDefault()); // input blur 방지

    el.querySelectorAll('.dp-nav').forEach(btn => {
      btn.addEventListener('click', () => {
        if (!datePicker.currentMonth) return;
        const dir = parseInt(btn.dataset.dir, 10);
        datePicker.currentMonth.setMonth(datePicker.currentMonth.getMonth() + dir);
        renderDatePickerGrid();
      });
    });

    el.querySelector('.dp-grid').addEventListener('click', e => {
      const cell = e.target.closest('.dp-cell');
      if (!cell || cell.classList.contains('dp-empty')) return;
      const date = cell.dataset.date;
      if (date) commitDatePick(date);
    });

    el.querySelectorAll('.dp-action').forEach(btn => {
      btn.addEventListener('click', () => {
        const act = btn.dataset.act;
        if (act === 'today') commitDatePick(formatDate(new Date()));
        else if (act === 'unset') commitDatePick(DASH);
        else if (act === 'clear') commitDatePick('');
      });
    });

    datePicker.el = el;
    return el;
  }

  function openDatePickerFor(input) {
    ensureDatePickerEl();
    datePicker.currentInput = input;
    // 현재 input 값 파싱 → 기준 달 결정
    const y0 = new Date().getFullYear();
    const parsed = parseDateInput(input.value || '', y0);
    let base;
    if (parsed && parsed !== DASH) {
      base = new Date(parsed);
      if (isNaN(base.getTime())) base = new Date();
    } else {
      base = new Date();
    }
    datePicker.currentMonth = new Date(base.getFullYear(), base.getMonth(), 1);
    positionDatePicker(input);
    renderDatePickerGrid();
    datePicker.el.classList.remove('hidden');
  }

  function closeDatePicker() {
    if (datePicker.el) datePicker.el.classList.add('hidden');
    datePicker.currentInput = null;
    datePicker.currentMonth = null;
  }

  function commitDatePick(dateStr) {
    const input = datePicker.currentInput;
    if (input) {
      let displayValue;
      if (dateStr === DASH) displayValue = DASH;
      else if (!dateStr) displayValue = '';
      else displayValue = formatDateDisplay(dateStr);
      input.value = displayValue;
      input.dispatchEvent(new Event('change', { bubbles: true }));
    }
    closeDatePicker();
  }

  function positionDatePicker(input) {
    const rect = input.getBoundingClientRect();
    const el = datePicker.el;
    const width = 248 + 20; // padding 감안
    const height = 290;
    let left = rect.left;
    if (left + width > window.innerWidth - 8) left = window.innerWidth - width - 8;
    if (left < 8) left = 8;
    let top = rect.bottom + 4;
    if (top + height > window.innerHeight - 8) top = rect.top - height - 4;
    if (top < 8) top = 8;
    el.style.left = left + 'px';
    el.style.top = top + 'px';
  }

  function renderDatePickerGrid() {
    const el = datePicker.el;
    if (!el || !datePicker.currentMonth) return;
    const m = datePicker.currentMonth;
    const y = m.getFullYear();
    const mo = m.getMonth();

    el.querySelector('.dp-title').textContent = `${y}년 ${mo + 1}월`;

    const firstDow = new Date(y, mo, 1).getDay();
    const lastDate = new Date(y, mo + 1, 0).getDate();

    const today = formatDate(new Date());
    const input = datePicker.currentInput;
    const selectedYmd = input ? parseDateInput(input.value || '', y) : '';

    const cells = [];
    for (let i = 0; i < firstDow; i++) {
      cells.push('<span class="dp-cell dp-empty"></span>');
    }
    for (let d = 1; d <= lastDate; d++) {
      const dateStr = `${y}-${String(mo + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
      const dow = new Date(y, mo, d).getDay();
      const classes = ['dp-cell'];
      if (dateStr === today) classes.push('dp-today');
      if (dateStr === selectedYmd) classes.push('dp-selected');
      if (dow === 0) classes.push('dp-sun');
      if (dow === 6) classes.push('dp-sat');
      cells.push(`<button type="button" class="${classes.join(' ')}" data-date="${dateStr}">${d}</button>`);
    }
    el.querySelector('.dp-grid').innerHTML = cells.join('');
  }

  function initDatePicker() {
    // 날짜 input 포커스 시 팝업
    document.addEventListener('focusin', e => {
      const input = e.target.closest && e.target.closest('.date-picker-input');
      if (input) {
        openDatePickerFor(input);
        return;
      }
      // 달력 내부 focus는 무시
      if (datePicker.el && datePicker.el.contains(e.target)) return;
      // 그 외 다른 곳으로 포커스 이동 → 닫기
      if (datePicker.el && !datePicker.el.classList.contains('hidden')) closeDatePicker();
    });
    // 바깥 mousedown 닫기
    document.addEventListener('mousedown', e => {
      if (!datePicker.el || datePicker.el.classList.contains('hidden')) return;
      if (datePicker.el.contains(e.target)) return;
      if (e.target.closest && e.target.closest('.date-picker-input')) return;
      closeDatePicker();
    });
    // Escape
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && datePicker.el && !datePicker.el.classList.contains('hidden')) {
        closeDatePicker();
      }
    });
    // 스크롤 시 닫기 (위치 틀어짐 방지)
    window.addEventListener('scroll', () => {
      if (datePicker.el && !datePicker.el.classList.contains('hidden')) closeDatePicker();
    }, true);
  }

  // ---------- Phase 3 헬퍼: 달성률 / 트렌드 / 시각화 ----------
  function prevWeekAvgRate() {
    if (!state.history || state.history.length === 0) return null;
    const sorted = state.history.slice().sort((a, b) => (b.archivedAt || '').localeCompare(a.archivedAt || ''));
    const lastWeek = sorted[0];
    if (!lastWeek || !Array.isArray(lastWeek.days) || lastWeek.days.length === 0) return null;
    const stats = calcWeekStats(lastWeek.days);
    return stats.rate;
  }

  function donutSvg(rate, size) {
    const s = size || 112;
    const stroke = 10;
    const r = (s / 2) - (stroke / 2) - 2;
    const c = 2 * Math.PI * r;
    const pct = Math.max(0, Math.min(100, rate || 0));
    const dashOffset = c * (1 - pct / 100);
    const cx = s / 2;
    const cy = s / 2;
    return `
      <svg class="donut ${rateClass(rate)}" width="${s}" height="${s}" viewBox="0 0 ${s} ${s}" role="img" aria-label="달성률 ${rate}%">
        <circle class="donut-bg" cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke-width="${stroke}"/>
        <circle class="donut-fg" cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke-width="${stroke}"
                stroke-dasharray="${c.toFixed(2)}" stroke-dashoffset="${dashOffset.toFixed(2)}"
                transform="rotate(-90 ${cx} ${cy})" stroke-linecap="round"/>
        <text class="donut-text" x="${cx}" y="${cy - 3}" text-anchor="middle" dominant-baseline="central">${rate}%</text>
        <text class="donut-sub" x="${cx}" y="${cy + 16}" text-anchor="middle" dominant-baseline="central">달성률</text>
      </svg>`;
  }

  function sparklineHtml(days) {
    const today = formatDate(new Date());
    const items = days.map(d => {
      const st = calcDayStats(d);
      const isToday = d.date === today;
      const h = Math.max(0, Math.min(100, st.rate));
      return `
        <div class="sparkbar-wrap ${isToday ? 'today' : ''}" title="${escapeHtml(d.dayName)} ${escapeHtml(formatDateDisplay(d.date))} · 달성률 ${st.rate}%">
          <span class="sparkbar-label">${st.total > 0 ? st.rate + '%' : '—'}</span>
          <div class="sparkbar-track">
            <div class="sparkbar-fill ${rateClass(st.total > 0 ? st.rate : null)}" style="height:${h}%"></div>
          </div>
          <span class="sparkbar-day">${escapeHtml(d.dayName)}</span>
        </div>`;
    }).join('');
    return `<div class="sparkline">${items}</div>`;
  }

  function trendChipHtml(currentRate) {
    const prev = prevWeekAvgRate();
    if (prev == null) {
      return `<span class="trend-chip-label">지난 주 기록 없음</span>`;
    }
    const diff = currentRate - prev;
    if (diff === 0) {
      return `<span class="trend-chip trend-flat" title="지난 주 평균 ${prev}%">± 0%p <span class="trend-chip-label">vs 지난주 ${prev}%</span></span>`;
    }
    if (diff > 0) {
      return `<span class="trend-chip trend-up" title="지난 주 평균 ${prev}%">▲ +${diff}%p <span class="trend-chip-label">vs 지난주 ${prev}%</span></span>`;
    }
    return `<span class="trend-chip trend-down" title="지난 주 평균 ${prev}%">▼ ${diff}%p <span class="trend-chip-label">vs 지난주 ${prev}%</span></span>`;
  }

  function heatmapHtml(days) {
    const cells = (days || []).map(d => {
      const st = calcDayStats(d);
      const rate = st.total > 0 ? st.rate : null;
      return `
        <div class="heat-cell ${rateClass(rate)}" title="${escapeHtml(d.dayName)} ${escapeHtml(formatDateDisplay(d.date))}">
          <span class="heat-cell-day">${escapeHtml(d.dayName)}</span>
          <span class="heat-cell-rate">${rate == null ? '—' : rate + '%'}</span>
        </div>`;
    }).join('');
    return `<div class="history-heatmap">${cells}</div>`;
  }

  function hoursCompareHtml(actualH, estH) {
    if (actualH <= 0 && estH <= 0) return '';
    const maxH = Math.max(actualH, estH, 0.1);
    const estPct = Math.round((estH / maxH) * 100);
    const actPct = Math.round((actualH / maxH) * 100);
    return `
      <div class="hours-compare">
        <div class="hours-row">
          <span class="hours-label">예상</span>
          <div class="hours-track"><div class="hours-fill est" style="width:${estPct}%"></div></div>
          <span class="hours-val">${estH.toFixed(1)}h</span>
        </div>
        <div class="hours-row">
          <span class="hours-label">실제</span>
          <div class="hours-track"><div class="hours-fill actual" style="width:${actPct}%"></div></div>
          <span class="hours-val">${actualH.toFixed(1)}h</span>
        </div>
      </div>`;
  }

  function buildSelect(cls, value, options, onchange, formatter) {
    const fmt = typeof formatter === 'function' ? formatter : (o => o);
    const opts = options.map(o => `<option value="${escapeHtml(o)}"${o === value ? ' selected' : ''}>${escapeHtml(fmt(o))}</option>`).join('');
    return `<select class="${cls}" data-v="${escapeHtml(value)}" onchange="${onchange}; this.dataset.v=this.value;">${opts}</select>`;
  }

  // 구분 datalist — 자유 입력 + 기존 값 자동 추천 (빈 기본값, 사용자 추가형)
  function buildCatInput(cls, value, suggestions, onchange, placeholder) {
    const listId = 'dl_' + Math.random().toString(36).slice(2, 8);
    const opts = (suggestions || []).map(o => `<option value="${escapeHtml(o)}">`).join('');
    const ph = placeholder || '구분';
    return `<input type="text" class="${cls}" list="${listId}" placeholder="${escapeHtml(ph)}" value="${escapeHtml(value || '')}" data-v="${escapeHtml(value || '')}" onchange="${onchange}; this.dataset.v=this.value;"><datalist id="${listId}">${opts}</datalist>`;
  }

  // 기존 데이터에서 카테고리 값 추출 (datalist 추천용)
  function getCategorySuggestions(kind) {
    const set = new Set();
    if (kind === 'important') {
      (state.importantTasks || []).forEach(t => { if (t.category) set.add(t.category); });
    } else if (kind === 'routineCat') {
      (state.routines || []).forEach(t => { if (t.category) set.add(t.category); });
    } else if (kind === 'routineSub') {
      (state.routines || []).forEach(t => { if (t.subCategory) set.add(t.subCategory); });
    }
    return Array.from(set).sort();
  }

  // 상태 셀렉트 — 옵션 텍스트 앞에 ● 점 prefix (색은 status-chip text-color로 자동 적용)
  const STATUS_PREFIX = s => '● ' + s;

  // 프로젝트 드롭다운 렌더 (색상 슬롯 자동)
  function buildProjectSelect(value, onchange) {
    const labels = (state && state.projectLabels) || DEFAULT_PROJECTS;
    const slot = projectSlot(value);
    const opts = labels.map(o => `<option value="${escapeHtml(o)}"${o === value ? ' selected' : ''}>${escapeHtml(o)}</option>`).join('');
    return `<select class="project-tag" data-v="${escapeHtml(value)}" data-slot="${slot}" onchange="${onchange}; this.dataset.v=this.value;">${opts}</select>`;
  }

  // ---------- 렌더 ----------
  function render() {
    // #daily 단일 모드 — 보드/히스토리 UI는 제거됨
    // (renderGoals/renderImportantTasks/renderRoutines/renderWeekGrid/renderHistory/renderMonthlyHistory는
    //  DOM이 없으므로 호출 시 early return — 상태 데이터는 그대로 유지)
    renderDaily();
  }

  // ══════════════════════════════════════════════════════════════
  // #daily (오늘 카드) — Phase 1 ①
  // q1~q4 평탄화 + 요일탭 네비 + 슬라이드 애니메이션
  // ══════════════════════════════════════════════════════════════
  let dailyIdx = -1;   // 현재 선택 day 인덱스 (0~4)
  let dailyPrev = -1;  // 직전 인덱스 (애니메이션 방향용)

  function todayDayIdx() {
    if (!state || !Array.isArray(state.days)) return 0;
    const today = formatDate(new Date());
    const hit = state.days.findIndex(d => d.date === today);
    return hit >= 0 ? hit : 0;
  }

  function renderDaily() {
    if (!state || !Array.isArray(state.days) || state.days.length === 0) return;
    if (dailyIdx < 0 || dailyIdx >= state.days.length) dailyIdx = todayDayIdx();
    renderDailyTabs();
    renderDailyCard();
  }

  function renderDailyTabs() {
    const el = document.getElementById('dailyDayTabs');
    if (!el) return;
    const todayIdx = todayDayIdx();
    el.innerHTML = state.days.map((d, i) => {
      const flat = flattenDayTasks(d);
      const total = flat.length;
      const doneN = flat.filter(x => taskStatus(x.task) === 'done').length;
      const doingN = flat.filter(x => taskStatus(x.task) === 'doing').length;
      const waitN = flat.filter(x => taskStatus(x.task) === 'wait').length;
      let progHtml;
      if (total === 0) {
        progHtml = '<div class="daily-dots"></div>';
      } else if (total <= 5) {
        const dots = [
          ...Array(doneN).fill('<span class="daily-dot done"></span>'),
          ...Array(doingN).fill('<span class="daily-dot doing"></span>'),
          ...Array(waitN).fill('<span class="daily-dot"></span>')
        ].join('');
        progHtml = `<div class="daily-dots">${dots}</div>`;
      } else {
        const doingTxt = doingN > 0 ? ` <span class="daily-count-doing">▶${doingN}</span>` : '';
        progHtml = `<div class="daily-count">${doneN}/${total}${doingTxt}</div>`;
      }
      const cls = [
        'daily-day-tab',
        i === dailyIdx ? 'active' : '',
        i === todayIdx ? 'is-today' : ''
      ].filter(Boolean).join(' ');
      return `<div class="${cls}" onclick="dailyJump(${i})">
        <div>${escapeHtml(d.dayName || '')}</div>
        ${progHtml}
      </div>`;
    }).join('');
  }

  function renderDailyCard() {
    const d = state.days[dailyIdx];
    const host = document.getElementById('dailyCard');
    if (!host || !d) return;
    const todayIdx = todayDayIdx();
    const flat = flattenDayTasks(d);
    const doneN = flat.filter(x => x.task.done).length;
    const total = flat.length;
    const totalEst = flat.reduce((s, x) => {
      const v = parseFloat(x.task.estimatedHours);
      return s + (isNaN(v) ? 0 : v);
    }, 0);
    const totalProg = flat.reduce((s, x) => s + calcTaskHours(x.task), 0);
    const rawPct = totalEst > 0 ? (totalProg / totalEst) * 100 : 0;
    const pct = Math.min(100, Math.round(rawPct)); // 바 가로폭은 100% 상한
    const summaryColorCls = totalEst > 0 ? progressColorClass(rawPct) : '';

    let cardCls = 'daily-card';
    if (dailyIdx === todayIdx) cardCls += ' is-today';
    else if (dailyIdx < todayIdx) cardCls += ' is-past';
    else cardCls += ' is-future';
    if (dailyPrev >= 0 && dailyIdx > dailyPrev) cardCls += ' anim-r';
    else if (dailyPrev >= 0 && dailyIdx < dailyPrev) cardCls += ' anim-l';

    const rowsHtml = flat.length === 0
      ? `<tr><td colspan="10" class="daily-empty">아직 기록된 업무가 없어요</td></tr>`
      : flat.map(x => dailyRowHtml(x.task, x.qKey, x.ti)).join('');

    const dateDisplay = formatDateDisplay(d.date);
    const isToday = dailyIdx === todayIdx;

    host.innerHTML = `
      <div class="${cardCls}">
        <div class="daily-head">
          <span class="daily-date-big">${escapeHtml(dateDisplay)}</span>
          <span class="daily-date-dow">${escapeHtml(d.dayName || '')}요일</span>
          ${isToday ? '<span class="daily-today-badge">오늘</span>' : ''}
          <div class="daily-summary">
            <span>완료 <b>${doneN}</b>/${total}</span>
            <span>${totalProg.toFixed(1)}h / ${totalEst.toFixed(1)}h</span>
            <span class="daily-progress"><span class="${summaryColorCls}" style="width:${pct}%"></span></span>
          </div>
        </div>
        <div class="daily-table-wrap">
          <table class="daily-table">
            <thead>
              <tr>
                <th style="width:60px">구분</th>
                <th style="width:44px">분면</th>
                <th>업무명</th>
                <th style="width:64px">시작</th>
                <th style="width:64px">종료</th>
                <th style="width:110px; text-align:right">진행</th>
                <th style="width:56px; text-align:right">예상</th>
                <th style="width:64px">상태</th>
                <th style="width:40px">완료</th>
                <th style="width:28px" aria-label="삭제"></th>
              </tr>
            </thead>
            <tbody>${rowsHtml}</tbody>
          </table>
        </div>
        <div class="daily-add-row" onclick="addDailyTask(${dailyIdx})">+ 업무 추가</div>
        <div class="daily-retro-wrap">
          <span class="daily-retro-label">오늘 한 줄</span>
          <input class="daily-retro-input" type="text" maxlength="200"
                 value="${escapeHtml(d.retro || '')}"
                 placeholder="오늘 어땠어? (Enter로 저장)"
                 onblur="setDailyRetro(${dailyIdx}, this.value)"
                 onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();} else if(event.key==='Escape'){event.preventDefault();this.value=this.dataset.orig||'';this.blur();}"
                 data-orig="${escapeHtml(d.retro || '')}">
        </div>
      </div>
    `;
  }

  function dailyRowHtml(t, qKey, ti) {
    const slot = projectSlot(t.project) || '';
    const st = taskStatus(t);
    const stLabel = st === 'done' ? '완료' : st === 'doing' ? '진행중' : '대기';
    const hasTime = (t.startTime && t.startTime !== DASH) || (t.endTime && t.endTime !== DASH);
    const adj = Number(t.adjustHours) || 0;
    const hasAdj = adj !== 0;
    const progH = calcTaskHours(t);
    const progTxt = (hasTime || hasAdj) ? progH.toFixed(1) : DASH;
    const estTxt = t.estimatedHours === '' ? DASH : (t.estimatedHours === DASH ? DASH : parseFloat(t.estimatedHours).toFixed(1));
    const estNum = parseFloat(t.estimatedHours);
    const hasEst = isFinite(estNum) && estNum > 0;
    const pctNum = hasEst ? (progH / estNum) * 100 : null;
    const colorCls = (hasTime || hasAdj) ? progressColorClass(pctNum) : '';
    const progValCls = ['daily-prog-val', hasAdj ? 'daily-prog-adjusted' : '', colorCls].filter(Boolean).join(' ');
    const progTitle = hasAdj
      ? `자동 계산값 ${adj > 0 ? '+' : ''}${adj.toFixed(2)}h 보정됨 · 클릭하여 조정`
      : '클릭하면 30분 단위 ± 또는 직접 입력';
    const nameHtml = t.name ? escapeHtml(t.name) : '<span class="daily-placeholder">업무 이름</span>';
    const estHtml = (t.estimatedHours === '' || t.estimatedHours === DASH) ? '<span class="daily-placeholder">-</span>' : parseFloat(t.estimatedHours).toFixed(1);
    return `
      <tr>
        <td class="daily-editable daily-proj-cell" onclick="openDailyProjectPopover(${dailyIdx}, '${qKey}', ${ti}, this)" title="프로젝트 선택 / 추가 / 삭제">${t.project ? `<span class="daily-chip" data-slot="${slot}">${escapeHtml(t.project)}</span>` : '<span class="daily-placeholder">-</span>'}</td>
        <td class="daily-editable daily-quad-cell" onclick="openDailyQuadrantPopover(${dailyIdx}, '${qKey}', ${ti}, this)" title="분면 선택"><span class="daily-quad" data-q="${qKey}">${qKey.toUpperCase()}</span></td>
        <td class="daily-editable" data-field="name" data-qkey="${qKey}" data-ti="${ti}" onclick="startDailyEdit(${dailyIdx}, '${qKey}', ${ti}, 'name')">${nameHtml}</td>
        <td class="daily-time daily-editable" data-field="startTime" data-qkey="${qKey}" data-ti="${ti}" onclick="startDailyEdit(${dailyIdx}, '${qKey}', ${ti}, 'startTime')">${t.startTime ? escapeHtml(t.startTime) : '<span class="daily-placeholder">' + DASH + '</span>'}</td>
        <td class="daily-time daily-editable" data-field="endTime" data-qkey="${qKey}" data-ti="${ti}" onclick="startDailyEdit(${dailyIdx}, '${qKey}', ${ti}, 'endTime')">${t.endTime ? escapeHtml(t.endTime) : '<span class="daily-placeholder">' + DASH + '</span>'}</td>
        <td class="daily-num daily-prog-cell" onclick="openDailyProgPopover(${dailyIdx}, '${qKey}', ${ti}, this)" title="${escapeHtml(progTitle)}"><span class="${progValCls}">${progTxt}</span></td>
        <td class="daily-num daily-editable" data-field="estimatedHours" data-qkey="${qKey}" data-ti="${ti}" onclick="startDailyEdit(${dailyIdx}, '${qKey}', ${ti}, 'estimatedHours')">${estHtml}</td>
        <td><span class="daily-status ${st}" onclick="openDailyStatusPopover(${dailyIdx}, '${qKey}', ${ti}, this)" title="클릭하여 상태 선택">${stLabel}</span></td>
        <td><span class="daily-check ${t.done ? 'on' : ''}" onclick="toggleDailyDone(${dailyIdx}, '${qKey}', ${ti})"></span></td>
        <td><button class="daily-del" onclick="askDeleteDailyTask(${dailyIdx}, '${qKey}', ${ti})" title="삭제" aria-label="업무 삭제">×</button></td>
      </tr>
    `;
  }

  window.dailyJump = function(i) {
    if (i < 0 || i >= state.days.length) return;
    closeDailyPopover(); // 날짜 바뀌면 팝오버의 좌표(dayIdx)가 의미 없어짐
    dailyPrev = dailyIdx;
    dailyIdx = i;
    renderDaily();
  };
  window.dailyMove = function(delta) {
    window.dailyJump(dailyIdx + delta);
  };
  window.dailyGoToday = function() {
    window.dailyJump(todayDayIdx());
  };
  window.toggleDailyDone = function(dayIdx, qKey, ti) {
    const task = state.days[dayIdx] && state.days[dayIdx].quadrants[qKey] && state.days[dayIdx].quadrants[qKey][ti];
    if (!task) return;
    task.done = !task.done;
    // 체크박스와 상태 배지 일관성: 완료 체크 시 userStatus='done', 해제 시 자동 모드로 복귀
    task.userStatus = task.done ? 'done' : '';
    saveState();
    renderDaily();
    // 기존 주간 그리드도 동기화
    if (typeof renderWeekGrid === 'function') renderWeekGrid();
  };

  // ── 팝오버 공통 (상태/진행시간) ────────────────────────────────
  let dailyOpenPopover = null; // { type, dayIdx, qKey, ti, el }

  function positionPopoverBelow(anchor, popEl, opts) {
    const rect = anchor.getBoundingClientRect();
    const centered = opts && opts.centered;
    popEl.style.top = (rect.bottom + 4) + 'px';
    if (centered) {
      // anchor 가로 중앙에 pop 중앙을 맞춤
      requestAnimationFrame(function() {
        const pr = popEl.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        let left = cx - pr.width / 2;
        if (left < 8) left = 8;
        else if (left + pr.width > window.innerWidth - 8) left = window.innerWidth - pr.width - 8;
        popEl.style.left = left + 'px';
      });
    } else {
      popEl.style.left = rect.left + 'px';
    }
    // 화면 우측 벗어남 방지
    requestAnimationFrame(function() {
      const pr = popEl.getBoundingClientRect();
      if (!centered && pr.right > window.innerWidth - 8) {
        popEl.style.left = Math.max(8, window.innerWidth - pr.width - 8) + 'px';
      }
      if (pr.bottom > window.innerHeight - 8) {
        popEl.style.top = Math.max(8, rect.top - pr.height - 4) + 'px';
      }
    });
  }

  function popoverOutsideClick(e) {
    if (!dailyOpenPopover) return;
    const pop = dailyOpenPopover.el;
    if (pop && pop.contains(e.target)) return;
    closeDailyPopover();
  }

  function closeDailyPopover() {
    if (!dailyOpenPopover) return;
    const el = dailyOpenPopover.el;
    // 팝오버 닫히기 직전 훅 (진행시간 입력 자동 커밋 등)
    if (el && typeof el._onBeforeClose === 'function') {
      try { el._onBeforeClose(); } catch (err) { /* 입력값 오류는 무시, 팝오버는 정상 닫힘 */ }
    }
    if (el && el.parentNode) el.parentNode.removeChild(el);
    dailyOpenPopover = null;
    document.removeEventListener('click', popoverOutsideClick);
    window.removeEventListener('scroll', closeDailyPopover, true);
    window.removeEventListener('resize', closeDailyPopover);
  }

  function attachPopoverGlobalListeners() {
    // setTimeout(0): 팝오버 여는 click 이벤트가 document까지 버블되고 난 뒤 등록
    setTimeout(function() {
      document.addEventListener('click', popoverOutsideClick);
      window.addEventListener('scroll', closeDailyPopover, true);
      window.addEventListener('resize', closeDailyPopover);
    }, 0);
  }

  // ── 상태 팝오버 ─────────────────────────────────────────────
  function setDailyStatus(dayIdx, qKey, ti, next) {
    const task = state.days[dayIdx] && state.days[dayIdx].quadrants[qKey] && state.days[dayIdx].quadrants[qKey][ti];
    if (!task) return;
    if (!['wait', 'doing', 'done'].includes(next)) return;
    task.userStatus = next;
    task.done = (next === 'done');
    // 진행중 전환 시 시작 시각이 비어있으면 현재 시각 자동 주입 (멀티태스킹 편의)
    if (next === 'doing' && (!task.startTime || task.startTime === DASH)) {
      task.startTime = formatNowTime();
    }
    saveState();
    renderDaily();
    if (typeof renderWeekGrid === 'function') renderWeekGrid();
  }

  window.openDailyStatusPopover = function(dayIdx, qKey, ti, anchorEl) {
    closeDailyPopover();
    const task = state.days[dayIdx] && state.days[dayIdx].quadrants[qKey] && state.days[dayIdx].quadrants[qKey][ti];
    if (!task || !anchorEl) return;
    const cur = taskStatus(task);
    const OPTS = [
      { key: 'wait', label: '대기' },
      { key: 'doing', label: '진행중' },
      { key: 'done', label: '완료' }
    ];
    const pop = document.createElement('div');
    pop.className = 'daily-popover status-popover';
    pop.innerHTML = OPTS.map(o => `
      <button class="daily-pop-item ${o.key === cur ? 'active' : ''}" data-status="${o.key}">
        <span class="daily-pop-check">${o.key === cur ? '✓' : ''}</span>
        <span class="daily-status ${o.key}">${o.label}</span>
      </button>
    `).join('');
    document.body.appendChild(pop);
    positionPopoverBelow(anchorEl, pop);
    pop.addEventListener('click', function(e) {
      const btn = e.target.closest('.daily-pop-item');
      if (!btn) return;
      e.stopPropagation();
      setDailyStatus(dayIdx, qKey, ti, btn.dataset.status);
      closeDailyPopover();
    });
    dailyOpenPopover = { type: 'status', dayIdx: dayIdx, qKey: qKey, ti: ti, el: pop };
    attachPopoverGlobalListeners();
  };

  // ── 분면 팝오버 (상태 팝오버와 동일 구조) ─────────────────────
  window.openDailyQuadrantPopover = function(dayIdx, qKey, ti, anchorEl) {
    closeDailyPopover();
    const task = state.days[dayIdx] && state.days[dayIdx].quadrants[qKey] && state.days[dayIdx].quadrants[qKey][ti];
    if (!task || !anchorEl) return;
    const cur = qKey;
    const pop = document.createElement('div');
    pop.className = 'daily-popover quadrant-popover';
    pop.innerHTML = ['q1','q2','q3','q4'].map(q => `
      <button class="daily-pop-item ${q === cur ? 'active' : ''}" data-quad="${q}">
        <span class="daily-pop-check">${q === cur ? '✓' : ''}</span>
        <span class="daily-quad" data-q="${q}">${q.toUpperCase()}</span>
        <span class="daily-quad-label">${escapeHtml(DAILY_QUAD_LABELS[q].replace(/^Q[0-9]\s*/, ''))}</span>
      </button>
    `).join('');
    document.body.appendChild(pop);
    positionPopoverBelow(anchorEl, pop);
    pop.addEventListener('click', function(e) {
      const btn = e.target.closest('.daily-pop-item');
      if (!btn) return;
      e.stopPropagation();
      const newQ = btn.dataset.quad;
      if (newQ && newQ !== qKey && ['q1','q2','q3','q4'].includes(newQ)) {
        const day = state.days[dayIdx];
        if (day && day.quadrants && day.quadrants[qKey]) {
          day.quadrants[qKey].splice(ti, 1);
          task.quadrant = newQ;
          day.quadrants[newQ] = day.quadrants[newQ] || [];
          day.quadrants[newQ].push(task);
          saveState();
        }
      }
      closeDailyPopover();
      renderDaily();
      if (typeof renderWeekGrid === 'function') renderWeekGrid();
    });
    dailyOpenPopover = { type: 'quadrant', dayIdx: dayIdx, qKey: qKey, ti: ti, el: pop };
    attachPopoverGlobalListeners();
  };

  // ── 프로젝트 팝오버 (선택 + 추가 + 이름수정 + 삭제) ───────────
  function removeProjectLabel(name) {
    const labels = state.projectLabels || [];
    const idx = labels.indexOf(name);
    if (idx >= 0) {
      labels.splice(idx, 1);
      saveState();
      // 고아 값은 그대로 둠 — 기존 task.project 건드리지 않음
    }
  }

  function startAddProjectLabel(pop, rebuild, anchorEl) {
    const addRow = pop.querySelector('.daily-pop-row.add-row');
    if (!addRow) return;
    addRow.innerHTML = `<input class="daily-pop-input" type="text" maxlength="20" placeholder="새 구분 이름" />`;
    const inp = addRow.querySelector('input');
    inp.focus();
    let done = false;
    function commit(save) {
      if (done) return; done = true;
      if (!pop.isConnected) return;
      if (save) {
        const v = (inp.value || '').trim();
        if (v) {
          state.projectLabels = state.projectLabels || [];
          if (!state.projectLabels.includes(v)) state.projectLabels.push(v);
          saveState();
        }
      }
      rebuild();
      positionPopoverBelow(anchorEl, pop);
    }
    inp.addEventListener('keydown', function(e) {
      e.stopPropagation();
      if (e.key === 'Enter') { e.preventDefault(); commit(true); }
      else if (e.key === 'Escape') { e.preventDefault(); commit(false); }
    });
    inp.addEventListener('blur', function() { commit(true); });
  }

  function startRenameProjectLabel(pop, oldName, rebuild, anchorEl) {
    const row = Array.from(pop.querySelectorAll('.daily-pop-row')).find(r => {
      const b = r.querySelector('.daily-pop-item[data-act="pick"]');
      return b && b.dataset.label === oldName;
    });
    if (!row) return;
    row.innerHTML = `<input class="daily-pop-input" type="text" maxlength="20" value="${escapeHtml(oldName)}" />`;
    const inp = row.querySelector('input');
    inp.focus(); inp.select();
    let done = false;
    function commit(save) {
      if (done) return; done = true;
      if (!pop.isConnected) return;
      if (save) {
        const v = (inp.value || '').trim();
        if (v && v !== oldName) {
          const labels = state.projectLabels || [];
          const idx = labels.indexOf(oldName);
          if (idx >= 0 && !labels.includes(v)) labels[idx] = v;
          saveState();
        }
      }
      rebuild();
      positionPopoverBelow(anchorEl, pop);
    }
    inp.addEventListener('keydown', function(e) {
      e.stopPropagation();
      if (e.key === 'Enter') { e.preventDefault(); commit(true); }
      else if (e.key === 'Escape') { e.preventDefault(); commit(false); }
    });
    inp.addEventListener('blur', function() { commit(true); });
  }

  window.openDailyProjectPopover = function(dayIdx, qKey, ti, anchorEl) {
    closeDailyPopover();
    const task = state.days[dayIdx] && state.days[dayIdx].quadrants[qKey] && state.days[dayIdx].quadrants[qKey][ti];
    if (!task || !anchorEl) return;

    const pop = document.createElement('div');
    pop.className = 'daily-popover project-popover';
    document.body.appendChild(pop);

    function rebuild() {
      const labels = (state.projectLabels || []).slice();
      const cur = task.project || '';
      // 고아 값도 리스트에 표시 (선택 가능하게)
      const isOrphan = cur && !labels.includes(cur);
      if (isOrphan) labels.push(cur);

      const rows = labels.map(lbl => {
        const slot = projectSlot(lbl);
        const orphan = (lbl === cur) && isOrphan;
        const actions = orphan ? '' : `
          <button class="daily-pop-mini" data-act="edit" data-label="${escapeHtml(lbl)}" title="이름 수정">✎</button>
          <button class="daily-pop-mini" data-act="del" data-label="${escapeHtml(lbl)}" title="삭제">×</button>
        `;
        return `
          <div class="daily-pop-row ${lbl === cur ? 'active' : ''}">
            <button class="daily-pop-item" data-act="pick" data-label="${escapeHtml(lbl)}">
              <span class="daily-pop-check">${lbl === cur ? '✓' : ''}</span>
              <span class="daily-chip" data-slot="${slot}">${escapeHtml(lbl)}${orphan ? ' <em class="daily-pop-orphan">(삭제됨)</em>' : ''}</span>
            </button>
            ${actions}
          </div>
        `;
      }).join('');

      const addRow = `
        <div class="daily-pop-row add-row">
          <button class="daily-pop-item daily-pop-add" data-act="add-open">
            <span class="daily-pop-check">+</span>
            <span class="daily-pop-add-label">새 구분 추가</span>
          </button>
        </div>
      `;
      pop.innerHTML = `<div class="daily-pop-list">${rows}${addRow}</div>`;
    }

    rebuild();
    positionPopoverBelow(anchorEl, pop);

    pop.addEventListener('click', function(e) {
      const miniBtn = e.target.closest('.daily-pop-mini');
      if (miniBtn) {
        e.stopPropagation();
        const lbl = miniBtn.dataset.label;
        if (miniBtn.dataset.act === 'del') {
          removeProjectLabel(lbl);
          rebuild();
          positionPopoverBelow(anchorEl, pop);
        } else if (miniBtn.dataset.act === 'edit') {
          startRenameProjectLabel(pop, lbl, rebuild, anchorEl);
        }
        return;
      }
      const pickBtn = e.target.closest('.daily-pop-item[data-act="pick"]');
      if (pickBtn) {
        e.stopPropagation();
        task.project = pickBtn.dataset.label;
        saveState();
        closeDailyPopover();
        renderDaily();
        if (typeof renderWeekGrid === 'function') renderWeekGrid();
        return;
      }
      const addBtn = e.target.closest('.daily-pop-item[data-act="add-open"]');
      if (addBtn) {
        e.stopPropagation();
        startAddProjectLabel(pop, rebuild, anchorEl);
      }
    });

    dailyOpenPopover = { type: 'project', dayIdx: dayIdx, qKey: qKey, ti: ti, el: pop };
    attachPopoverGlobalListeners();
  };

  // ── 진행시간 팝오버 ─────────────────────────────────────────
  // adjustHours ±delta (팝오버 내부 +/- 버튼용). 소수 2자리 스냅.
  window.adjustDailyProg = function(dayIdx, qKey, ti, delta) {
    const task = state.days[dayIdx] && state.days[dayIdx].quadrants[qKey] && state.days[dayIdx].quadrants[qKey][ti];
    if (!task) return;
    const d = Number(delta);
    if (!isFinite(d) || d === 0) return;
    const cur = Number(task.adjustHours) || 0;
    task.adjustHours = Math.round((cur + d) * 100) / 100;
    saveState();
    renderDaily();
    if (typeof renderWeekGrid === 'function') renderWeekGrid();
  };

  window.openDailyProgPopover = function(dayIdx, qKey, ti, anchorEl) {
    closeDailyPopover();
    const task = state.days[dayIdx] && state.days[dayIdx].quadrants[qKey] && state.days[dayIdx].quadrants[qKey][ti];
    if (!task || !anchorEl) return;
    const curTotal = calcTaskHours(task);
    const pop = document.createElement('div');
    pop.className = 'daily-popover prog-popover';
    pop.innerHTML = `
      <div class="daily-prog-total">현재 <b class="daily-prog-total-val">${curTotal.toFixed(2)}</b>h</div>
      <div class="daily-prog-row">
        <button class="daily-prog-adj" data-sign="-1" title="− 증감" aria-label="빼기">−</button>
        <input type="text" class="daily-prog-input" placeholder="0.5" inputmode="decimal" aria-label="증감 단위(h)">
        <button class="daily-prog-adj" data-sign="1" title="+ 증감" aria-label="더하기">+</button>
      </div>
      <div class="daily-prog-hint">증감 단위(h)<br>빈 칸이면 <b>0.5</b>(30분)<br>예: <b>0.25</b>=15분 · <b>1</b>=1시간</div>
    `;
    document.body.appendChild(pop);
    // 숫자 텍스트는 셀 우측 정렬이므로, 숫자 span 기준으로 중앙 맞춤
    const progAnchor = anchorEl.querySelector('.daily-prog-val') || anchorEl;
    positionPopoverBelow(progAnchor, pop, { centered: true });
    const input = pop.querySelector('.daily-prog-input');
    const totalEl = pop.querySelector('.daily-prog-total-val');
    input.focus();

    function readStep() {
      const raw = input.value.trim();
      if (raw === '') return 0.5;
      const v = parseFloat(raw);
      if (!isFinite(v) || v <= 0) return 0.5;
      return v;
    }
    function applyDelta(sign) {
      const step = readStep();
      window.adjustDailyProg(dayIdx, qKey, ti, sign * step);
      const latest = state.days[dayIdx] && state.days[dayIdx].quadrants[qKey] && state.days[dayIdx].quadrants[qKey][ti];
      if (latest && totalEl) totalEl.textContent = calcTaskHours(latest).toFixed(2);
      input.focus();
    }
    pop.querySelectorAll('.daily-prog-adj').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        e.preventDefault();
        const sign = parseInt(btn.dataset.sign, 10) || 0;
        if (sign) applyDelta(sign);
      });
    });
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === 'Escape') {
        e.preventDefault();
        closeDailyPopover();
      }
    });

    dailyOpenPopover = { type: 'prog', dayIdx: dayIdx, qKey: qKey, ti: ti, el: pop };
    attachPopoverGlobalListeners();
  };

  // 오늘 카드에서 업무 삭제 (이름 없으면 즉시, 있으면 모달 확인)
  window.askDeleteDailyTask = function(dayIdx, qKey, ti) {
    const task = state.days[dayIdx] && state.days[dayIdx].quadrants[qKey] && state.days[dayIdx].quadrants[qKey][ti];
    if (!task) return;
    const doDelete = function() {
      if (!state.days[dayIdx] || !state.days[dayIdx].quadrants[qKey]) return;
      state.days[dayIdx].quadrants[qKey].splice(ti, 1);
      // 삭제된 행에 팝오버가 물려있을 수 있음 — 닫기
      if (dailyOpenPopover
          && dailyOpenPopover.dayIdx === dayIdx
          && dailyOpenPopover.qKey === qKey) {
        closeDailyPopover();
      }
      saveState();
      renderDaily();
      if (typeof renderWeekGrid === 'function') renderWeekGrid();
    };
    const name = (task.name || '').trim();
    if (!name) { doDelete(); return; }
    showModal('업무 삭제', `"${name}" 업무를 삭제할까요?`, doDelete);
  };
  // ── 인라인 편집 엔진 ────────────────────────────────────────
  const DAILY_EDIT_FIELDS = ['name', 'startTime', 'endTime', 'estimatedHours']; // project/quadrant는 팝오버로 별도 처리
  const DAILY_QUAD_LABELS = { q1: 'Q1 중요·긴급', q2: 'Q2 중요·비긴급', q3: 'Q3 비중요·긴급', q4: 'Q4 비중요·비긴급' };
  let dailyEdit = null; // { dayIdx, qKey, ti, field, el, input, origVal, navigating }

  // "1430"/"143"/"14:30"/"9"/"9.30" → "HH:MM" 또는 '' (빈 문자열 = 삭제)
  function parseTimeInput(raw) {
    if (raw === '' || raw == null) return '';
    const s = String(raw).trim().replace(/[.\s]/g, ':');
    if (s === '') return '';
    let h, m;
    if (s.includes(':')) {
      const parts = s.split(':');
      h = parseInt(parts[0], 10);
      m = parseInt(parts[1] || '0', 10);
    } else {
      // 숫자만: 1~2자리=시, 3자리=HMM, 4자리=HHMM
      const digits = s.replace(/\D/g, '');
      if (digits.length === 0) return null;
      if (digits.length <= 2) { h = parseInt(digits, 10); m = 0; }
      else if (digits.length === 3) { h = parseInt(digits.slice(0, 1), 10); m = parseInt(digits.slice(1), 10); }
      else { h = parseInt(digits.slice(0, 2), 10); m = parseInt(digits.slice(2, 4), 10); }
    }
    if (!isFinite(h) || !isFinite(m)) return null;
    if (h < 0 || h > 23 || m < 0 || m > 59) return null;
    return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
  }

  function currentTimeHHMM() {
    const d = new Date();
    return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
  }

  function startDailyEditInternal(dayIdx, qKey, ti, field) {
    const task = state.days[dayIdx] && state.days[dayIdx].quadrants[qKey] && state.days[dayIdx].quadrants[qKey][ti];
    if (!task) return;
    const cellEl = document.querySelector(
      `.daily-table td[data-field="${field}"][data-qkey="${qKey}"][data-ti="${ti}"]`
    );
    if (!cellEl) return;
    let origVal = '';
    if (field === 'name') origVal = task.name || '';
    else if (field === 'estimatedHours') {
      origVal = (task.estimatedHours === '' || task.estimatedHours === DASH) ? '' : String(task.estimatedHours);
    } else if (field === 'startTime' || field === 'endTime') {
      origVal = (task[field] && task[field] !== DASH) ? task[field] : '';
    }
    cellEl.classList.add('is-editing');
    // 시작 셀이 빈 상태로 열리면 현재 시각을 초깃값으로 제안
    let initialInputVal = origVal;
    if (field === 'startTime' && origVal === '') initialInputVal = currentTimeHHMM();
    cellEl.innerHTML = `<input class="daily-edit-input" type="text" value="${escapeHtml(initialInputVal)}">`;
    const input = cellEl.querySelector('input');
    dailyEdit = {
      dayIdx: dayIdx, qKey: qKey, ti: ti, taskId: task.id,
      field: field, el: cellEl, input: input, origVal: origVal, navigating: false
    };
    input.focus();
    input.select();
    input.addEventListener('blur', onDailyEditBlur);
    input.addEventListener('keydown', onDailyEditKeydown);
  }

  function closeDailyEdit(commit) {
    if (!dailyEdit) return;
    const info = dailyEdit;
    dailyEdit = null; // render 중 재진입 방지
    if (commit) {
      const task = state.days[info.dayIdx]
        && state.days[info.dayIdx].quadrants[info.qKey]
        && state.days[info.dayIdx].quadrants[info.qKey][info.ti];
      if (task) {
        const raw = (info.input.value || '').trim();
        if (info.field === 'name') {
          task.name = raw;
        } else if (info.field === 'estimatedHours') {
          if (raw === '') task.estimatedHours = '';
          else {
            const n = parseFloat(raw);
            task.estimatedHours = (isFinite(n) && n >= 0) ? String(n) : info.origVal;
          }
        } else if (info.field === 'startTime' || info.field === 'endTime') {
          const parsed = parseTimeInput(raw);
          // null = 잘못된 입력 → 원래 값 유지
          if (parsed !== null) task[info.field] = parsed;
        }
        saveState();
      }
    }
    renderDaily();
    if (typeof renderWeekGrid === 'function') renderWeekGrid();
  }

  function onDailyEditBlur() {
    if (!dailyEdit || dailyEdit.navigating) return;
    closeDailyEdit(true);
  }

  function onDailyEditKeydown(e) {
    if (!dailyEdit) return;
    if (e.key === 'Escape') {
      e.preventDefault();
      closeDailyEdit(false);
      return;
    }
    if (e.key === 'Enter') {
      e.preventDefault();
      dailyEditNavEnter();
      return;
    }
    if (e.key === 'Tab') {
      e.preventDefault();
      dailyEditNavTab(e.shiftKey ? -1 : 1);
      return;
    }
  }

  function dailyEditNavEnter() {
    const { dayIdx, taskId, field } = dailyEdit;
    dailyEdit.navigating = true;
    closeDailyEdit(true); // 분면 이동 등 위치 변경 가능
    const flat = flattenDayTasks(state.days[dayIdx]);
    const curIdx = flat.findIndex(x => x.task.id === taskId);
    const next = flat[curIdx + 1];
    if (curIdx === -1 || !next) {
      window.addDailyTask(dayIdx, field);
      return;
    }
    requestAnimationFrame(function() {
      startDailyEditInternal(dayIdx, next.qKey, next.ti, field);
    });
  }

  function dailyEditNavTab(dir) {
    const { dayIdx, taskId, field } = dailyEdit;
    dailyEdit.navigating = true;
    closeDailyEdit(true);
    const fi = DAILY_EDIT_FIELDS.indexOf(field);
    let nextField = DAILY_EDIT_FIELDS[fi + dir];
    const flat = flattenDayTasks(state.days[dayIdx]);
    const curIdx = flat.findIndex(x => x.task.id === taskId);
    let targetQ, targetTi;
    if (nextField) {
      const cur = flat[curIdx];
      if (!cur) return;
      targetQ = cur.qKey; targetTi = cur.ti;
    } else {
      const nf = flat[curIdx + dir];
      if (!nf) {
        if (dir === 1) { window.addDailyTask(dayIdx, DAILY_EDIT_FIELDS[0]); return; }
        return; // 맨 앞에서 Shift+Tab은 무시
      }
      targetQ = nf.qKey; targetTi = nf.ti;
      nextField = dir === 1 ? DAILY_EDIT_FIELDS[0] : DAILY_EDIT_FIELDS[DAILY_EDIT_FIELDS.length - 1];
    }
    requestAnimationFrame(function() {
      startDailyEditInternal(dayIdx, targetQ, targetTi, nextField);
    });
  }

  window.startDailyEdit = function(dayIdx, qKey, ti, field) {
    // 팝오버 열려있으면 닫기
    closeDailyPopover();
    // 이미 같은 셀 편집 중이면 무시
    if (dailyEdit
        && dailyEdit.dayIdx === dayIdx
        && dailyEdit.qKey === qKey
        && dailyEdit.ti === ti
        && dailyEdit.field === field) {
      return;
    }
    // 다른 셀 편집 중이면 먼저 커밋
    if (dailyEdit) {
      dailyEdit.navigating = true;
      closeDailyEdit(true);

        startDailyEditInternal(dayIdx, qKey, ti, field);

  window.setDailyRetro = function(dayIdx, value) {
    const day = state.days[dayIdx];
    if (!day) return;
    const v = (value == null ? '' : String(value)).trim();
    if (day.retro === v) return; // 변경 없음 — 무의미한 render 생략
    day.retro = v;
    saveState();
    // renderDaily 전체 재렌더 시 input 포커스/커서 위치 잃음.
    // 값은 이미 저장됐으므로 강제 재렌더 없이 다음 뷰 전환 때 반영되게 둠.
    if (typeof renderWeekGrid === 'function') renderWeekGrid();
  };

  window.addDailyTask = function(dayIdx, focusField) {
    // 기본 q4(중요X·긴급X)에 추가. 분면 변경은 Phase 2 드래그 기능에서 처리 예정.
    const day = state.days[dayIdx];
    if (!day || !day.quadrants) return;
    day.quadrants.q4.push({
      id: uid(),
      project: (state.projectLabels && state.projectLabels[0]) || '',
      name: '', targetDate: day.date,
      startTime: '', endTime: '', breakMinutes: 0, breakMode: 'exclude',
      estimatedHours: '', done: false, note: '',
      quadrant: 'q4', carriedOver: false, originalDate: '',
      userStatus: '', adjustHours: 0
    });
    const newTi = day.quadrants.q4.length - 1;
    saveState();
    renderDaily();
    if (typeof renderWeekGrid === 'function') renderWeekGrid();
    // 새 행 자동 편집 모드 진입
    const field = focusField || 'name';
    requestAnimationFrame(function() {
      startDailyEditInternal(dayIdx, 'q4', newTi, field);
    });
  };

    renderOneGoal('week', state.goals.week);

  function renderOneGoal(kind, value) {
    const item = document.getElementById('goal-' + kind);
    if (!item) return;
    const body = item.querySelector('.goal-body');
    const edit = item.querySelector('.goal-edit');
    if (!body || !edit) return;
    const placeholder = kind === 'week' ? '이번 주 핵심 목표를 적어주세요' : '이번 달 핵심 목표를 적어주세요';
    if (value && value.trim()) {
      body.textContent = value;
      body.classList.remove('empty');
    } else {
      body.textContent = placeholder;
      body.classList.add('empty');
    }
    // 편집 중이면 사용자 입력 보존 (덮어쓰지 않음)
    if (!item.classList.contains('editing') && edit.value !== value) {
      edit.value = value || '';
    }
  }

  function renderWeekGrid() {
    const grid = document.getElementById('weeklyGrid');
    if (!grid) return;
    const today = formatDate(new Date());
    const html = [];

    // Row 1: 날짜 헤더
    html.push('<div class="grid-cell label corner"></div>');
    state.days.forEach((d, idx) => {
      const isToday = d.date === today;
      html.push(`
        <div class="grid-cell day-header ${isToday ? 'today' : ''}">
          <div class="day-head-main">
            <span class="day-date-text">${formatDateDisplay(d.date)}</span>
            <span class="day-name-text">${escapeHtml(d.dayName)}${isToday ? ' · 오늘' : ''}</span>
          </div>
          <button class="btn-copy-prev" title="${idx === 0 ? '지난주 금요일' : '어제'} 업무 복사" onclick="copyFromPrevDay(${idx})">📋 ${idx === 0 ? '지난 금' : '어제'} 복사</button>
        </div>`);
    });

    // Row 2: 주요 일정
    html.push('<div class="grid-cell label">주요 일정</div>');
    state.days.forEach((d, idx) => {
      const tc = d.date === today ? ' today-col' : '';
      html.push(`<div class="grid-cell text-cell${tc}"><textarea placeholder="오늘의 주요 일정" onchange="updateDay(${idx}, 'schedule', this.value)">${escapeHtml(d.schedule)}</textarea></div>`);
    });

    // Row 3: 테이블 헤더
    html.push('<div class="grid-cell label">항목</div>');
    state.days.forEach(d => {
      const tc = d.date === today ? ' today-col' : '';
      html.push(`<div class="grid-cell thead-cell${tc}">${tableHeadHtml()}</div>`);
    });

    // Row 4~7: 분면
    QUADRANT_DEFS.forEach(q => {
      html.push(`<div class="grid-cell label ${q.key}">${escapeHtml(q.label)}</div>`);
      state.days.forEach((d, idx) => {
        const tasks = d.quadrants[q.key] || [];
        const rows = tasks.map((t, ti) => taskRowHtml(idx, q.key, ti, t, d.date)).join('');
        const tc = d.date === today ? ' today-col' : '';
        html.push(`
          <div class="grid-cell quadrant-cell day-cell ${q.key}${tc}">
            ${rows}
            <button class="btn-add-icon" onclick="addTask(${idx}, '${q.key}')">+ 업무 추가</button>
          </div>`);
      });
    });

    // Row 8: 메모
    html.push('<div class="grid-cell label">메모</div>');
    state.days.forEach((d, idx) => {
      const tc = d.date === today ? ' today-col' : '';
      html.push(`<div class="grid-cell text-cell${tc}"><textarea placeholder="오늘의 메모" onchange="updateDay(${idx}, 'memo', this.value)">${escapeHtml(d.memo)}</textarea></div>`);
    });

    // Row 9: 요약
    html.push('<div class="grid-cell label">요약</div>');
    state.days.forEach((d) => {
      const stats = calcDayStats(d);
      const tc = d.date === today ? ' today-col' : '';
      html.push(`
        <div class="grid-cell summary-cell${tc}">
          <div class="summary-top">
            <div class="summary-item">
              <span class="summary-label">예상</span>
              <span class="summary-value">${stats.estimatedHours.toFixed(1)}h</span>
            </div>
            <div class="summary-item">
              <span class="summary-label">실작업</span>
              <span class="summary-value">${stats.actualHours.toFixed(1)}h</span>
            </div>
          </div>
          <div class="summary-bottom">
            <div class="summary-progress-row">
              <span class="summary-label">달성률</span>
              <span class="summary-value">${stats.rate}%</span>
            </div>
            <div class="progress-bar big"><div class="progress-fill" style="width:${stats.rate}%"></div></div>
          </div>
        </div>`);
    });

    grid.innerHTML = html.join('');
  }

  function weekSummaryHtml() {
    const s = calcWeekStats(state.days);
    const projLabels = (state && state.projectLabels) || DEFAULT_PROJECTS;
    const maxH = Math.max(0.1,
      s.byQuadrant.q1, s.byQuadrant.q2, s.byQuadrant.q3, s.byQuadrant.q4,
      ...projLabels.map(p => s.byProject[p] || 0)
    );
    const quadLabels = { q1: '중요 × 긴급', q2: '중요 × 비긴급', q3: '비중요 × 긴급', q4: '비중요 × 비긴급' };
    const quadBars = ['q1','q2','q3','q4'].map(qk => {
      const h = s.byQuadrant[qk];
      const pct = Math.round(h / maxH * 100);
      return `
        <div class="stat-row">
          <span class="stat-label">${quadLabels[qk]}</span>
          <div class="stat-bar"><div class="stat-fill ${qk}" style="width:${pct}%"></div></div>
          <span class="stat-val">${h.toFixed(1)}h</span>
        </div>`;
    }).join('');
    const projBars = projLabels.map(p => {
      const h = s.byProject[p] || 0;
      const pct = Math.round(h / maxH * 100);
      return `
        <div class="stat-row">
          <span class="stat-label">${escapeHtml(p)}</span>
          <div class="stat-bar"><div class="stat-fill" style="width:${pct}%"></div></div>
          <span class="stat-val">${h.toFixed(1)}h</span>
        </div>`;
    }).join('');
    return `
      <div class="week-summary-card">
        <div class="week-summary-head">
          <span class="week-summary-title">이번 주 요약 (${escapeHtml(state.weekStart)} 시작)</span>
          ${trendChipHtml(s.rate)}
        </div>
        <div class="week-summary-hero">
          <div class="donut-wrap">${donutSvg(s.rate, 112)}</div>
          <div class="hero-kpis">
            <div class="hero-kpi kpi-total">
              <span class="kpi-label">총 작업</span>
              <span class="kpi-val">${s.totalHours.toFixed(1)}<span class="kpi-val-sub">h</span></span>
            </div>
            <div class="hero-kpi kpi-est">
              <span class="kpi-label">예상 작업</span>
              <span class="kpi-val">${s.estHours.toFixed(1)}<span class="kpi-val-sub">h</span></span>
            </div>
            <div class="hero-kpi kpi-done">
              <span class="kpi-label">완료 업무</span>
              <span class="kpi-val">${s.done}<span class="kpi-val-sub">/${s.total}</span></span>
            </div>
          </div>
        </div>
        <div class="week-summary-section">
          <div class="section-title">일별 달성률 <span class="sparkline-legend">목표 80%</span></div>
          ${sparklineHtml(state.days)}
        </div>
        <div class="week-summary-section">
          <div class="section-title">분면별 시간 분포</div>
          ${quadBars}
        </div>
        <div class="week-summary-section">
          <div class="section-title">프로젝트별 시간 분포</div>
          ${projBars}
        </div>
      </div>`;
  }

  function weekRangeLabel(h) {
    if (!h.days || h.days.length === 0) return h.weekStart || '';
    const first = h.days[0].date;
    const last = h.days[h.days.length - 1].date;
    const y = first.split('-')[0];
    return `${y}년 ${formatDateDisplay(first)} ~ ${formatDateDisplay(last)}`;
  }

  function historyCardHtml(h, idx) {
    const days = h.days || [];
    const ws = calcWeekStats(days);
    const daysHtml = days.map(d => historyDayHtml(d)).join('');
    const g = h.goals || { week: '', month: '' };
    const goalWeek = g.week ? `<div class="history-goal-row week"><span class="history-goal-tag">주</span><span class="history-goal-text">${escapeHtml(g.week)}</span></div>` : '';
    const goalMonth = g.month ? `<div class="history-goal-row month"><span class="history-goal-tag">월</span><span class="history-goal-text">${escapeHtml(g.month)}</span></div>` : '';
    const goalBlock = (goalWeek || goalMonth) ? `<div class="history-goals">${goalWeek}${goalMonth}</div>` : '';
    // Phase 9 (Reduce): 히트맵 제거 — 일자 카드 좌측 bar가 동일 정보 표현
    const weekSummary = days.length > 0 ? `
      <div class="history-week-summary">
        <span class="rate-badge ${rateClass(ws.total > 0 ? ws.rate : null)}">${ws.total > 0 ? ws.rate + '%' : '—'}</span>
        <span class="history-week-hours">${ws.totalHours.toFixed(1)}h <span class="history-week-hours-muted">작업 · ${ws.estHours.toFixed(1)}h 예상 · ${ws.done}/${ws.total} 완료</span></span>
      </div>` : '';
    return `
      <div class="history-card">
        <div class="history-card-head">
          <div>
            <div class="history-week">${escapeHtml(weekRangeLabel(h))}</div>
            <div class="history-time">보관: ${escapeHtml(h.archivedAt || '')}</div>
          </div>
          <button class="btn danger sm" onclick="askDeleteHistory(${idx})">삭제</button>
        </div>
        ${weekSummary}
        ${goalBlock}
        <div class="history-days">${daysHtml}</div>
      </div>`;
  }

  // ---------- 월별 히스토리: 일별 업무 리스트 (flatten + scope toggle) ----------
  const MONTHLY_SCOPE_KEY = 'worklog-monthly-scope';

  function getMonthlyScope() {
    try { return localStorage.getItem(MONTHLY_SCOPE_KEY) || 'month'; }
    catch (e) { return 'month'; }
  }

  window.setMonthlyScope = function(scope) {
    if (scope !== 'month' && scope !== 'all') scope = 'month';
    try { localStorage.setItem(MONTHLY_SCOPE_KEY, scope); } catch (e) {}
    document.querySelectorAll('.scope-btn').forEach(b => b.classList.toggle('active', b.dataset.scope === scope));
    renderMonthlyHistory();
  };

  function collectAllDays() {
    const out = [];
    (state.days || []).forEach(d => out.push(d));
    (state.history || []).forEach(h => {
      (h.days || []).forEach(d => out.push(d));
    });
    return out;
  }

  function formatMonthLabel(ym) {
    const parts = (ym || '').split('-');
    if (parts.length < 2) return ym || '';
    return `${parts[0]}년 ${parseInt(parts[1], 10)}월`;
  }

  function dayHasTasks(d) {
    let count = 0;
    ['q1','q2','q3','q4'].forEach(k => {
      count += ((d.quadrants && d.quadrants[k]) || []).filter(t => t.name).length;
    });
    return count > 0;
  }

  function renderMonthlyHistory() {
    const list = document.getElementById('monthlyList');
    const counter = document.getElementById('monthlyCount');
    if (!list) return;

    const scope = getMonthlyScope();
    document.querySelectorAll('.scope-btn').forEach(b => b.classList.toggle('active', b.dataset.scope === scope));

    const all = collectAllDays();

    // scope 필터 (최근 30일 = 오늘 포함 30일)
    let filtered = all;
    if (scope === 'month') {
      const cutoff = new Date();
      cutoff.setDate(cutoff.getDate() - 29);
      cutoff.setHours(0, 0, 0, 0);
      const cutoffStr = formatDate(cutoff);
      filtered = all.filter(d => d.date && d.date >= cutoffStr);
    }

    // 업무 있는 날짜만
    const withTasks = filtered.filter(dayHasTasks);
    // 날짜 역순
    withTasks.sort((a, b) => (b.date || '').localeCompare(a.date || ''));

    if (counter) {
      counter.textContent = withTasks.length === 0
        ? '기록 없음'
        : `${withTasks.length}일 · ${scope === 'month' ? '최근 30일' : '전체'}`;
    }

    if (withTasks.length === 0) {
      list.innerHTML = scope === 'month'
        ? '<div class="history-empty">최근 30일 내 기록이 없어요.<br><b>📂 전체 기간</b>을 눌러 이전 기록을 확인할 수 있어요.</div>'
        : '<div class="history-empty">기록된 업무가 없어요.<br>주간 탭에서 업무를 입력한 뒤 <b>📦 주간 갱신</b>으로 보관해주세요.</div>';
      return;
    }

    // 월 단위 그룹핑 (역순)
    const groups = [];
    let curYm = null, curGroup = null;
    withTasks.forEach(d => {
      const ym = (d.date || '').slice(0, 7);
      if (ym !== curYm) {
        curYm = ym;
        curGroup = { month: ym, days: [] };
        groups.push(curGroup);
      }
      curGroup.days.push(d);
    });

    const html = groups.map(g => {
      // 월 평균 달성률
      let totalRate = 0, rateCount = 0;
      g.days.forEach(d => {
        const st = calcDayStats(d);
        if (st.total > 0) { totalRate += st.rate; rateCount++; }
      });
      const avgRate = rateCount > 0 ? Math.round(totalRate / rateCount) : null;
      // Phase 9: 월 헤더에 달성률 배지로 강조
      const rateBadge = avgRate == null
        ? `<span class="monthly-month-rate">기록 없음</span>`
        : `<span class="rate-badge ${rateClass(avgRate)}" title="월 평균 달성률">${avgRate}%</span>`;

      const daysHtml = g.days.map(d => historyDayHtml(d)).join('');
      return `
        <div class="monthly-group">
          <div class="monthly-month-head">
            <span>${escapeHtml(formatMonthLabel(g.month))}</span>
            <span class="monthly-month-count">${g.days.length}일</span>
            ${rateBadge}
          </div>
          <div class="monthly-day-list">${daysHtml}</div>
        </div>`;
    }).join('');

    list.innerHTML = html;
  }

  function historyDayHtml(d) {
    const stats = calcDayStats(d);
    const hasRecord = stats.total > 0;
    const rateCls = rateClass(hasRecord ? stats.rate : null);
    const allTasks = [];
    ['q1','q2','q3','q4'].forEach(k => {
      ((d.quadrants && d.quadrants[k]) || []).forEach(t => {
        if (t.name) allTasks.push({ name: t.name, project: t.project, done: t.done, q: k });
      });
    });
    // Phase 9 (Reduce): 분면 dot 제거, 프로젝트 칩으로 교체
    const tasksHtml = allTasks.map(t => {
      const proj = t.project || '';
      const slot = proj ? projectSlot(proj) : '';
      const chip = proj
        ? `<span class="history-task-proj" data-slot="${slot}">${escapeHtml(proj)}</span>`
        : '';
      const fullLabel = (proj ? `[${proj}] ` : '') + (t.name || '');
      return `
        <div class="history-task ${t.done ? 'done' : ''}" title="${escapeHtml(fullLabel)}">
          ${chip}
          <span class="history-task-name">${escapeHtml(t.name)}</span>
        </div>`;
    }).join('');
    const compare = hoursCompareHtml(stats.actualHours, stats.estimatedHours);
    return `
      <div class="history-day ${rateCls}">
        <div class="history-day-head">
          <span class="history-day-date">${formatDateDisplay(d.date)} ${escapeHtml(d.dayName)}</span>
          <span class="rate-badge mini ${rateCls}">${hasRecord ? stats.rate + '%' : '—'}</span>
        </div>
        ${compare}
        <div class="history-day-tasks">${tasksHtml || '<span style="color: var(--text-subtle);">기록 없음</span>'}</div>
      </div>`;
  }

  function getPrevDayRef(dayIdx) {
    if (dayIdx > 0) return { day: state.days[dayIdx - 1], from: '어제' };
    if (!state.history || state.history.length === 0) return null;
    const sorted = state.history.slice().sort((a, b) => (b.archivedAt || '').localeCompare(a.archivedAt || ''));
    const lastWeek = sorted[0];
    if (!lastWeek.days || lastWeek.days.length < 5) return null;
    return { day: lastWeek.days[4], from: '지난주 금요일' };
  }

  window.copyFromPrevDay = function(dayIdx) {
    const ref = getPrevDayRef(dayIdx);
    if (!ref) {
      showModal('복사 불가', '이전 업무 기록이 없습니다.\n(월요일은 히스토리에 이전 주간이 보관되어 있어야 합니다.)', null);
      return;
    }
    const target = state.days[dayIdx];
    if (!target) return;
    const srcTasks = [];
    ['q1','q2','q3','q4'].forEach(qk => {
      (ref.day.quadrants[qk] || []).forEach(t => { if (t.name) srcTasks.push({ src: t, q: qk }); });
    });
    if (srcTasks.length === 0) {
      showModal('복사할 업무 없음', `${ref.from}에 복사할 업무가 없습니다.`, null);
      return;
    }
    showModal('어제 업무 복사',
      `${ref.from}의 업무 ${srcTasks.length}개를 이 날짜로 복사합니다.\n· 업무명 / 구분 / 예상시간만 복사\n· 시작·종료·완료는 초기화\n· 동일 업무명은 스킵\n\n계속하시겠어요?`,
      () => {
        let added = 0, skipped = 0;
        srcTasks.forEach(({ src, q }) => {
          const exists = target.quadrants[q].some(e => e.name === src.name);
          if (exists) { skipped++; return; }
          target.quadrants[q].push({
            id: uid(), project: (state.projectLabels && state.projectLabels.includes(src.project) ? src.project : (state.projectLabels && state.projectLabels[0]) || '메인'), name: src.name,
            targetDate: target.date, startTime: '', endTime: '',
            breakMinutes: 0, breakMode: 'exclude',
            estimatedHours: src.estimatedHours || '', done: false, note: ''
          });
          added++;
        });
        saveState();
        renderWeekGrid();
        showModal('복사 완료', `추가 ${added}개 / 중복 스킵 ${skipped}개`, null);
      }
    );
  };
